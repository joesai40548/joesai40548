<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Joes AI - Intelligent AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100dvh; max-height: 100dvh; transition: background-color 0.3s ease; }
    .gradient-bg { background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0c0822); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    body.light .gradient-bg { background: linear-gradient(-45deg, #e0e7ff, #eef2ff, #f8fafc, #cbd5e1); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    
    @keyframes liveFade { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .chat-gradient { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    body.light .chat-gradient { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.08); color: #1e293b !important; }

    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
    body.light #chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); }

    /* Custom Snake Motion Wave Animation */
    @keyframes snakeWave {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
    }
    .snake-dot {
        animation: snakeWave 1.2s ease-in-out infinite;
        width: 6px;
        height: 6px;
        background-color: #a78bfa;
        border-radius: 50%;
        display: inline-block;
    }
    .snake-dot:nth-child(2) { animation-delay: 0.15s; }
    .snake-dot:nth-child(3) { animation-delay: 0.3s; }
    .snake-dot:nth-child(4) { animation-delay: 0.45s; }

    /* Custom dynamic color shifting background orbs */
    @keyframes colorShift1 {
        0% { background-color: rgba(139, 92, 246, 0.12); transform: translate(0px, 0px) scale(1); }
        50% { background-color: rgba(236, 72, 153, 0.12); transform: translate(40px, -40px) scale(1.15); }
        100% { background-color: rgba(139, 92, 246, 0.12); transform: translate(0px, 0px) scale(1); }
    }
    @keyframes colorShift2 {
        0% { background-color: rgba(99, 102, 241, 0.12); transform: translate(0px, 0px) scale(1); }
        50% { background-color: rgba(59, 130, 246, 0.12); transform: translate(-40px, 40px) scale(0.9); }
        100% { background-color: rgba(99, 102, 241, 0.12); transform: translate(0px, 0px) scale(1); }
    }
    .glowing-blob-1 { animation: colorShift1 10s ease-in-out infinite; }
    .glowing-blob-2 { animation: colorShift2 14s ease-in-out infinite; }

    /* Color Changing Glowing Textarea Border Animation */
    @keyframes borderGlow {
        0% { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.4); }
        33% { border-color: #ec4899; box-shadow: 0 0 12px rgba(236, 72, 153, 0.4); }
        66% { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); }
        100% { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.4); }
    }
    .glowing-input { animation: borderGlow 6s ease-in-out infinite; }

    /* Markdown tables layout styling */
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th { background-color: rgba(255, 255, 255, 0.08); color: #a78bfa !important; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; tracking-wider; }
    body.light th { background-color: rgba(0, 0, 0, 0.05); color: #4f46e5 !important; }
    td, th { padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
    body.light td { border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
    tr:hover { background-color: rgba(255, 255, 255, 0.03); }
    body.light tr:hover { background-color: rgba(0, 0, 0, 0.02); }

    /* Light Theme typography adjustments */
    body.light .text-white { color: #1e293b !important; }
    body.light .text-white\/30 { color: rgba(30, 41, 59, 0.5) !important; }
    body.light .text-white\/40 { color: rgba(30, 41, 59, 0.6) !important; }
    body.light .text-white\/50 { color: rgba(30, 41, 59, 0.7) !important; }
    body.light textarea { color: #1e293b !important; background: transparent; border-color: transparent; }
    body.light select { color: #1e293b !important; background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
    body.light aside { background: rgba(241, 245, 249, 0.95); border-color: rgba(0,0,0,0.1); }
    body.light header { background: rgba(255, 255, 255, 0.6); border-color: rgba(0,0,0,0.05); }
    body.light #welcome-msg h1 { color: #1e293b !important; }
    body.light .chat-gradient p, body.light .chat-gradient li { color: #334155 !important; }
    body.light .chat-gradient strong { color: #4338ca !important; }

    /* Explicit locked viewport limits to prevent layout address-bar clipping */
    .app-container {
        height: 100dvh;
        max-height: 100dvh;
        width: 100vw;
        display: flex;
        overflow: hidden;
        position: relative;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white relative">
  <!-- Dynamic Color Shifting Ambient Glow Background Orbs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-1/4 left-1/4 w-[35vw] h-[35vw] rounded-full blur-[130px] glowing-blob-1"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[35vw] h-[35vw] rounded-full blur-[130px] glowing-blob-2"></div>
  </div>

  <div id="page-loader" class="fixed inset-0 z-[100] bg-[#0b0a1a] flex items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Main App Layout Container with locked viewport coordinates -->
  <div id="app" class="app-container">

    <!-- ChatGPT/Gemini Style Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0c0a1f]/95 border-r border-white/10 flex flex-col transform -translate-x-full md:translate-x-0 md:static transition-transform duration-300 backdrop-blur-xl shrink-0 h-full">
        <div class="p-4 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-sm">⚡</div>
                <span class="text-lg font-semibold text-white tracking-wide">joes ai</span>
            </div>
            <button id="sidebar-close-btn" class="md:hidden text-white/60 hover:text-white">✕</button>
        </div>

        <div class="p-4">
            <button id="new-chat-btn" class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-medium rounded-xl flex items-center justify-center gap-2 shadow-lg hover:scale-[1.01] transition-all text-sm">
                <span>+</span> New Chat
            </button>
        </div>

        <!-- Recent Chat Sessions loaded from Koofr Cloud -->
        <div class="flex-1 overflow-y-auto px-4 py-2 space-y-1">
            <p class="text-[10px] font-semibold text-white/30 uppercase tracking-wider mb-2 px-2">Recent Chats</p>
            <div id="session-list" class="space-y-1"></div>
        </div>

        <div class="p-4 border-t border-white/5 bg-black/20 space-y-3">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-semibold text-white/30 uppercase tracking-wider">Active Mode</label>
                <select id="chat-mode-select" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500 transition-all">
                    <option value="chat" class="text-black">💬 Chat Mode</option>
                    <option value="code" class="text-black">💻 Code Mode</option>
                    <option value="study" class="text-black">📚 Study Mode</option>
                    <option value="learn" class="text-black">🧠 Learn Mode</option>
                </select>
            </div>
            <div class="text-[9px] text-white/20 text-center pt-2 border-t border-white/5">
                Created by AKRAM JOES TECHNOLOGIES
            </div>
        </div>
    </aside>

    <!-- Main Chat Window Area (Full Width Edge-to-Edge on Mobile) -->
    <div class="flex-grow flex flex-col h-full overflow-hidden relative">
      <header class="bg-white/10 backdrop-blur-md shadow-lg md:p-4 p-3.5 flex items-center justify-between border-b border-white/5 z-20 shrink-0">
          <div class="flex items-center space-x-3">
              <button id="sidebar-open-btn" class="md:hidden text-white hover:text-purple-400 p-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
              </button>
              <div class="flex items-center space-x-2 md:hidden">
                <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-sm">⚡</div>
                <span class="text-lg font-semibold text-white tracking-wide">joes ai</span>
              </div>
          </div>
          
          <!-- Modern Control Dashboard Menu -->
          <div class="flex items-center space-x-1">
              <button id="theme-btn" class="text-white hover:text-amber-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="Toggle Theme">🌙</button>
              <button id="export-btn" class="text-white hover:text-green-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="Export to Markdown">📥</button>
              <button id="clear-btn" class="text-white hover:text-red-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="New Conversation Screen">🗑️</button>
          </div>
      </header>

      <!-- Grid view: full screen padding overrides on mobile phones -->
      <main class="flex-1 overflow-hidden md:p-4 p-0">
        <div class="max-w-5xl mx-auto h-full flex flex-col">
          <!-- Translucent core element removes border radii on mobile edge layouts -->
          <div class="chat-gradient md:rounded-3xl rounded-none shadow-2xl overflow-hidden flex-1 flex flex-col relative border border-white/5 h-full">
            <!-- Messages stream -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 flex flex-col"></div>

            <!-- Input Dashboard Container -->
            <div class="p-3 md:p-4 bg-black/30 border-t border-white/10 flex items-center space-x-2 md:space-x-3 shrink-0">
              <div id="attachment-chip-container" class="hidden flex-wrap gap-2 mb-3 animate__animated animate__fadeInUp"></div>
              
              <!-- Minimalist Plus Button for Media Upload (Replaced clip) -->
              <button id="attachment-btn" class="flex-shrink-0 w-11 h-11 md:w-12 md:h-12 bg-white/10 hover:bg-white/20 active:scale-95 text-white rounded-2xl flex items-center justify-center text-2xl transition-all border border-white/10" title="Upload Media">
                ＋
              </button>
              
              <!-- Pill Input Box (Wrapper with active color-changing glow) -->
              <div class="flex-grow flex items-center relative bg-white/5 border border-white/20 rounded-2xl px-3 md:px-4 py-0.5 glowing-input transition-all min-h-[48px] md:min-h-[52px]">
                
                <!-- Enlarged, Elastic Text Area (Gemini Style) -->
                <textarea id="message-input" enterkeyhint="send" placeholder="Type a message or trigger voice..." rows="1" class="flex-grow bg-transparent border-none text-white placeholder-white/40 focus:outline-none text-sm md:text-base py-2.5 md:py-3 pr-10 resize-none h-[40px] max-h-[150px] leading-relaxed"></textarea>
                
                <!-- Google Style Mic Button inside input bar wrapper -->
                <button id="mic-btn" class="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-purple-400 p-2 rounded-xl transition-all" title="Voice Input">
                  🎤
                </button>
              </div>

              <!-- Send Action Button -->
              <button id="send-btn" class="flex-shrink-0 bg-gradient-to-r from-purple-600 to-indigo-600 hover:scale-105 text-white w-11 h-11 md:w-12 md:h-12 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center shrink-0">
                <span id="send-icon" class="flex items-center justify-center w-full h-full">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </span>
              </button>
              <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.txt,.doc,.docx">
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Code Sandbox Modal -->
  <div id="sandbox-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex flex-col animate__animated animate__fadeIn animate__faster">
      <div class="flex justify-between items-center p-4 border-b border-white/10 bg-[#0c0a1f]/95 text-white">
          <span class="text-sm font-semibold flex items-center gap-2">💻 Sandbox Live Code Preview</span>
          <button id="sandbox-close-btn" class="text-white hover:text-red-400 font-bold transition-colors">✕ Close</button>
      </div>
      <div class="flex-1 bg-white">
          <iframe id="sandbox-iframe" class="w-full h-full border-none"></iframe>
      </div>
  </div>

  <!-- Dynamic ESM module load for Mermaid.js Diagram Integration -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    window.mermaid = mermaid;
  </script>

  <script type="module">
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    
    // Auto-generate or load persistent, unique User ID for chat isolation
    const userId = localStorage.getItem('joes_ai_user_id') || 'user_' + Math.random().toString(36).substring(2, 11);
    localStorage.setItem('joes_ai_user_id', userId);

    let sessions = [];
    let currentSessionId = null;
    let activeFilename = null;
    let chatHistory = [];
    let selectedAttachment = null;
    
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const sendIcon = document.getElementById('send-icon');
    const chatMessages = document.getElementById('chat-messages');
    const chatModeSelect = document.getElementById('chat-mode-select');
    const micBtn = document.getElementById('mic-btn');
    const sessionList = document.getElementById('session-list');
    const newChatBtn = document.getElementById('new-chat-btn');

    // Sidebar selectors
    const sidebar = document.getElementById('sidebar');
    const sidebarOpenBtn = document.getElementById('sidebar-open-btn');
    const sidebarCloseBtn = document.getElementById('sidebar-close-btn');

    // Control menu selectors
    const themeBtn = document.getElementById('theme-btn');
    const exportBtn = document.getElementById('export-btn');

    // Sandbox selectors
    const sandboxModal = document.getElementById('sandbox-modal');
    const sandboxIframe = document.getElementById('sandbox-iframe');
    const sandboxCloseBtn = document.getElementById('sandbox-close-btn');

    // Elastic textarea height adjuster
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = (messageInput.scrollHeight) + 'px';
    });

    // Text-To-Speech Global Read Aloud
    window.speakText = (btn, text) => {
        const cleanString = decodeURIComponent(text).replace(/<\/?[^>]+(>|$)/g, "");
        
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            btn.textContent = '🔊 Read';
            btn.classList.remove('text-red-400');
            return;
        }

        const utterance = new SpeechSynthesisUtterance(cleanString);
        utterance.onend = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
        };
        utterance.onerror = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
        };

        btn.textContent = '🛑 Stop';
        btn.classList.add('text-red-400');
        window.speechSynthesis.speak(utterance);
    };

    // Live Sandbox Execution Launcher
    window.runCodeSandbox = (encodedCode) => {
        const decoded = decodeURIComponent(encodedCode);
        sandboxModal.classList.remove('hidden');
        
        const iframeDoc = sandboxIframe.contentDocument || sandboxIframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(decoded);
        iframeDoc.close();
    };

    sandboxCloseBtn.addEventListener('click', () => {
        sandboxModal.classList.add('hidden');
    });

    document.addEventListener('DOMContentLoaded', () => {
        setupEventListeners();
        setupSpeechRecognition();
        setupSidebarHandlers();
        setupThemeHandler();
        setupExportHandler();
        
        fetchSessions();
        showWelcome(true);

        setTimeout(() => {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        }, 800);
    });

    function setupSidebarHandlers() {
        sidebarOpenBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });
        sidebarCloseBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });
        newChatBtn.addEventListener('click', startNewChat);
    }

    function setupThemeHandler() {
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const lightActive = document.body.classList.contains('light');
            themeBtn.innerHTML = lightActive ? '☀️' : '🌙';
            localStorage.setItem('joes_ai_theme', lightActive ? 'light' : 'dark');
        });

        if (localStorage.getItem('joes_ai_theme') === 'light') {
            document.body.classList.add('light');
            themeBtn.innerHTML = '☀️';
        }
    }

    function setupExportHandler() {
        exportBtn.addEventListener('click', () => {
            if (chatHistory.length === 0) {
                alert("No chat history to export yet!");
                return;
            }

            let mdString = `# Joes AI Conversation History\n*Date: ${new Date().toLocaleDateString()}*\n\n---\n\n`;
            chatHistory.forEach(msg => {
                const author = msg.role === 'user' ? 'User' : 'Joes AI';
                mdString += `### **${author}**:\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([mdString], { type: 'text/markdown;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.setAttribute('download', `JoesAI_ChatExport_${Date.now()}.md`);
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        });
    }

    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keydown', (e) => { 
          if (e.key === 'Enter' && !e.shiftKey) { 
              e.preventDefault(); 
              handleSend(); 
          } 
      });
      
      document.getElementById('attachment-btn').addEventListener('click', () => document.getElementById('file-input').click());
      document.getElementById('file-input').addEventListener('change', handleFileSelect);
      
      document.getElementById('clear-btn').addEventListener('click', () => {
          startNewChat();
      });
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';

          recognition.onstart = () => {
              micBtn.innerHTML = '🔴';
              micBtn.classList.add('animate-pulse', 'bg-red-500/30');
          };

          recognition.onresult = (event) => {
              const transcript = event.results[0][0].transcript;
              messageInput.value = (messageInput.value + ' ' + transcript).trim();
              messageInput.focus();
              messageInput.dispatchEvent(new Event('input')); // trigger autoheight calculation
          };

          recognition.onerror = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          recognition.onend = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          micBtn.addEventListener('click', () => {
              recognition.start();
          });
      } else {
          micBtn.style.display = 'none';
      }
    }

    // Sidebar Cloud File Loader System with x-user-id header isolation
    async function fetchSessions() {
        sessionList.innerHTML = `<p class="text-xs text-white/40 italic px-2">Syncing with Koofr...</p>`;
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Failed to load sessions.");
            sessions = await response.json();
            renderSessions();
        } catch (err) {
            console.error(err);
            sessionList.innerHTML = `<p class="text-xs text-red-400 italic px-2">Koofr offline</p>`;
        }
    }

    function startNewChat() {
        currentSessionId = null;
        activeFilename = null;
        chatHistory = [];
        chatMessages.innerHTML = '';
        renderSessions();
        showWelcome(true);
        sidebar.classList.add('-translate-x-full');
    }

    window.loadSession = async (filename) => {
        showLoadingIndicator(true);
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok
