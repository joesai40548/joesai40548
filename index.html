<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Joes AI - Intelligent AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    .gradient-bg { background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1543); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    body.light .gradient-bg { background: linear-gradient(-45deg, #eef2ff, #e0e7ff, #c7d2fe, #f8fafc); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    @keyframes liveFade { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .chat-gradient { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
    .ai-message pre { background: rgba(0,0,0,0.5); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); font-family: monospace; color: #a78bfa; }
    .processing-pulse { animation: processPulse 2s ease-in-out infinite; }
    @keyframes processPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    code { background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; color: #f472b6; }
  </style>
</head>
<body class="gradient-bg min-h-screen">
  <div id="page-loader" class="fixed inset-0 z-[100] bg-[#0b0a1a] flex items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
  
  <div id="app" class="relative h-screen z-10 flex flex-col">
    <header class="bg-white/10 backdrop-blur-md shadow-lg p-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
              <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">⚡</div>
              <span class="text-2xl font-bold text-white tracking-tight">joes ai</span>
            </div>
            <div class="flex items-center space-x-4">
                <select id="chat-mode-select" class="bg-white/10 border border-white/20 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none">
                    <option value="chat" class="text-black">Chat Mode</option>
                    <option value="code" class="text-black">Code Mode</option>
                    <option value="debug" class="text-black">Debug Mode</option>
                </select>
                <button id="settings-btn" class="text-white hover:rotate-90 transition-transform">⚙️</button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden p-4">
      <div class="max-w-5xl mx-auto h-full flex flex-col">
        <div class="chat-gradient rounded-3xl shadow-2xl overflow-hidden flex-1 flex flex-col relative">
          <!-- Message Area -->
          <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

          <!-- Input Area -->
          <div class="p-4 bg-black/30 border-t border-white/10">
            <div id="attachment-chip-container" class="hidden flex-wrap gap-2 mb-3"></div>
            
            <div class="flex items-end space-x-3">
              <button id="attachment-btn" class="p-3.5 bg-white/10 hover:bg-white/20 text-white rounded-2xl transition-all" title="Upload Media">
                📎
              </button>
              
              <div class="flex-1 relative">
                <textarea id="message-input" placeholder="Type a message or analyze a file..." rows="1" class="w-full bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 text-white placeholder-white/40 focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all resize-none"></textarea>
              </div>

              <button id="send-btn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:scale-105 text-white p-3.5 rounded-2xl shadow-xl transition-all active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
              </button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.txt,.doc,.docx">
            <div class="text-[10px] text-white/30 mt-2 ml-1">Powered by Groq & Gemini 1.5</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    // --- CONFIGURATION ---
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    let chatHistory = [];
    let selectedAttachment = null;
    
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');

    // Initial load cleanup
    document.addEventListener('DOMContentLoaded', () => {
        showWelcome(true);
        setupEventListeners();
        setTimeout(() => {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        }, 800);
    });

    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keydown', (e) => { 
          if (e.key === 'Enter' && !e.shiftKey) { 
              e.preventDefault(); 
              handleSend(); 
          } 
      });
      
      document.getElementById('attachment-btn').addEventListener('click', () => document.getElementById('file-input').click());
      document.getElementById('file-input').addEventListener('change', handleFileSelect);
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Size check (Max 50MB for free tiers usually)
        if (file.size > 50 * 1024 * 1024) {
            alert("File is too heavy (Limit: 50MB).");
            return;
        }

        selectedAttachment = file;
        showAttachmentChip(file.name);
    }

    function showAttachmentChip(name) {
        const container = document.getElementById('attachment-chip-container');
        container.innerHTML = `<div class="bg-purple-600/80 backdrop-blur-sm border border-purple-400 text-white px-4 py-1.5 rounded-full text-xs flex items-center space-x-2 animate__animated animate__fadeInUp">
            <span class="font-medium">📎 ${name}</span>
            <button onclick="window.removeAttachment()" class="hover:text-black transition-colors font-bold">✕</button>
        </div>`;
        container.classList.remove('hidden');
    }

    window.removeAttachment = () => {
        selectedAttachment = null;
        document.getElementById('file-input').value = "";
        document.getElementById('attachment-chip-container').classList.add('hidden');
    };

    async function handleSend() {
      const message = messageInput.value.trim();
      const hasAttachment = !!selectedAttachment;
      
      if (!message && !hasAttachment) return;

      // Add user message UI
      addMessageToUI('user', message || `Analysing: ${selectedAttachment.name}`);
      
      const currentAttachment = selectedAttachment;
      messageInput.value = '';
      window.removeAttachment();
      showWelcome(false);
      
      showProcessingIndicator(hasAttachment ? 'Gemini 1.5' : 'Groq Llama');

      try {
        let aiText = '';
        
        if (hasAttachment) {
            const base64Data = await readFileAsBase64(currentAttachment);
            const mimeType = currentAttachment.type || 'application/octet-stream';

            const response = await fetch(`${BACKEND_URL}/api/gemini`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, fileData: base64Data, mimeType })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Server error');
            aiText = data.text;
        } else {
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [...chatHistory.slice(-6), { role: 'user', content: message }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error('Groq Offline');
            aiText = data.choices?.[0]?.message?.content || data.text;
        }

        removeProcessingIndicator();
        addMessageToUI('assistant', aiText);

        chatHistory.push({ role: 'user', content: message });
        chatHistory.push({ role: 'assistant', content: aiText });

      } catch (err) {
        removeProcessingIndicator();
        addMessageToUI('assistant', `⚠️ **Error:** ${err.message}`);
      }
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function addMessageToUI(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster`;
      
      const innerClass = role === 'user' 
        ? 'bg-gradient-to-br from-purple-600 to-indigo-600 text-white rounded-2xl rounded-tr-none' 
        : 'chat-gradient text-white rounded-2xl rounded-tl-none';

      wrapper.innerHTML = `<div class="max-w-[85%] px-5 py-3.5 shadow-xl ${innerClass}">${formatMarkdown(content)}</div>`;
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showProcessingIndicator(modelName) {
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start text-purple-400 text-xs italic tracking-wide ml-2 mb-4 processing-pulse';
      div.innerHTML = `<span class="mr-2">⚡</span> Joes AI (${modelName}) is processing...`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeProcessingIndicator() {
      document.getElementById('processing-indicator')?.remove();
    }

    function formatMarkdown(text) {
        if (!text) return '';
        let escaped = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Code blocks
        escaped = escaped.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        // Inline code
        escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Bold
        escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Newlines
        return escaped.replace(/\n/g, '<br>');
    }

    function showWelcome(show) {
        if(show) {
            chatMessages.innerHTML = `<div id="welcome-msg" class="flex flex-col items-center justify-center h-full text-center py-20 text-white/40 space-y-4">
                <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center text-4xl mb-4 animate-pulse">🤖</div>
                <h1 class="text-3xl font-bold text-white/90">Welcome to Joes AI</h1>
                <p class="max-w-xs text-sm">Ask anything, or attach a video, photo, or PDF to begin the analysis.</p>
                <div class="flex gap-2 pt-4">
                  <span class="px-3 py-1 bg-white/10 rounded-full text-[10px]">Images</span>
                  <span class="px-3 py-1 bg-white/10 rounded-full text-[10px]">Videos</span>
                  <span class="px-3 py-1 bg-white/10 rounded-full text-[10px]">Audio</span>
                  <span class="px-3 py-1 bg-white/10 rounded-full text-[10px]">Docs</span>
                </div>
            </div>`;
        } else {
            document.getElementById('welcome-msg')?.remove();
        }
    }
  </script>
</body>
</html>
