  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
    .gradient-bg { background: #070514; background-size: 400% 400%; }
    body.light .gradient-bg { background: #eef2ff; }
    .chat-gradient { background: rgba(12, 10, 31, 0.45) !important; backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.06); }
    body.light .chat-gradient { background: rgba(255, 255, 255, 0.65) !important; backdrop-filter: blur(24px); border: 1px solid rgba(0, 0, 0, 0.06); }
    .message-user { background: linear-gradient(135deg, #6d28d9, #4f46e5); color: white; }

            <div class="flex items-center space-x-1 pl-1 shrink-0">

                <svg id="voice-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>

              <button id="submit-prompt-btn" class="p-2.5 bg-gradient-to-tr from-purple-600 to-indigo-500 hover:from-purple-500 hover:to-indigo-400 text-white rounded-xl shadow-md transition-all flex items-center justify-center group">

  <script type="module">
    // Secure isolated global state engine declarations
    let sessionId = localStorage.getItem('JOES_AI_CURRENT_SESSION') || 'Session_' + Date.now();
    let currentMode = 'chat';
    let chatHistory = [];
    let activeFilePayload = null;
    let activeFileMime = null;
    let isRecordingSpeech = false;
    let voiceRecognitionEngine = null;

    // Fixed User Isolation Header Assignment
    const userId = "Kaigwa_Akram"; 

    // DOM layout cache references
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const openSidebarBtn = document.getElementById('open-sidebar-btn');
    const closeSidebarBtn = document.getElementById('close-sidebar-btn');
    const chatMessages = document.getElementById('chat-messages');
    const userPromptInput = document.getElementById('user-prompt-input');
    const submitPromptBtn = document.getElementById('submit-prompt-btn');
    const mediaAttachmentInput = document.getElementById('media-attachment-input');
    const attachmentChipContainer = document.getElementById('attachment-chip-container');
    const attachmentNameText = document.getElementById('attachment-name-text');
    const removeAttachmentTrigger = document.getElementById('remove-attachment-trigger');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const headerModeIndicator = document.getElementById('header-mode-indicator');
    const systemStatusSub = document.getElementById('system-status-sub');
    const clearFrameTrigger = document.getElementById('clear-frame-trigger');
    const newChatSidebarBtn = document.getElementById('new-chat-sidebar-btn');
    const recentChatsList = document.getElementById('recent-chats-list');
    const voiceInputToggle = document.getElementById('voice-input-toggle');
    const voiceIcon = document.getElementById('voice-icon');
    const chatTitleDisplay = document.getElementById('chat-title-display');

    // Make global dynamic utilities accessible outside modular boundaries safely
    window.useQuickPrompt = function(promptText, targetedMode) {
        if(targetedMode) {
            switchEngineMode(targetedMode);
        }
        userPromptInput.value = promptText;
        userPromptInput.style.height = 'auto';
        userPromptInput.style.height = userPromptInput.scrollHeight + 'px';
        handleSend();
    };

    window.loadSessionFile = async function(filename) {
        try {
            chatMessages.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-3 animate-pulse my-auto">
                    <div class="w-8 h-8 rounded-full border-2 border-purple-500/30 border-t-purple-500 animate-spin"></div>
                    <p class="text-xs text-white/40 font-mono">Synchronizing workspace states...</p>
                </div>
            `;
            const response = await fetch(`/api/chats/${filename}`);
            if (!response.ok) throw new Error("Could not retrieve file content.");
            const sessionData = await response.json();
            
            sessionId = sessionData.sessionId || 'Session_' + Date.now();
            localStorage.setItem('JOES_AI_CURRENT_SESSION', sessionId);
            
            chatHistory = sessionData.history || [];
            chatTitleDisplay.textContent = sessionData.title || "Restored Conversation";
            
            renderHistoryToScreen();
            if(window.innerWidth < 1024) toggleSidebar(false);
        } catch (err) {
            console.error(err);
            showWelcome(true);
        }
    };

    window.deleteSessionFile = async function(event, filename) {
        event.stopPropagation();
        if(!confirm("Are you sure you want to completely erase this operation file history from the sync cloud?")) return;
        try {
            const response = await fetch(`/api/chats/${filename}`, { method: 'DELETE' });
            if(response.ok) {
                if(localStorage.getItem('JOES_AI_CURRENT_SESSION') === filename.split('__')[1]) {
                    startEraseNewSessionFrame();
                } else {
                    fetchSessions();
                }
            }
        } catch (err) {
            console.error("Deletion sync failed:", err);
        }
    };

    // Text formatting compiler syntax logic sequence
    function formatMarkdown(text) {
        if (!text) return '';
        
        const temporaryCodeVault = [];
        let escaped = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${temporaryCodeVault.length}__`;
            temporaryCodeVault.push({ lang, code });
            return token;
        });

        // Convert standard images before HTML tag stripping sequence boundaries
        escaped = escaped.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
            return `___IMG_START___${src}___ALT___${alt || 'Image'}___IMG_END___`;
        });

        escaped = escaped
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Swap visual reference asset codes back into high quality safe containers
        escaped = escaped.replace(/___IMG_START___(.*?)___ALT___(.*?)___IMG_END___/g, (match, src, alt) => {
            return `
                <div class="my-4 overflow-hidden rounded-xl border border-white/10 shadow-xl max-w-full bg-black/20 animate__animated animate__fadeIn">
                    <img src="${src}" alt="${alt}" class="w-full h-auto object-cover max-h-[350px]" onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=Visual+Asset+Not+Found';">
                    <p class="p-2 text-center text-xs text-white/40 bg-black/20 font-mono">${alt}</p>
                </div>
            `;
        });

        // Comparative Markdown tables parsing pipeline execution blocks
        escaped = escaped.replace(/(?:(?:^|\n)\|.+.+\|)+(?:(?:\n)\|:?-+:?\|:?-+:?\|)?/g, (tableMatch) => {
            const lines = tableMatch.trim().split('\n');
            let tableHtml = '<div class="overflow-x-auto my-4 border border-white/10 rounded-xl"><table class="w-full text-left text-xs font-normal border-collapse">';
            lines.forEach((line, index) => {
                if (line.includes('---') || line.includes(':-')) return;
                const cells = line.split('|').filter(cell => cell.trim() !== '');
                tableHtml += `<tr class="${index === 0 ? 'bg-white/5 font-semibold text-purple-300 border-b border-white/10' : 'border-b border-white/5 hover:bg-white/5'}">`;
                cells.forEach(cell => {
                    tableHtml += `<td class="p-3">${cell.trim()}</td>`;
                });
                tableHtml += '</tr>';
            });
            tableHtml += '</table></div>';
            return tableHtml;
        });

        // Convert links natively inside paragraphs
        escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-purple-400 hover:underline font-medium">$1 ↗</a>');
        
        escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-bold text-white">$1</strong>');
        escaped = escaped.replace(/\*([^*]+)\*/g, '<em class="italic text-white/80">$1</em>');

        // Compile extracted block level elements with complete layout structural bounds
        temporaryCodeVault.forEach((block, index) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${index}__`;
            const encoded = btoa(unescape(encodeURIComponent(block.code)));
            const displayLang = block.lang || 'code';
            
            let finalOutput = '';
            if (displayLang.toLowerCase() === 'mermaid') {
                const uniqueId = `mermaid-vector-${Date.now()}-${index}`;
                finalOutput = `
                    <div class="my-4 border border-purple-500/20 bg-purple-950/10 rounded-xl overflow-hidden shadow-2xl text-center p-4">
                        <div class="flex justify-between items-center text-[10px] uppercase font-mono tracking-wider text-purple-400/60 mb-2 border-b border-white/5 pb-2">
                            <span>📊 Hand-Drawn Blueprint Structure</span>
                            <button class="hover:text-purple-300 transition-colors copy-trigger" data-code="${encoded}">Copy Layout</button>
                        </div>
                        <div class="mermaid overflow-x-auto py-4 flex justify-center bg-black/10 rounded-xl" id="${uniqueId}">${block.code.trim()}</div>
                    </div>
                `;
            } else {
                finalOutput = `
                    <div class="relative group my-3 border border-white/10 rounded-xl overflow-hidden bg-black/40 text-left">
                        <div class="flex justify-between items-center px-4 py-1.5 bg-white/5 border-b border-white/10 text-[10px] text-white/40 tracking-wider font-mono">
                            <span>${displayLang.toUpperCase()}</span>
                            <button class="hover:text-white transition-colors copy-trigger" data-code="${encoded}">Copy</button>
                        </div>
                        <pre class="p-4 overflow-x-auto text-sm font-mono text-purple-300 select-text">${block.code.trim()}</pre>
                    </div>
                `;
            }
            escaped = escaped.replace(token, finalOutput);
        });

        return escaped.replace(/\n/g, '<br>');
    }

    function showWelcome(show) {
        if(show) {
            chatMessages.innerHTML = `
                <div id="welcome-msg" class="flex-1 flex flex-col items-center justify-center text-center max-w-2xl mx-auto my-auto p-4 space-y-6 animate__animated animate__fadeIn">
                  <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-600 to-indigo-500 flex items-center justify-center shadow-2xl shadow-purple-500/30">
                    <span class="text-white text-3xl font-black">⚡</span>
                  </div>
                  <div class="space-y-2">
                    <h3 class="text-2xl font-bold tracking-tight">Welcome to Joes AI Studio Workspace</h3>
                    <p class="text-xs text-white/40 max-w-md mx-auto leading-relaxed">
                      Toggle learning structures via the sidebar or upload data models directly for multimodal compilation parsing.
                    </p>
                  </div>
                  <div class="flex flex-wrap items-center justify-center gap-2 max-w-lg pt-4">
                    <button onclick="window.useQuickPrompt('Explain standard pharmacological drug classification systems', 'study')" class="px-3.5 py-2 bg-white/5 hover:bg-purple-600/30 border border-white/10 hover:border-purple-500/50 rounded-full text-xs text-white/80 transition-all flex items-center gap-1.5">🔬 Study Systems</button>
                    <button onclick="window.useQuickPrompt('How can we accurately map relational tables inside a medical inventory database scheme?', 'learn')" class="px-3.5 py-2 bg-white/5 hover:bg-purple-600/30 border border-white/10 hover:border-purple-500/50 rounded-full text-xs text-white/80 transition-all flex items-center gap-1.5">🧠 Learn Database Concepts</button>
                    <button onclick="window.useQuickPrompt('Write a clean JavaFX table parsing model for an inventory desktop app view', 'code')" class="px-3.5 py-2 bg-white/5 hover:bg-purple-600/30 border border-white/10 hover:border-purple-500/50 rounded-full text-xs text-white/80 transition-all flex items-center gap-1.5">⚙️ Code Template</button>
                  </div>
                </div>
            `;
            chatTitleDisplay.textContent = "New Analytics Stream";
        } else {
            document.getElementById('welcome-msg')?.remove();
        }
    }

    // Dynamic session loading pipelines
    async function fetchSessions() {
        try {
            const response = await fetch('/api/chats', {
                headers: { 'x-user-id': userId }
            });
            if(!response.ok) return;
            const files = await response.json();
            
            if(files.length === 0) {
                recentChatsList.innerHTML = `<div class="text-center py-6 text-white/20 text-[11px] font-mono">No operations synced.</div>`;
                return;
            }
            
            recentChatsList.innerHTML = files.map(file => `
                <div onclick="window.loadSessionFile('${file.filename}')" class="w-full px-3 py-2.5 bg-white/5 hover:bg-white/10 text-white/70 hover:text-white rounded-xl flex items-center justify-between cursor-pointer transition-all group border border-white/5 hover:border-white/10">
                    <div class="flex items-center space-x-2 truncate pr-2">
                        <span class="text-white/30 text-[10px] shrink-0 font-mono">📁</span>
                        <span class="truncate tracking-wide text-[11px]">${file.title}</span>
                    </div>
                    <button onclick="window.deleteSessionFile(event, '${file.filename}')" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500/20 text-white/40 hover:text-red-400 rounded-md transition-all text-[10px]" title="Erase Log">✕</button>
                </div>
            `).join('');
        } catch (err) {
            console.error("Cloud synchronization failure:", err);
        }
    }

    async function handleSend() {
        const text = userPromptInput.value.trim();
        if(!text && !activeFilePayload) return;

        showWelcome(false);
        appendMessage('user', text || "Dispatched visual payload attachment...", activeFilePayload);
        
        userPromptInput.value = '';
        userPromptInput.style.height = 'auto';

        const processingId = appendMessage('ai', `
            <div class="flex items-center space-x-2 py-1 font-mono text-xs text-purple-400/70 animate-pulse">
                <div class="w-4 h-4 rounded-full border-2 border-purple-500/20 border-t-purple-400 animate-spin"></div>
                <span>Compiling metrics stream...</span>
            </div>
        `);

        // Cache parameters right before clearing them out
        const sentFile = activeFilePayload;
        const sentMime = activeFileMime;
        clearAttachment();

        try {
            let response, endpoint;
            let payload = { mode: currentMode };

            // Determine routing logic based on file presence constraints
            if (sentFile) {
                endpoint = '/api/gemini';
                payload.message = text;
                payload.fileData = sentFile;
                payload.mimeType = sentMime;
                payload.chatHistory = chatHistory;
            } else {
                endpoint = '/api/chat';
                // Package structural history log for continuous Llama context matching
                payload.messages = [
                    ...chatHistory.map(h => ({ role: h.role, content: h.content })),
                    { role: 'user', content: text }
                ];
            }

            response = await fetch(endpoint, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            document.getElementById(processingId)?.remove();

            if(!response.ok) {
                appendMessage('ai', `⚠️ Error encountered: ${result.error || 'Connection broken.'}`);
                return;
            }

            const incomingText = result.text || "Operational stream returned void formatting.";
            appendMessage('ai', incomingText);

            // Update in-memory multi-turn transaction context arrays
            chatHistory.push({ role: 'user', content: text || "Sent analytical media file." });
            chatHistory.push({ role: 'model', content: incomingText });

            // Automatically back up operations to WebDAV sync network background targets
            saveCurrentSessionCloud();

        } catch (err) {
            document.getElementById(processingId)?.remove();
            appendMessage('ai', `❌ Connection failure: Could not link to operational servers.`);
            console.error(err);
        }
    }

    async function saveCurrentSessionCloud() {
        if(chatHistory.length === 0) return;
        
        // Derive dynamic file window descriptions out of first user text message query metrics
        const leadingText = chatHistory.find(h => h.role === 'user')?.content || 'Saved-Chat';
        const dynamicTitle = leadingText.slice(0, 24).trim() || 'Saved Chat';
        
        try {
            const response = await fetch('/api/chats', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    sessionId: sessionId,
                    title: dynamicTitle,
                    history: chatHistory
                })
            });
            if(response.ok) {
                fetchSessions();
                chatTitleDisplay.textContent = dynamicTitle.replace(/-/g, ' ');
            }
        } catch (err) {
            console.error("Cloud tracking sync dropped:", err);
        }
    }

    function appendMessage(role, rawContent, filePreviewBase64 = null) {
        const uniqueId = 'msg-' + Math.random().toString(36).slice(2, 11);
        const container = document.createElement('div');
        container.id = uniqueId;
        container.className = `flex flex-col space-y-2 max-w-[85%] md:max-w-[75%] p-4 rounded-2xl md:rounded-3xl shadow-md transform animate__animated animate__fadeInUp text-sm select-text ${
            role === 'user' ? 'message-user self-end rounded-br-none' : 'message-ai self-start rounded-bl-none'
        }`;

        let builtHtml = '';
        if(filePreviewBase64) {
            builtHtml += `
                <div class="mb-2 max-w-[200px] border border-white/10 rounded-xl overflow-hidden shadow-lg">
                    <img src="data:${activeFileMime || 'image/jpeg'};base64,${filePreviewBase64}" class="w-full h-auto object-cover">
                </div>
            `;
        }

        if(role === 'user') {
            builtHtml += `<p class="whitespace-pre-wrap leading-relaxed select-text">${rawContent.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>`;
            container.innerHTML = builtHtml;
        } else {
            // Process output string compilation via markdown formatting engine pipelines
            container.innerHTML = formatMarkdown(rawContent);
        }

        chatMessages.appendChild(container);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Perform deferred asynchronous Mermaid flowchart diagram compilation rendering safely
        if(role === 'model' && rawContent.includes('```mermaid')) {
            setTimeout(() => {
                try {
                    mermaid.contentLoaded();
                } catch(mErr) {
                    console.error("Mermaid parsing pipeline error, structure dropped:", mErr);
                }
            }, 50);
        }

        return uniqueId;
    }

    function renderHistoryToScreen() {
        chatMessages.innerHTML = '';
        if(chatHistory.length === 0) {
            showWelcome(true);
            return;
        }
        showWelcome(false);
        chatHistory.forEach(msg => {
            appendMessage(msg.role === 'user' ? 'user' : 'model', msg.content);
        });
    }

    function startEraseNewSessionFrame() {
        sessionId = 'Session_' + Date.now();
        localStorage.setItem('JOES_AI_CURRENT_SESSION', sessionId);
        chatHistory = [];
        clearAttachment();
        renderHistoryToScreen();
        fetchSessions();
    }

    function switchEngineMode(targetMode) {
        currentMode = targetMode;
        modeBtns.forEach(btn => {
            if(btn.getAttribute('data-mode') === targetMode) {
                btn.className = "mode-btn px-2.5 py-1.5 bg-purple-600/20 border border-purple-500/40 text-purple-200 rounded-xl text-xs font-medium flex items-center gap-1.5 transition-all";
            } else {
                btn.className = "mode-btn px-2.5 py-1.5 bg-white/5 border border-white/5 text-white/60 hover:text-white rounded-xl text-xs font-medium flex items-center gap-1.5 transition-all";
            }
        });

        // Interface adjustments according to mode rulesets
        if(targetMode === 'code') {
            headerModeIndicator.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            systemStatusSub.textContent = "Senior Programmatic Automation Engine Active (Force Optimized Outputs)";
        } else if(targetMode === 'study') {
            headerModeIndicator.className = "w-2 h-2 rounded-full bg-cyan-400 animate-pulse";
            systemStatusSub.textContent = "Academic Concept Analysis Mode Active (Quiz questions will append)";
        } else if(targetMode === 'learn') {
            headerModeIndicator.className = "w-2 h-2 rounded-full bg-emerald-400 animate-pulse";
            systemStatusSub.textContent = "Structured Tutorial Advisory Guidance Engine Enabled";
        } else {
            headerModeIndicator.className = "w-2 h-2 rounded-full bg-purple-500 animate-pulse";
            systemStatusSub.textContent = "Routing standard text conversations through Llama-3.1-8B-Instant engine";
        }
    }

    function clearAttachment() {
        activeFilePayload = null;
        activeFileMime = null;
        mediaAttachmentInput.value = '';
        attachmentChipContainer.className = "hidden flex-wrap gap-2 mb-2 p-1.5 bg-white/5 rounded-xl";
    }

    function toggleSidebar(show) {
        if(show) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
    }

    // Attachment processing pipeline hooks
    mediaAttachmentInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;

        activeFileMime = file.type;
        attachmentNameText.textContent = file.name;
        
        const fileReader = new FileReader();
        fileReader.onload = () => {
            activeFilePayload = fileReader.result.split(',')[1];
            attachmentChipContainer.className = "flex flex-wrap gap-2 mb-2 p-1.5 bg-white/5 rounded-xl";
        };
        fileReader.readAsDataURL(file);
    });

    // Core interactive Event Register Framework Mapping Initialization
    function setupEventListeners() {
        submitPromptBtn.addEventListener('click', handleSend);
        
        userPromptInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                e.preventDefault();
                handleSend();
            }
        });

        userPromptInput.addEventListener('input', () => {
            userPromptInput.style.height = 'auto';
            userPromptInput.style.height = userPromptInput.scrollHeight + 'px';
        });

        removeAttachmentTrigger.addEventListener('click', clearAttachment);
        clearFrameTrigger.addEventListener('click', () => {
            if(confirm("Wipe workspace view frame? Active history will preserve inside your profile registry logs.")) {
                startEraseNewSessionFrame();
            }
        });
        newChatSidebarBtn.addEventListener('click', startEraseNewSessionFrame);

        // Copy binary token codes action bindings context events
        document.addEventListener('click', (e) => {
            if(e.target.classList.contains('copy-trigger')) {
                const targetBase64 = e.target.getAttribute('data-code');
                try {
                    const extractedCode = decodeURIComponent(escape(atob(targetBase64)));
                    navigator.clipboard.writeText(extractedCode);
                    const originalText = e.target.textContent;
                    e.target.textContent = 'Copied! ✓';
                    setTimeout(() => e.target.textContent = originalText, 1800);
                } catch(cErr) {
                    console.error("Copy action failed:", cErr);
                }
            }
        });
    }

    function setupSidebarHandlers() {
        openSidebarBtn.addEventListener('click', () => toggleSidebar(true));
        closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
        sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                switchEngineMode(btn.getAttribute('data-mode'));
            });
        });
    }

    function setupThemeHandler() {
        const themeToggle = document.getElementById('theme-toggle');
        const themeStatusText = document.getElementById('theme-status-text');
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeStatusText.textContent = isLight ? "☀️ Daybreak" : "🌙 Nightfall";
            localStorage.setItem('JOES_AI_THEME', isLight ? 'light' : 'dark');
        });

        if(localStorage.getItem('JOES_AI_THEME') === 'light') {
            document.body.classList.add('light');
            themeStatusText.textContent = "☀️ Daybreak";
        }
    }

    function setupExportHandler() {
        document.getElementById('export-session').addEventListener('click', () => {
            if(chatHistory.length === 0) return alert("Workspace trace logs are completely empty.");
            const traceBlob = new Blob([JSON.stringify({ sessionId, mode: currentMode, history: chatHistory }, null, 2)], { type: 'application/json' });
            const temporaryAnchor = document.createElement('a');
            temporaryAnchor.href = URL.createObjectURL(traceBlob);
            temporaryAnchor.download = `JoesAI_MetricsDump_${sessionId}.json`;
            temporaryAnchor.click();
        });
    }

    function setupSpeechRecognition() {
        const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechEngine) {
            voiceInputToggle.style.display = 'none';
            return;
        }

        voiceRecognitionEngine = new SpeechEngine();
        voiceRecognitionEngine.continuous = false;
        voiceRecognitionEngine.interimResults = false;
        voiceRecognitionEngine.lang = 'en-US';

        voiceRecognitionEngine.onstart = () => {
            isRecordingSpeech = true;
            voiceInputToggle.className = "p-2.5 bg-red-500/20 text-red-400 rounded-xl transition-all flex items-center justify-center animate-pulse";
            voiceIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H10a1 1 0 01-1-1v-4z"/>`;
        };

        voiceRecognitionEngine.onresult = (event) => {
            const voiceTranscript = event.results[0][0].transcript;
            userPromptInput.value = (userPromptInput.value + ' ' + voiceTranscript).trim();
            userPromptInput.style.height = 'auto';
            userPromptInput.style.height = userPromptInput.scrollHeight + 'px';
        };

        voiceRecognitionEngine.onerror = (vErr) => console.error("Speech diagnostic caught warning:", vErr);
        
        voiceRecognitionEngine.onend = () => {
            isRecordingSpeech = false;
            voiceInputToggle.className = "p-2.5 hover:bg-white/5 text-white/40 hover:text-white rounded-xl transition-all flex items-center justify-center";
            voiceIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>`;
        };

        voiceInputToggle.addEventListener('click', () => {
            if(isRecordingSpeech) {
                voiceRecognitionEngine.stop();
            } else {
                voiceRecognitionEngine.start();
            }
        });
    }

    function initializeApp() {
        setupEventListeners();
        setupSidebarHandlers();
        setupThemeHandler();
        setupExportHandler();
        setupSpeechRecognition();
        
        // Render welcoming viewport instantly
        showWelcome(true);
        
        // Request user-isolated file arrays from the synced cloud
        fetchSessions();
    }

    // Trigger orchestration routine inside module window
    initializeApp();
  </script>
</body>
</html>
