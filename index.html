    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      googleProvider = new GoogleAuthProvider();
    } catch (error) { console.error('Firebase error:', error); }
    let currentUser = null;
    let chatHistory = [];
    let selectedAttachment = null;
    let voiceRecognition = null;
    let isRecordingVoice = false;
    const CHAT_HISTORY_KEY = 'joes-ai-chat-history';
    let settings = { saveHistory: true, showTyping: true, creativity: 0.7, maxTokens: 1000, darkMode: true, chatMode: 'chat' };
    const MAX_FILE_SIZES = { image: 25, audio: 50, document: 15, data: 10 };
    const AI_MODES = {
      chat: "You are joes ai, a friendly and helpful AI assistant.",
      code: "You are joes ai in Code Mode. Expert programmer.",
      explain: "You are joes ai. Explain code in simple terms.",
      review: "You are joes ai. Perform a code review.",
      debug: "You are joes ai. Debugging expert."
    };
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    const guestButtons = document.getElementById('guest-buttons');
    const userMenu = document.getElementById('user-menu');
    const userAvatar = document.getElementById('user-avatar');
    const userName = document.getElementById('user-name');
    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadChatHistory();
      setupEventListeners();
      checkAuthState();
      if (chatHistory.length) { renderChatHistory(); showWelcome(false); } else { showWelcome(true); }
      setTimeout(() => document.getElementById('page-loader')?.classList.add('loaded'), 350);
    });
    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
      document.getElementById('login-btn')?.addEventListener('click', openLoginModal);
      document.getElementById('register-btn')?.addEventListener('click', openRegisterModal);
      document.getElementById('logout-btn')?.addEventListener('click', logout);
      document.getElementById('google-login-btn')?.addEventListener('click', signInWithGoogle);
      document.getElementById('email-login-form')?.addEventListener('submit', handleEmailLogin);
      document.getElementById('email-register-form')?.addEventListener('submit', handleEmailRegister);
      document.getElementById('settings-btn')?.addEventListener('click', openSettingsModal);
      document.getElementById('clear-chat-btn')?.addEventListener('click', clearChat);
      document.getElementById('mic-btn')?.addEventListener('click', toggleVoiceInput);
      document.getElementById('run-ocr-btn')?.addEventListener('click', runOCR);
      document.getElementById('start-audio-transcription-btn')?.addEventListener('click', transcribeAudio);
      document.getElementById('insert-attachment-text-btn')?.addEventListener('click', insertAttachmentText);
      document.getElementById('attachment-btn')?.addEventListener('click', (e) => {
        const hint = document.getElementById('size-hint');
        if (hint) { hint.classList.toggle('hidden'); if (!hint.classList.contains('hidden')) setTimeout(() => hint.classList.add('hidden'), 3000); }
        setTimeout(() => document.getElementById('file-input')?.click(), 50);
      });
      document.getElementById('file-input')?.addEventListener('change', handleFileSelect);
      const themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) themeBtn.addEventListener('click', toggleDarkMode);
      const exportBtn = document.getElementById('export-history-btn');
      if (exportBtn) exportBtn.addEventListener('click', exportChatHistory);
      const deleteBtn = document.getElementById('delete-history-btn');
      if (deleteBtn) deleteBtn.addEventListener('click', () => {
        localStorage.removeItem(CHAT_HISTORY_KEY);
        chatHistory = [];
        chatMessages.innerHTML = '';
        showWelcome(true);
        closeSettingsModal();
      });
    }
    function checkAuthState() {
      onAuthStateChanged(auth, async (user) => {
        if (user) { currentUser = user; await updateUIForLoggedInUser(user); }
        else { currentUser = null; updateUIForGuest(); }
      });
    }
    async function updateUIForLoggedInUser(user) {
      guestButtons.classList.add('hidden');
      userMenu.classList.remove('hidden');
      const displayName = user.displayName || user.email.split('@')[0];
      userAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=7c3aed&color=fff`;
      userName.textContent = displayName;
      userName.classList.remove('hidden');
      const upgradeBtn = document.getElementById('upgrade-btn');
      const adminBtn = document.getElementById('admin-dashboard-btn');
      try {
        const response = await fetch(`${BACKEND_URL}/api/check-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: user.email }) });
        const data = await response.json();
        if (data.isAdmin) { adminBtn.classList.remove('hidden'); if (upgradeBtn) upgradeBtn.classList.add('hidden'); }
        else { if (adminBtn) adminBtn.classList.add('hidden'); if (upgradeBtn) upgradeBtn.classList.remove('hidden'); }
      } catch (err) { console.error("Admin check failed", err); }
    }
    function updateUIForGuest() { guestButtons.classList.remove('hidden'); userMenu.classList.add('hidden'); }
    async function signInWithGoogle() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const check = await fetch(`${BACKEND_URL}/api/check-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: result.user.email }) });
        const adminData = await check.json();
        await setDoc(doc(db, 'users', result.user.uid), { email: result.user.email, isAdmin: adminData.isAdmin, lastLogin: new Date() }, { merge: true });
        closeLoginModal();
      } catch (err) { addMessageToUI('assistant', `Sign-in error: ${err.message}`); }
    }
    async function handleEmailLogin(e) {
      e.preventDefault();
      try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value); closeLoginModal(); }
      catch (err) { addMessageToUI('assistant', `Login error: ${err.message}`); }
    }
    async function handleEmailRegister(e) {
      e.preventDefault();
      const email = document.getElementById('register-email').value;
      try {
        const result = await createUserWithEmailAndPassword(auth, email, document.getElementById('register-password').value);
        const check = await fetch(`${BACKEND_URL}/api/check-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
        const adminData = await check.json();
        await setDoc(doc(db, 'users', result.user.uid), { email, isAdmin: adminData.isAdmin, createdAt: new Date() });
        closeRegisterModal();
      } catch (err) { addMessageToUI('assistant', `Register error: ${err.message}`); }
    }
    async function logout() { await signOut(auth); }
    async function streamTextToUI(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-start animate__animated animate__fadeInUp';
      wrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl rounded-bl-md chat-gradient text-white ai-message shadow-lg streaming-cursor"><span class="stream-text"></span></div>`;
      chatMessages.appendChild(wrapper);
      const streamSpan = wrapper.querySelector('.stream-text');
      chatMessages.scrollTop = chatMessages.scrollHeight;
      let charIndex = 0;
      await new Promise((resolve) => {
        const interval = setInterval(() => {
          if (charIndex < text.length) {
            streamSpan.innerHTML = formatMarkdown(text.slice(0, ++charIndex));
            chatMessages.scrollTop = chatMessages.scrollHeight;
          } else {
            clearInterval(interval);
            wrapper.classList.remove('streaming-cursor');
            const msgDiv = wrapper.firstElementChild;
            msgDiv.style.transition = 'box-shadow 0.5s ease';
            msgDiv.style.boxShadow = '0 0 30px rgba(124,58,237,0.3)';
            setTimeout(() => { msgDiv.style.boxShadow = ''; }, 800);
            resolve();
          }
        }, 12);
      });
    }
    async function handleSend() {
      const message = messageInput.value.trim();
      const hasAttachment = !!selectedAttachment;
      if (!message && !hasAttachment) return;
      addMessageToUI('user', message || '(sent an attachment)');
      chatHistory.push({ role: 'user', content: message });
      messageInput.value = '';
      messageInput.style.height = 'auto';
      showWelcome(false);
      showProcessingIndicator(hasAttachment ? 'AI' : 'Groq');
      try {
        let aiFullContent = '';
        let isStream = false;
        if (hasAttachment) {
          const fileData = await readFileAsBase64(selectedAttachment);
          const mimeType = selectedAttachment.type || 'application/octet-stream';
          const geminiRes = await fetch(`${BACKEND_URL}/api/gemini`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, fileData, mimeType })
          });
          const geminiData = await geminiRes.json();
          aiFullContent = geminiData.text || 'AI did not return text.';
        } else {
          const response = await fetch(`${BACKEND_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [ { role: 'system', content: AI_MODES[settings.chatMode] }, ...chatHistory.slice(-10) ],
              model: 'llama-3.1-8b-instant',
              temperature: settings.creativity,
              max_tokens: settings.maxTokens,
              stream: true
            })
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const streamCheck = response.headers.get('content-type')?.includes('text/event-stream');
          if (streamCheck) {
            isStream = true;
            removeProcessingIndicator();
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            const streamWrapper = document.createElement('div');
            streamWrapper.className = 'flex justify-start animate__animated animate__fadeInUp';
            streamWrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl rounded-bl-md chat-gradient text-white ai-message shadow-lg streaming-cursor"><span class="stream-text"></span></div>`;
            chatMessages.appendChild(streamWrapper);
            const streamSpan = streamWrapper.querySelector('.stream-text');
            chatMessages.scrollTop = chatMessages.scrollHeight;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed === 'data: [DONE]') continue;
                if (trimmed.startsWith('data: ')) {
                  try {
                    const data = JSON.parse(trimmed.slice(6));
                    const delta = data.choices?.[0]?.delta?.content || '';
                    if (delta) { aiFullContent += delta; streamSpan.innerHTML = formatMarkdown(aiFullContent); chatMessages.scrollTop = chatMessages.scrollHeight; }
                  } catch (e) { continue; }
                }
              }
            }
            streamWrapper.classList.remove('streaming-cursor');
            streamSpan.innerHTML = formatMarkdown(aiFullContent);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            const msgDiv = streamWrapper.firstElementChild;
            msgDiv.style.transition = 'box-shadow 0.5s ease';
            msgDiv.style.boxShadow = '0 0 30px rgba(124,58,237,0.3)';
            setTimeout(() => { msgDiv.style.boxShadow = ''; }, 800);
          } else {
            removeProcessingIndicator();
            const data = await response.json();
            aiFullContent = data?.choices?.[0]?.message?.content || data?.text || '';
          }
        }
        if (aiFullContent) {
          if (hasAttachment || !isStream) {
            await streamTextToUI(aiFullContent);
          }
          chatHistory.push({ role: 'assistant', content: aiFullContent });
          saveChatHistory();
        }
      } catch (err) {
        removeProcessingIndicator();
        console.error(err);
        addMessageToUI('assistant', `Error: ${err.message}. Verify backend: ${BACKEND_URL}`);
      } finally {
        clearAttachmentChips();
        selectedAttachment = null;
      }
    }
    function addMessageToUI(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp`;
      if (role === 'user') {
        wrapper.innerHTML = `<div class="max-w-[80%] px-4 py-3 rounded-2xl rounded-br-md bg-gradient-to-br from-purple-600 to-indigo-600 text-white shadow-lg shadow-purple-900/30">${escapeHtml(content)}</div>`;
      } else {
        wrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl rounded-bl-md chat-gradient text-white ai-message shadow-lg">${formatMarkdown(escapeHtml(content))}</div>`;
      }
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    function showProcessingIndicator(provider = 'Groq') {
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start animate__animated animate__fadeInUp';
      const providerClass = provider === 'Gemini' ? 'gemini-wave' : 'groq-wave';
      div.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span class="ml-3 text-sm self-center processing-pulse ${providerClass}">${provider} is thinking</span>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    function removeProcessingIndicator() {
      const el = document.getElementById('processing-indicator');
      if (el) { el.style.transition = 'opacity 0.3s ease'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }
    }
    function formatMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
      html = html.replace(/`([^`]+)`/g, '<code class="bg-white/10 px-1.5 py-0.5 rounded text-purple-200 font-mono text-sm">$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/(?<!<\/pre>)\n(?!<pre>)/g, '<br>');
      html = html.replace(/^- (.+)/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      return html;
    }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function showWelcome(show) {
      let welcome = document.getElementById('welcome-screen');
      if (show && !welcome) {
        welcome = document.createElement('div');
        welcome.id = 'welcome-screen';
        welcome.className = 'flex justify-center py-8 animate__animated animate__fadeInUp';
        welcome.innerHTML = `<div class="text-center"><div class="w-16 h-16 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div><h3 class="text-white text-xl font-bold mb-2">Welcome to joes ai!</h3><p class="text-purple-300">Your intelligent AI assistant</p><p class="text-white/60 text-sm mt-4">Start a conversation or try different modes below</p><p class="text-white/40 text-xs mt-6">Developed by Joes Technologies Uganda Ltd</p></div>`;
        chatMessages.appendChild(welcome);
      } else if (!show && welcome) { welcome.remove(); }
    }
    function loadSettings() {
      try {
        const saved = localStorage.getItem('joes-ai-settings');
        if (saved) settings = { ...settings, ...JSON.parse(saved) };
        document.body.classList.toggle('light', !settings.darkMode);
      } catch (e) {}
    }
    function saveSettings() { try { localStorage.setItem('joes-ai-settings', JSON.stringify(settings)); } catch (e) {} }
    function saveChatHistory() { try { localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory)); } catch (e) { console.error('Could not save chat history', e); } }
    function loadChatHistory() { try { const saved = localStorage.getItem(CHAT_HISTORY_KEY); if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) chatHistory = parsed; } } catch (e) { console.error('Could not load chat history', e); } }
    function renderChatHistory() { chatMessages.innerHTML = ''; chatHistory.forEach((item) => addMessageToUI(item.role, item.content)); }
    function clearChat() { chatMessages.innerHTML = ''; chatHistory = []; localStorage.removeItem(CHAT_HISTORY_KEY); showWelcome(true); }
    function toggleVoiceInput() { isRecordingVoice ? stopVoiceInput() : startVoiceInput(); }
    function handleFileSelect(event) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      const file = files[0];
      const maxSizeBytes = Math.max(MAX_FILE_SIZES.image, MAX_FILE_SIZES.audio, MAX_FILE_SIZES.document, MAX_FILE_SIZES.data) * 1024 * 1024;
      if (file.size > maxSizeBytes) {
        addMessageToUI('assistant', `File too large: ${file.name} is ${(file.size / 1024 / 1024).toFixed(1)}MB.`);
        event.target.value = '';
        return;
      }
      selectedAttachment = file;
      addAttachmentChip();
      event.target.value = '';
    }
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function addAttachmentChip() {
      const container = document.getElementById('attachment-chip-container');
      if (!container || !selectedAttachment) return;
      container.classList.remove('hidden');
      container.innerHTML = '';
      const chip = document.createElement('div');
      chip.className = 'inline-flex items-center space-x-2 bg-white/10 border border-white/20 rounded-full pl-3 pr-2 py-1 text-white text-sm animate__animated animate__fadeInUp';
      chip.innerHTML = `<span class="truncate max-w-[180px]">${escapeHtml(selectedAttachment.name)}</span><button class="hover:text-red-400 transition-colors" onclick="window.clearAttachmentChip && window.clearAttachmentChip()">X</button>`;
      container.appendChild(chip);
    }
    function clearAttachmentChips() {
      const container = document.getElementById('attachment-chip-container');
      if (container) { container.innerHTML = ''; container.classList.add('hidden'); }
      selectedAttachment = null;
    }
    function toggleDarkMode() {
      settings.darkMode = !settings.darkMode;
      document.body.classList.toggle('light', !settings.darkMode);
      saveSettings();
    }
    function exportChatHistory() {
      const data = JSON.stringify(chatHistory, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'joes-ai-chat-history.json';
      a.click();
      URL.revokeObjectURL(url);
      closeSettingsModal();
    }
    window.openLoginModal = () => document.getElementById('login-modal')?.classList.remove('hidden');
    window.closeLoginModal = () => document.getElementById('login-modal')?.classList.add('hidden');
    window.openRegisterModal = () => document.getElementById('register-modal')?.classList.remove('hidden');
    window.closeRegisterModal = () => document.getElementById('register-modal')?.classList.add('hidden');
    window.switchToRegister = () => window.openRegisterModal();
    window.openSettingsModal = () => document.getElementById('settings-modal')?.classList.remove('hidden');
    window.closeSettingsModal = () => document.getElementById('settings-modal')?.classList.add('hidden');
    window.clearAttachmentChip = () => clearAttachmentChips();
    window.openAttachmentModal = () => document.getElementById('attachment-modal')?.classList.remove('hidden');
    window.closeAttachmentModal = () => document.getElementById('attachment-modal')?.classList.add('hidden');
  </script>
</body>
</html>
