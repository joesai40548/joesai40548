<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joes AI | Smart Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .recording-ring { animation: pulse 1.5s infinite; background: #fee2e2; border: 2px solid #ef4444; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-80 bg-white border-r flex flex-col z-20">
      <div class="p-6">
          <div class="flex items-center gap-3 mb-8">
              <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                  <i data-lucide="zap"></i>
              </div>
              <h1 class="font-bold text-xl tracking-tight">Joes AI</h1>
          </div>
          <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition font-medium shadow-md">
              <i data-lucide="plus" class="w-4 h-4"></i> New Chat
          </button>
      </div>
      <div id="session-list" class="flex-1 overflow-y-auto px-4 pb-4 space-y-2"></div>
  </aside>

  <!-- Chat Area -->
  <main class="flex-1 flex flex-col relative h-full">
      <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
      
      <!-- Typing Indicator -->
      <div id="typing" class="hidden absolute bottom-24 left-10 text-xs text-slate-400 italic">Joes AI is thinking...</div>

      <div class="p-4 bg-white/80 backdrop-blur-md border-t">
          <div id="attachment-bar" class="flex flex-wrap gap-2 px-4 mb-2"></div>
          
          <div class="max-w-4xl mx-auto flex items-end gap-3 bg-white border border-slate-200 shadow-xl rounded-2xl p-2 pr-4 focus-within:border-indigo-500 transition-all">
              <button id="attachment-btn" class="p-3 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-xl">
                  <i data-lucide="paperclip"></i>
              </button>
              <button id="voice-btn" class="p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-lucide="mic"></i>
              </button>
              <textarea id="message-input" rows="1" class="flex-1 bg-transparent border-none py-3 px-1 focus:outline-none resize-none max-h-40" placeholder="Chat with Groq, analyze files with Gemini..."></textarea>
              <button id="send-btn" class="w-12 h-12 bg-indigo-600 text-white rounded-xl shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition">
                  <i data-lucide="send"></i>
              </button>
          </div>
          <input type="file" id="file-input" class="hidden" multiple>
      </div>
  </main>

  <script>
    const BACKEND = 'http://localhost:3000';
    let userId = 'admin-user'; // Replace with Auth Logic
    let currentSessionId = Date.now().toString(36);
    let currentAttachments = [];
    let chatHistory = [];

    // --- Animations & UI Helpers ---
    function renderMessage(role, content) {
        const chat = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster`;
        
        const inner = document.createElement('div');
        inner.className = `max-w-2xl px-5 py-3 rounded-2xl shadow-sm ${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border text-slate-800 rounded-tl-none'}`;
        
        const sanitizedHtml = DOMPurify.sanitize(marked.parse(content));
        inner.innerHTML = sanitizedHtml;
        msgDiv.appendChild(inner);
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
        lucide.createIcons();
    }

    // --- Voice Logic (Stub implemented) ---
    const voiceBtn = document.getElementById('voice-btn');
    voiceBtn.addEventListener('mousedown', () => { voiceBtn.classList.add('recording-ring'); });
    voiceBtn.addEventListener('mouseup', () => { voiceBtn.classList.remove('recording-ring'); });

    // --- File Handling ---
    const fileInput = document.getElementById('file-input');
    const attachmentBtn = document.getElementById('attachment-btn');
    const attachmentBar = document.getElementById('attachment-bar');

    attachmentBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
        for (const file of e.target.files) {
            const base64 = await toBase64(file);
            currentAttachments.push({ name: file.name, mime: file.type, data: base64.split(',')[1] });
            const chip = document.createElement('div');
            chip.className = "bg-slate-100 text-xs px-2 py-1 rounded flex items-center gap-1 border animate__animated animate__bounceIn";
            chip.innerHTML = `<i data-lucide="file" class="w-3 h-3"></i> ${file.name.substring(0,10)}...`;
            attachmentBar.appendChild(chip);
            lucide.createIcons();
        }
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- Sending Logic ---
    async function handleSend() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text && currentAttachments.length === 0) return;

        input.value = '';
        renderMessage('user', text || "(Attachment Analysis Request)");
        document.getElementById('typing').classList.remove('hidden');

        try {
            const payload = {
                messages: [...chatHistory, { role: 'user', content: text }],
                attachments: currentAttachments,
                mode: 'chat'
            };

            const res = await fetch(`${BACKEND}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            document.getElementById('typing').classList.add('hidden');
            renderMessage('assistant', data.text);

            // Update local state
            chatHistory.push({ role: 'user', content: text });
            chatHistory.push({ role: 'assistant', content: data.text });
            currentAttachments = [];
            attachmentBar.innerHTML = '';

            // Auto-Save Session
            await fetch(`${BACKEND}/api/chats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
                body: JSON.stringify({
                    sessionId: currentSessionId,
                    title: text.substring(0, 20) || "Attachment Chat",
                    history: chatHistory
                })
            });
            refreshSidebar();

        } catch (e) { alert("AI routing failed."); }
    }

    async function refreshSidebar() {
        const res = await fetch(`${BACKEND}/api/chats`, { headers: { 'x-user-id': userId } });
        const list = await res.json();
        const sidebar = document.getElementById('session-list');
        sidebar.innerHTML = list.map(s => `
            <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition cursor-pointer border border-transparent hover:border-slate-100">
                <span class="text-sm font-medium text-slate-600 truncate">${s.title}</span>
                <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i>
            </div>
        `).join('');
        lucide.createIcons();
    }

    document.getElementById('send-btn').addEventListener('click', handleSend);
    document.getElementById('message-input').addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey) {e.preventDefault(); handleSend();} });
    document.getElementById('new-chat-btn').addEventListener('click', () => { 
        currentSessionId = Date.now().toString(36); 
        chatHistory = []; 
        document.getElementById('chat-messages').innerHTML = '';
    });

    lucide.createIcons();
    refreshSidebar();
  </script>
</body>
</html>
