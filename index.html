  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default', look: 'handDrawn' });
    window.mermaid = mermaid;
  </script>

  <script type="module">
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    let userId = 'default';
    let currentSessionId = null;

    // Remove Spinning Circle Loader on Complete Parse Execution Window
    async function initApp() {
        const loader = document.getElementById('page-loader');
        
        try {
            // Step 1: Query Dynamic Configuration Setup from Cloud Backend Env Layers
            const configRes = await fetch(`${BACKEND_URL}/api/config`);
            if (!configRes.ok) throw new Error("Backend setup configurations unreached.");
            const firebaseConfig = await configRes.json();
            
            // Step 2: Initialize Firebase Client
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            // Step 3: Configure Auth State Observability Change Flow
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    userId = user.uid;
                    document.getElementById('user-status-email').innerText = user.email || 'Verified Account';
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    checkAdminStatus(user.email);
                    loadSessions();
                } else {
                    document.getElementById('app').classList.add('hidden');
                    document.getElementById('auth-screen').classList.remove('hidden');
                }
                
                // Clear the loader layout once auth determination completes
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            });

        } catch (err) {
            console.error("Initialization Failed:", err);
            // Fallback clear loader layout so developer can troubleshoot console
            if (loader) loader.style.display = 'none';
            alert("Backend status offline. Ensure your Render web service is live and active.");
        }

        if (window.lucide) { lucide.createIcons(); }
    }

    async function checkAdminStatus(email) {
        try {
            const res = await fetch(`${BACKEND_URL}/api/check-admin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.isAdmin) {
                document.getElementById('admin-trigger').classList.remove('hidden');
            }
        } catch(e) { console.error("Admin verification step failed."); }
    }

    // Chat State

        function getCurrentMode() {

    function renderMessage(role, content) {
        const messagesDiv = document.getElementById('chat-messages');
        const msgEl = document.createElement('div');
        msgEl.className = role === 'user' ? 'self-end bg-indigo-600 text-white px-4 py-2 rounded-xl max-w-[80%]' : 'self-start bg-slate-100 text-slate-800 px-4 py-2 rounded-xl max-w-[80%]';
        msgEl.textContent = content;
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function formatCodeDiff(original, refactored) {
        const diffLines = [];
        const origLines = original.split('\n');
        const refLines = (refactored || '').split('\n');
        
        origLines.forEach((line, i) => {
            if (line && !refLines.includes(line)) {
                diffLines.push(`<div class="text-red-500 line-through">- ${escapeHtml(line)}</div>`);
            }
        });
        
        refLines.forEach(line => {
            if (line && !origLines.includes(line)) {
                diffLines.push(`<div class="text-green-500">+ ${escapeHtml(line)}</div>`);
            }
        });
        
        return `<pre class="bg-slate-900 p-3 rounded-lg text-xs overflow-x-auto">${diffLines.join('\n')}</pre>`;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        if (!message) return;

        const mode = getCurrentMode();

        if (message.startsWith('/')) {
            handleSlashCommand(message, mode);
            input.value = '';
            return;
        }

        input.value = '';
        chatHistory.push({ role: 'user', content: message });
        renderMessage('user', message);

        try {
            const res = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
                body: JSON.stringify({ messages: chatHistory, mode })
            });
            const data = await res.json();
            if (data.text) {
                chatHistory.push({ role: 'assistant', content: data.text });
                renderMessage('assistant', data.text);
            }
            saveChat();
        } catch (err) {
            renderMessage('assistant', 'Error connecting to AI service.');
        }
    }

    async function handleSlashCommand(cmd, mode) {
        const [command, ...args] = cmd.split(' ');
        const arg = args.join(' ');

        switch (command) {
            case '/explain':
                const explainRes = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: `Explain in simple terms: ${arg || 'this concept'}` }], mode: 'learn' })
                });
                const explainData = await explainRes.json();
                renderMessage('assistant', explainData.text || 'Could not generate explanation.');
                break;

            case '/refactor':
                if (arg) {
                    const refactorRes = await fetch(`${BACKEND_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: [{ role: 'user', content: `Refactor this code: ${arg}` }], mode: 'code' })
                    });
                    const refactorData = await refactorRes.json();
                    renderMessage('assistant', formatCodeDiff(arg, refactorData.text) || 'Could not refactor code.');
                }
                break;

            case '/test':
                if (arg) {
                    try {
                        const funcMatch = arg.match(/(?:function\s+(\w+)|const\s+(\w+)|let\s+(\w+))\s*[\(]/);
                        const funcName = funcMatch ? funcMatch[1] || funcMatch[2] || funcMatch[3] : 'test';
                        const testRes = await fetch(`${BACKEND_URL}/api/test/generate`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ functions: [{ name: funcName, body: '' }], language: 'javascript' })
                        });
                        const testData = await testRes.json();
                        renderMessage('assistant', '```javascript\n' + testData.tests + '\n```');
                    } catch (e) {
                        renderMessage('assistant', 'Could not generate tests.');
                    }
                }
                break;

            case '/summarize':
                const summarize = chatHistory.map(m => `${m.role}: ${m.content}`).join('\n').substring(0, 2000);
                const sumRes = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: `Summarize: ${summarize}` }], mode: 'chat' })
                });
                const sumData = await sumRes.json();
                renderMessage('assistant', `**Summary:**\n${sumData.text || 'Could not generate summary.'}`);
                break;

            default:
                renderMessage('assistant', 'Unknown command. Try /explain, /refactor, /test, or /summarize');
        }
    }

    // Export PDF with Syntax-Preserved Formatting
    document.getElementById('export-btn').addEventListener('click', async () => {
        const printStyles = `
            <style>
                .chat-message { margin: 8px 0; page-break-inside: avoid; }
                pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow: hidden; font-size: 10px; }
                code { font-family: 'Courier New', monospace; }
                .user-msg { text-align: right; }
                .ai-msg { text-align: left; }
                @media print { 
                    body { background: white !important; }
                    .chat-message { break-inside: avoid; }
                }
            </style>
        `;
        
        let content = '<div style="font-family: Arial, sans-serif; padding: 20px;">';
        chatHistory.forEach(m => {
            const role = m.role === 'user' ? 'user-msg' : 'ai-msg';
            const safeContent = m.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            content += `<div class="chat-message ${role}"><strong>${role === 'user' ? 'You' : 'Joes AI'}:</strong> ${safeContent}</div>`;
        });
        content += '</div>';
        
        const tempEl = document.createElement('div');
        tempEl.innerHTML = printStyles + content;
        document.body.appendChild(tempEl);
        
        html2pdf().from(tempEl).save('chat-export.pdf').then(() => {
            document.body.removeChild(tempEl);
            showToast('PDF exported successfully', 'success');
        });
    });

    // Toast Notifications
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-sm shadow-lg transform transition-all duration-300 ${
            type === 'success' ? 'bg-green-500 text-white' : 
            type === 'error' ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'
        }`;
        toast.textContent = message;
        toast.style.transform = 'translateY(100%)';
        document.body.appendChild(toast);
        
        setTimeout(() => toast.style.transform = 'translateY(0)', 10);
        setTimeout(() => {
            toast.style.transform = 'translateY(100%)';
            setTimeout(() => document.body.removeChild(toast), 300);
        }, 3000);
    }

    // Theme Switcher
    function setupThemeSwitcher() {
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === '1') applyTheme('nord');
            if (e.ctrlKey && e.key === '2') applyTheme('slate');

    function applyTheme(themeName) {
        const theme = themes[themeName];
        if (!theme) return;
        document.body.style.setProperty('--theme-bg', theme.bg);
        document.body.style.setProperty('--theme-accent', theme.accent);
        document.body.style.backgroundColor = theme.bg;

    function toggleSidebar() {

    // Side-by-Side Split Workspace
    function initSplitWorkspace() {
        if (window.Split) {

            if (chatMain && sandbox) {

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {

    // Load Sessions
    async function loadSessions() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/chats`, {
                headers: { 'x-user-id': userId }
            });
            const sessions = await res.json();
            const listEl = document.getElementById('session-list');
            listEl.innerHTML = sessions.map(s => 
                `<div class="flex items-center gap-1 p-2 text-xs bg-slate-50 rounded-lg group">
                    <button class="flex-1 text-left truncate session-click" data-filename="${s.filename}">${s.title}</button>
                    <button class="rename-session text-slate-400 hover:text-indigo-600 hidden" data-filename="${s.filename}" title="Rename">✎</button>
                    <button class="delete-session text-slate-400 hover:text-red-500 hidden" data-filename="${s.filename}" title="Delete">✕</button>
                </div>`
            ).join('');
            
            listEl.querySelectorAll('.session-click').forEach((btn, i) => {
                btn.addEventListener('click', async () => {
                    const filename = btn.getAttribute('data-filename');
                    const res = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                        headers: { 'x-user-id': userId }
                    });
                    const data = await res.json();
                    chatHistory = data.history || [];
                    document.getElementById('chat-messages').innerHTML = '';
                    chatHistory.forEach(m => renderMessage(m.role, m.content));
                    currentSessionId = data.sessionId;
                });
                
                btn.addEventListener('mouseenter', () => {
                    btn.parentElement.querySelector('.rename-session').classList.remove('hidden');
                    btn.parentElement.querySelector('.delete-session').classList.remove('hidden');
                });
                btn.addEventListener('mouseleave', () => {
                    btn.parentElement.querySelector('.rename-session').classList.add('hidden');
                    btn.parentElement.querySelector('.delete-session').classList.add('hidden');
                });
            });
            
            listEl.querySelectorAll('.rename-session').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const filename = btn.getAttribute('data-filename');
                    const newTitle = prompt('Enter new title:');
                    if (!newTitle) return;
                    await fetch(`${BACKEND_URL}/api/chats/rename`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ oldFilename: filename, sessionId: currentSessionId, newTitle })
                    });
                    loadSessions();
                });
            });
            
            listEl.querySelectorAll('.delete-session').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm('Delete this chat?')) return;
                    const filename = btn.getAttribute('data-filename');
                    await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                        method: 'DELETE',
                        headers: { 'x-user-id': userId }
                    });
                    loadSessions();
                    if (chatHistory.length > 0 && currentSessionId) {
                        document.getElementById('chat-messages').innerHTML = '';
                        chatHistory = [];
                        currentSessionId = Date.now().toString(36);
                    }
                });
            });
        } catch (err) {
            console.error('Failed to load sessions:', err);
        }
    }

    // New Chat
    document.getElementById('new-chat-btn').addEventListener('click', () => {
        chatHistory = [];
        document.getElementById('chat-messages').innerHTML = '';
        currentSessionId = Date.now().toString(36);
    });

    // Save Chat
    function saveChat() {
        if (!currentSessionId) currentSessionId = Date.now().toString(36);
        fetch(`${BACKEND_URL}/api/chats`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
            body: JSON.stringify({
                sessionId: currentSessionId,
                title: `Chat ${new Date().toLocaleString()}`,
                history: chatHistory
            })
        }).then(() => {
            loadSessions();
            storeMemory();
        });
    }

    // Long-term Memory
    function storeMemory() {
        const summary = chatHistory.map(m => m.content).join(' ').substring(0, 500);
        fetch(`${BACKEND_URL}/api/memory/store`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
            body: JSON.stringify({ sessionId: currentSessionId, content: summary })
        });
    }

    // Tool Invocation
    async function invokeTool(tool, args) {
        const res = await fetch(`${BACKEND_URL}/api/tools/invoke`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': userId },
            body: JSON.stringify({ tool, args })
        });
        return res.json();
    }

    // File Upload - Multi-modal
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async () => {
            const fileData = reader.result.split(',')[1];
            let endpoint = '';
            
            if (file.type.startsWith('image/')) {
                endpoint = '/api/upload-image';
            } else if (file.type.startsWith('audio/')) {
                endpoint = '/api/upload-audio';
            } else {
                chatHistory.push({ role: 'user', content: `File uploaded: ${file.name}` });
                renderMessage('user', `File uploaded: ${file.name}`);
                return;
            }

            try {
                const res = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileData, mimeType: file.type })
                });
                const data = await res.json();
                if (data.text) {
                    chatHistory.push({ role: 'assistant', content: data.text });
                    renderMessage('assistant', data.text);
                }
            } catch (err) {
                renderMessage('assistant', 'Could not process file.');
            }
        };
        reader.readAsDataURL(file);
    });

    // Run core engine stack initiation sequence
    initApp();
    addDeployButton();
    setupThemeSwitcher();
  </script>
