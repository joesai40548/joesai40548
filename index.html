<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Joes AI - Intelligent AI Assistant & Coding Workspace</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    (function() {
      const originalWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) {
          return; // Mute the production warning cleanly
        }
        originalWarn.apply(console, args);
      };
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease; }
    .gradient-bg { background: #f8fafc; }
    .chat-gradient { background: rgba(255, 255, 255, 0.75) !important; backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(15, 23, 42, 0.08); color: #334155 !important; }
    
    /* 2026 Era Micro-Scrollbars */
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }

    /* Collapsible Sidebar Logic */
    #sidebar { transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.3s ease; }
    #sidebar.collapsed { width: 5rem !important; }
    #sidebar.collapsed .sidebar-text, #sidebar.collapsed .sidebar-icon-only { opacity: 0; display: none; }
    #sidebar.collapsed .sidebar-center-icon { justify-content: center; margin: 0 auto; }
    #sidebar.collapsed .p-4 { padding: 1rem 0.5rem; }

    @keyframes snakeWave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .snake-dot { animation: snakeWave 1.2s ease-in-out infinite; width: 6px; height: 6px; background-color: #4f46e5; border-radius: 50%; display: inline-block; }
    .snake-dot:nth-child(2) { animation-delay: 0.15s; }
    .snake-dot:nth-child(3) { animation-delay: 0.3s; }
    .snake-dot:nth-child(4) { animation-delay: 0.45s; }
    
    /* Ambient hardware-accelerated glowing mesh */
    body { background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(99, 102, 241, 0.08) 0%, #f1f5f9 60%); }
    @keyframes borderGlow { 0%, 100% { border-color: rgba(79, 70, 229, 0.4); box-shadow: 0 0 15px rgba(99, 102, 241, 0.15); } 50% { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 0 20px rgba(236, 72, 153, 0.2); } }
    .glowing-input:focus-within { animation: borderGlow 4s ease-in-out infinite; }
    
    table { border-collapse: collapse; width: 100%; margin: 16px 0; border-radius: 8px; overflow: hidden; }
    th { background-color: rgba(15, 23, 42, 0.04); color: #4f46e5 !important; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 12px 16px; border-bottom: 1px solid rgba(15, 23, 42, 0.08); text-align: left; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(15, 23, 42, 0.06); text-align: left; }
    tr:hover { background-color: rgba(15, 23, 42, 0.02); }
    
    @keyframes skeletonSweeper { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .claude-shimmer { background: linear-gradient(90deg, rgba(15,23,42,0.03) 25%, rgba(15,23,42,0.08) 50%, rgba(15,23,42,0.03) 75%); background-size: 200% 100%; animation: skeletonSweeper 1.6s infinite linear; }
    .app-container { height: 100dvh; max-height: 100dvh; width: 100vw; display: flex; overflow: hidden; position: relative; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); }
  </style>
</head>
<body class="gradient-bg min-h-screen text-slate-800 relative">

  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-br from-indigo-500/10 via-purple-500/5 to-transparent blur-[120px] animate-[pulse_8s_ease-in-out_infinite] will-change-transform"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-tr from-pink-500/5 via-indigo-500/5 to-transparent blur-[140px] animate-[pulse_12s_ease-in-out_infinite] will-change-transform"></div>
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#00000003_1px,transparent_1px),linear-gradient(to_bottom,#00000004_1px,transparent_1px)] bg-[size:32px_32px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>
  </div>

  <div id="page-loader" class="fixed inset-0 z-[100] bg-[#f8fafc] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(79,70,229,0.5)]"></div>
  </div>

  <div id="auth-screen" class="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-100/40 backdrop-blur-md hidden animate__animated animate__fadeIn">
      <div class="bg-white/80 backdrop-blur-xl border border-slate-200/50 rounded-[2rem] p-6 md:p-8 w-full max-w-md shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] space-y-6 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
          <div class="text-center relative z-10">
              <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg text-white mx-auto mb-4 hover:scale-105 transition-transform duration-300">
                  <i data-lucide="zap" class="w-7 h-7 fill-current"></i>
              </div>
              <h1 id="auth-title" class="text-2xl font-bold text-slate-900 tracking-tight">Sign In to Joes AI</h1>
              <p class="text-xs text-slate-500 mt-1.5 font-medium">Unlock your private, 2026-era production workspace</p>
          </div>
          
          <div class="flex border-b border-slate-200/60 relative z-10">
              <button id="tab-signin" class="flex-1 pb-3 text-center border-b-[3px] border-indigo-600 font-bold text-sm text-indigo-600 transition-colors">Sign In</button>
              <button id="tab-signup" class="flex-1 pb-3 text-center border-b-[3px] border-transparent font-semibold text-sm text-slate-400 hover:text-slate-600 transition-colors">Sign Up</button>
          </div>

          <div class="space-y-4 relative z-10">
              <div class="group">
                  <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider group-focus-within:text-indigo-600 transition-colors">Email Address</label>
                  <input id="auth-email" type="email" placeholder="you@domain.com" class="w-full bg-slate-50/50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all mt-1.5 text-slate-800 shadow-sm">
              </div>
              <div class="group">
                  <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider group-focus-within:text-indigo-600 transition-colors">Password</label>
                  <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-slate-50/50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all mt-1.5 text-slate-800 shadow-sm">
              </div>
              <button id="phone-toggle" class="text-xs text-indigo-600 font-bold hover:text-indigo-700 transition-colors flex items-center gap-1.5">
                  <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> Continue with Phone Number
              </button>
              
              <div id="phone-block" class="hidden border-t border-slate-100 pt-4 space-y-3 animate__animated animate__fadeIn animate__faster">
                  <input id="auth-phone" type="tel" placeholder="+256700000000" class="w-full bg-slate-50/50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-800 shadow-sm">
                  <div id="recaptcha-container"></div>
                  <button id="otp-btn" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs rounded-xl transition-all flex items-center justify-center gap-2">
                      <i data-lucide="message-square" class="w-3.5 h-3.5"></i> Request OTP Code
                  </button>
                  <input id="auth-otp" type="text" placeholder="Enter 6-digit Code" class="hidden w-full bg-slate-50/50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-800 shadow-sm tracking-widest text-center font-bold">
              </div>
          </div>
          <button id="auth-submit-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded-xl text-sm shadow-[0_8px_20px_-6px_rgba(79,70,229,0.5)] transition-all active:scale-[0.98] relative z-10 flex items-center justify-center gap-2">
              Continue <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </button>
          
          <div class="space-y-4 relative z-10">
              <div class="flex items-center my-4"><div class="flex-grow border-t border-slate-200/80"></div><span class="px-3 text-[10px] text-slate-400 font-bold uppercase tracking-wider">Or continue with</span><div class="flex-grow border-t border-slate-200/80"></div></div>
              <div class="grid grid-cols-2 gap-3">
                  <button id="google-login-btn" class="py-3 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold flex items-center justify-center gap-2 text-slate-700 shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5">
                      <i data-lucide="globe" class="w-4 h-4 text-blue-500"></i> Google
                  </button>
                  <button id="github-login-btn" class="py-3 bg-[#18181b] hover:bg-black border border-[#18181b] rounded-xl text-xs font-bold flex items-center justify-center gap-2 text-white shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5">
                      <i data-lucide="github" class="w-4 h-4"></i> GitHub
                  </button>
              </div>
          </div>
      </div>
  </div>

  <div id="app" class="app-container hidden">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white/60 backdrop-blur-2xl border-r border-slate-200/60 flex flex-col transform -translate-x-full md:translate-x-0 transition-all duration-400 ease-in-out shrink-0 h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        
        <div class="p-4 flex items-center justify-between border-b border-slate-200/50 h-[72px] shrink-0 sidebar-center-icon transition-all">
            <div class="flex items-center space-x-3 overflow-hidden whitespace-nowrap">
                <div class="w-9 h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-md text-white shrink-0">
                    <i data-lucide="zap" class="w-4.5 h-4.5 fill-current"></i>
                </div>
                <span class="text-lg font-extrabold text-slate-900 tracking-tight sidebar-text">joes ai</span>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="admin-trigger" class="hidden text-[10px] font-bold bg-amber-100 hover:bg-amber-200 text-amber-800 px-2 py-1 rounded-lg flex items-center gap-1 border border-amber-300/30 transition-all sidebar-text">
                    <i data-lucide="crown" class="w-3 h-3"></i> Admin
                </button>
                <button id="desktop-sidebar-toggle" class="hidden md:flex text-slate-400 hover:text-indigo-600 transition-colors p-1.5 rounded-lg hover:bg-slate-100">
                    <i data-lucide="panel-left-close" class="w-5 h-5 toggle-icon"></i>
                </button>
                <button id="sidebar-close-btn" class="md:hidden text-slate-400 hover:text-slate-600 p-1">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="p-4 space-y-3 shrink-0 sidebar-center-icon">
            <button id="new-chat-btn" class="w-full h-11 bg-slate-900 hover:bg-indigo-600 text-white font-semibold rounded-xl flex items-center justify-center gap-2 shadow-[0_4px_12px_rgba(0,0,0,0.1)] hover:shadow-[0_4px_15px_rgba(79,70,229,0.4)] transition-all text-sm shrink-0 overflow-hidden group">
                <i data-lucide="plus" class="w-4.5 h-4.5 group-hover:rotate-90 transition-transform duration-300"></i> 
                <span class="sidebar-text">New Workspace</span>
            </button>
            
            <div class="relative sidebar-text">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input id="search-bar" type="text" placeholder="Search conversations..." class="w-full bg-slate-100/50 hover:bg-slate-100 focus:bg-white border border-slate-200/80 rounded-xl pl-9 pr-3 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all shadow-sm">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-1 space-y-1">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-3 sidebar-text">Recent History</p>
            <div id="session-list" class="space-y-1 w-full overflow-hidden"></div>
        </div>

        <div class="p-3 border-t border-slate-200/50 bg-slate-50/50 shrink-0 transition-all">
            
            <div class="flex items-center justify-between p-3 bg-white border border-slate-200/80 rounded-xl text-xs shadow-sm mb-3 sidebar-center-icon group cursor-pointer hover:border-indigo-200 transition-colors">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold shrink-0 shadow-inner">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <div class="truncate flex flex-col sidebar-text">
                        <span id="user-status-email" class="font-bold text-slate-800 truncate">Guest User</span>
                        <span class="text-indigo-500 text-[9px] uppercase font-bold tracking-widest mt-0.5">Verified Profile</span>
                    </div>
                </div>
                <button id="logout-btn" class="text-slate-400 hover:text-red-500 ml-1 flex items-center justify-center transition-colors sidebar-text" title="Log Out">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="flex flex-col gap-1.5 sidebar-text">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Engine Mode</label>
                <div class="relative">
                    <i data-lucide="cpu" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-indigo-500 pointer-events-none"></i>
                    <select id="chat-mode-select" class="w-full bg-white border border-slate-200/80 rounded-xl pl-9 pr-3 py-2.5 text-slate-800 font-semibold text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all shadow-sm appearance-none cursor-pointer hover:bg-slate-50">
                        <option value="chat">Chat Intelligence</option>
                        <option value="code">Code Copilot</option>
                        <option value="study">Study Tutor</option>
                        <option value="learn">Deep Learning</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-grow flex flex-col h-full overflow-hidden relative bg-white md:rounded-l-[2rem] md:shadow-[-10px_0_30px_rgba(0,0,0,0.03)] z-10 transition-all duration-300">
      
      <header class="bg-white/90 backdrop-blur-xl md:px-6 md:py-4 p-3.5 pt-[calc(env(safe-area-inset-top)+0.875rem)] flex items-center justify-between border-b border-slate-100 z-20 shrink-0 h-[72px]">
          <div class="flex items-center space-x-3">
              <button id="sidebar-open-btn" class="md:hidden text-slate-600 hover:text-indigo-600 p-1.5 rounded-lg hover:bg-slate-100 transition-colors flex items-center justify-center">
                  <i data-lucide="menu" class="w-5 h-5"></i>
              </button>
              <div class="flex items-center space-x-2 md:hidden">
                <span class="text-lg font-extrabold text-slate-900 tracking-tight">joes ai</span>
              </div>
          </div>
          
          <div class="flex items-center space-x-2">
              <button id="export-btn" class="text-slate-500 hover:text-indigo-600 transition-all p-2 hover:bg-indigo-50 rounded-xl flex items-center justify-center gap-2 text-xs font-bold" title="Export PDF">
                  <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">Export</span>
              </button>
              <div class="w-px h-5 bg-slate-200"></div>
              <button id="clear-btn" class="text-slate-500 hover:text-red-500 transition-all p-2 hover:bg-red-50 rounded-xl flex items-center justify-center gap-2 text-xs font-bold" title="Clear Screen">
                  <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Clear</span>
              </button>
          </div>
      </header>

      <main class="flex-1 overflow-hidden md:p-6 p-0 bg-gradient-to-b from-slate-50/50 to-white">
        <div class="max-w-4xl mx-auto h-full flex flex-col relative">
          
          <button id="snap-btn" class="hidden absolute bottom-24 right-4 md:right-6 bg-white/90 backdrop-blur border border-slate-200 hover:border-indigo-500 text-indigo-600 hover:text-indigo-700 rounded-full p-3 shadow-[0_8px_30px_rgba(0,0,0,0.12)] transition-all z-30 hover:scale-110 active:scale-95 flex items-center justify-center">
              <i data-lucide="arrow-down" class="w-5 h-5"></i>
          </button>

          <div class="md:bg-white/40 md:backdrop-blur-xl md:border md:border-slate-200/50 md:rounded-[2rem] shadow-none md:shadow-[0_10px_40px_-10px_rgba(0,0,0,0.05)] overflow-hidden flex-1 flex flex-col relative h-full">
            <div id="chat-messages" class="flex-grow flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-6 flex flex-col scroll-smooth"></div>

            <div class="flex flex-col w-full bg-white/80 backdrop-blur-xl border-t border-slate-200/60 p-3 md:p-5 rounded-b-none md:rounded-b-[2rem] shrink-0 relative z-20">
              
              <div id="slash-menu" class="hidden absolute bottom-[calc(100%+12px)] left-4 md:left-5 bg-white/90 backdrop-blur-xl border border-slate-200 rounded-2xl p-2 w-64 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] text-xs space-y-1 z-30 animate__animated animate__fadeInUp animate__faster">
                  <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest px-3 py-2">Quick Commands</p>
                  <button class="w-full text-left px-3 py-2 hover:bg-indigo-50 rounded-xl flex items-center justify-between text-slate-700 hover:text-indigo-700 font-semibold transition-colors" data-cmd="/explain">
                      <span class="flex items-center gap-2"><i data-lucide="lightbulb" class="w-4 h-4 text-indigo-500"></i> /explain</span>
                      <span class="text-[10px] text-slate-400 font-normal">Concepts</span>
                  </button>
                  <button class="w-full text-left px-3 py-2 hover:bg-indigo-50 rounded-xl flex items-center justify-between text-slate-700 hover:text-indigo-700 font-semibold transition-colors" data-cmd="/refactor">
                      <span class="flex items-center gap-2"><i data-lucide="code-2" class="w-4 h-4 text-indigo-500"></i> /refactor</span>
                      <span class="text-[10px] text-slate-400 font-normal">Optimize</span>
                  </button>
                  <button class="w-full text-left px-3 py-2 hover:bg-indigo-50 rounded-xl flex items-center justify-between text-slate-700 hover:text-indigo-700 font-semibold transition-colors" data-cmd="/test">
                      <span class="flex items-center gap-2"><i data-lucide="settings" class="w-4 h-4 text-indigo-500"></i> /test</span>
                      <span class="text-[10px] text-slate-400 font-normal">Unit Tests</span>
                  </button>
                  <button class="w-full text-left px-3 py-2 hover:bg-indigo-50 rounded-xl flex items-center justify-between text-slate-700 hover:text-indigo-700 font-semibold transition-colors" data-cmd="/summarize">
                      <span class="flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4 text-indigo-500"></i> /summarize</span>
                      <span class="text-[10px] text-slate-400 font-normal">Abstract</span>
                  </button>
              </div>

              <div id="attachment-chip-container" class="hidden flex-wrap gap-2 mb-3 transition-all duration-300 ease-out px-1"></div>
              
              <div class="flex items-end space-x-2 md:space-x-3 w-full bg-slate-50/50 border border-slate-200/80 rounded-2xl md:rounded-3xl p-1.5 md:p-2 glowing-input transition-all shadow-sm focus-within:bg-white">
                <button id="attachment-btn" class="flex-shrink-0 w-10 h-10 md:w-11 md:h-11 hover:bg-indigo-50 active:scale-95 text-slate-500 hover:text-indigo-600 rounded-xl md:rounded-2xl flex items-center justify-center transition-all" title="Upload Media">
                    <i data-lucide="paperclip" class="w-5 h-5"></i>
                </button>
                
                <div id="text-input-wrap" class="flex-grow flex items-center relative min-h-[40px] md:min-h-[44px]">
                  <textarea id="message-input" enterkeyhint="send" placeholder="Message Joes AI or type '/' for commands..." rows="1" class="w-full bg-transparent border-none text-slate-800 placeholder-slate-400 focus:outline-none text-sm md:text-base py-2.5 px-2 resize-none max-h-[150px] leading-relaxed font-medium"></textarea>
                  <button id="mic-btn" class="absolute right-1 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 p-2 rounded-xl transition-all flex items-center justify-center hover:bg-indigo-50" title="Voice Input">
                      <i data-lucide="mic" class="w-5 h-5"></i>
                  </button>
                </div>

                <button id="send-btn" class="flex-shrink-0 bg-slate-900 hover:bg-indigo-600 hover:scale-105 text-white w-10 h-10 md:w-11 md:h-11 rounded-xl md:rounded-2xl shadow-md transition-all active:scale-95 flex items-center justify-center shrink-0">
                  <span id="send-icon" class="flex items-center justify-center w-full h-full">
                      <i data-lucide="arrow-up" class="w-5 h-5 stroke-[2.5]"></i>
                  </span>
                </button>
              </div>
              <div class="text-center mt-2">
                  <span class="text-[10px] text-slate-400 font-medium">Joes AI can make mistakes. Consider verifying important information.</span>
              </div>
              <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.txt,.doc,.docx">
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="sandbox-modal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-xl hidden flex flex-col animate__animated animate__fadeIn animate__faster">
      <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-900 text-white">
          <span class="text-sm font-bold flex items-center gap-2"><i data-lucide="terminal" class="w-4 h-4 text-indigo-400"></i> Sandbox Live Preview</span>
          <button id="sandbox-close-btn" class="text-slate-400 hover:text-white font-semibold transition-colors flex items-center gap-1 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg">
              <i data-lucide="x" class="w-4 h-4"></i> Close
          </button>
      </div>
      <div class="flex-1 bg-white relative">
          <iframe id="sandbox-iframe" class="w-full h-full border-none"></iframe>
      </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default', look: 'handDrawn' });
    window.mermaid = mermaid;
  </script>

  <script type="module">
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    let auth = null;
    let currentUser = null;
    let userId = 'default';
    let currentSessionId = null;
    let authMode = 'signin';

    // Remove Spinning Circle Loader on Complete Parse Execution Window
    async function initApp() {
        const loader = document.getElementById('page-loader');
        
        try {
            // Step 1: Query Dynamic Configuration Setup from Cloud Backend Env Layers
            const configRes = await fetch(`${BACKEND_URL}/api/config`);
            if (!configRes.ok) throw new Error("Backend setup configurations unreached.");
            const firebaseConfig = await configRes.json();
            
            // Step 2: Initialize Firebase Client
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();

            // Ported: Setup all Email/Phone Auth Event Listeners
            setupAuthEventListeners();

            // Step 3: Configure Auth State Observability Change Flow
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    userId = user.uid;
                    document.getElementById('user-status-email').innerText = user.email || user.phoneNumber || 'Verified Account';
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    checkAdminStatus(user.email);
                } else {
                    currentUser = null;
                    document.getElementById('app').classList.add('hidden');
                    document.getElementById('auth-screen').classList.remove('hidden');
                }
                
                // Clear the loader layout once auth determination completes
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            });

        } catch (err) {
            console.error("Initialization Failed:", err);
            // Fallback clear loader layout so developer can troubleshoot console
            if (loader) loader.style.display = 'none';
            alert("Backend status offline. Ensure your Render web service is live and active.");
        }

        if (window.lucide) { lucide.createIcons(); }
    }

    // --- PORTED AUTHENTICATION LOGIC FROM INDEX.HTML ---
    function setupAuthEventListeners() {
        if (!auth) return;

        // Auth Tab Toggles
        document.getElementById('tab-signin').addEventListener('click', () => {
            authMode = 'signin';
            toggleAuthTabs('signin');
        });
        document.getElementById('tab-signup').addEventListener('click', () => {
            authMode = 'signup';
            toggleAuthTabs('signup');
        });

        // Phone Toggle
        document.getElementById('phone-toggle').addEventListener('click', () => {
            document.getElementById('phone-block').classList.toggle('hidden');
        });

        // Setup Recaptcha
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        // Phone Auth
        document.getElementById('otp-btn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('auth-phone').value.trim();
            if (!phoneNumber) return alert("Please enter your phone number.");
            try {
                const confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier);
                window.confirmationResult = confirmationResult;
                document.getElementById('auth-otp').classList.remove('hidden');
                alert("Verification OTP sent! Enter the code below.");
            } catch (err) {
                alert(`Phone request failed: ${err.message}`);
            }
        });

        // Email / Password Auth Submission
        document.getElementById('auth-submit-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) return alert("Please fill in your credentials.");

            try {
                if (authMode === 'signin') {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                }
            } catch (err) {
                alert(`Authentication Failed: ${err.message}`);
            }
        });

        // Google/Github Authentication Strategy Bindings (Updated to Match index.html popup handling)
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (err) {
                if (err.code === 'auth/popup-blocked' || err.code === 'auth/cancelled-popup-request') {
                    await auth.signInWithRedirect(provider);
                } else {
                    alert(`Google Auth Failed: ${err.message}`);
                }
            }
        });

        document.getElementById('github-login-btn').addEventListener('click', async () => {
            const provider = new firebase.auth.GithubAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (err) {
                if (err.code === 'auth/popup-blocked' || err.code === 'auth/cancelled-popup-request') {
                    await auth.signInWithRedirect(provider);
                } else {
                    alert(`GitHub Auth Failed: ${err.message}`);
                }
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (confirm("Log out of Joes AI?")) {
                try {
                    await auth.signOut();
                    location.reload();
                } catch (err) { alert("Sign-out failed."); }
            }
        });
    }

    function toggleAuthTabs(active) {
        const signinBtn = document.getElementById('tab-signin');
        const signupBtn = document.getElementById('tab-signup');
        const title = document.getElementById('auth-title');
        const activeClass = "flex-1 pb-3 text-center border-b-[3px] border-indigo-600 font-bold text-sm text-indigo-600 transition-colors";
        const inactiveClass = "flex-1 pb-3 text-center border-b-[3px] border-transparent font-semibold text-sm text-slate-400 hover:text-slate-600 transition-colors";
        
        if (active === 'signin') {
            signinBtn.className = activeClass;
            signupBtn.className = inactiveClass;
            title.textContent = "Sign In to Joes AI";
        } else {
            signupBtn.className = activeClass;
            signinBtn.className = inactiveClass;
            title.textContent = "Create an Account";
        }
    }
    // --- END PORTED AUTHENTICATION LOGIC ---

    async function checkAdminStatus(email) {
        try {
            const res = await fetch(`${BACKEND_URL}/api/check-admin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.isAdmin || email.toLowerCase().includes('kaigwaakram')) { // Fallback safety inclusion
                document.getElementById('admin-trigger').classList.remove('hidden');
            }
        } catch(e) { console.error("Admin verification step failed."); }
    }

    // Dynamic Tracking Mesh UI Lighting Effect
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.body.style.setProperty('--mouse-x', `${x}%`);
        document.body.style.setProperty('--mouse-y', `${y}%`);
    });

    // --- GEMINI STYLE SIDEBAR LOGIC ---
    const sidebar = document.getElementById('sidebar');
    const desktopToggle = document.getElementById('desktop-sidebar-toggle');
    
    desktopToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        const icon = desktopToggle.querySelector('.toggle-icon');
        if(sidebar.classList.contains('collapsed')) {
            icon.setAttribute('data-lucide', 'panel-left-open');
        } else {
            icon.setAttribute('data-lucide', 'panel-left-close');
        }
        lucide.createIcons();
    });

    // Setup Layout Routing Triggers (Mobile)
    document.getElementById('sidebar-open-btn').addEventListener('click', () => {
        sidebar.classList.remove('-translate-x-full');
    });
    document.getElementById('sidebar-close-btn').addEventListener('click', () => {
        sidebar.classList.add('-translate-x-full');
    });

    // Slash Utility Interaction Framework Helper
    window.insertSlashCommand = function(cmd) {
        const txtArea = document.getElementById('message-input');
        let text = '';
        if (cmd === '/explain') text = 'Please explain this concept in simple terms: ';
        else if (cmd === '/refactor') text = 'Please optimize and refactor this code for performance: ';
        else if (cmd === '/test') text = 'Please generate comprehensive unit tests for this code: ';
        else if (cmd === '/summarize') text = 'Please provide a clear bulleted summary of this text: ';

        txtArea.value = text;
        document.getElementById('slash-menu').classList.add('hidden');
        txtArea.focus();
    };

    document.querySelectorAll('#slash-menu button').forEach(btn => {
        btn.addEventListener('click', () => {
            const cmd = btn.getAttribute('data-cmd');
            if(cmd) window.insertSlashCommand(cmd);
        });
    });

    document.getElementById('message-input').addEventListener('input', (e) => {
        const menu = document.getElementById('slash-menu');
        if (e.target.value === '/') {
            menu.classList.remove('hidden');
        } else if (!e.target.value.startsWith('/')) {
            menu.classList.add('hidden');
        }
        // Auto-resize
        e.target.style.height = 'auto';
        e.target.style.height = (e.target.scrollHeight) + 'px';
    });

    // Run core engine stack initiation sequence
    initApp();
  </script>
</body>
</html>
