  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }
    
    .gradient-bg { background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1543); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    body.light .gradient-bg { background: linear-gradient(-45deg, #eef2ff, #e0e7ff, #c7d2fe, #f8fafc); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    @keyframes liveFade { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .chat-gradient { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); position: relative; }

    #page-loader.loaded { animation: hideLoader .5s ease forwards; }
    @keyframes hideLoader { to { opacity: 0; visibility: hidden; pointer-events: none; } }
    #page-loader .loader { width: 44px; height: 44px; border-radius: 50%; border: 3px solid rgba(255,255,255,.15); border-top-color: #a78bfa; }

    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }

    .send-glow { box-shadow: 0 0 20px rgba(124,58,237,.4); transition: all .3s ease; }
    .send-glow:hover { box-shadow: 0 0 35px rgba(124,58,237,.7); transform: scale(1.05); }
    button, select, textarea { transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease, border-color .18s ease; }
    button:hover, select:hover, textarea:hover { transform: translateY(-1px); }
    button:active, textarea:active { transform: translateY(0) scale(.98); }
    button:hover { box-shadow: 0 18px 40px rgba(124,58,237,.22); }

    .chat-gradient::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 20% 20%, rgba(217,70,239,.14), transparent 28%), radial-gradient(circle at 80% 70%, rgba(59,130,246,.12), transparent 24%);
      opacity: .9; z-index: 0;
    }
    .chat-gradient > * { position: relative; z-index: 1; }

    .ai-message pre { background: rgba(0,0,0,.3); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.5; border: 1px solid rgba(255,255,255,.08); }
    .ai-message code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .ai-message p { margin: 6px 0; line-height: 1.7; }
    .ai-message ul, .ai-message ol { margin: 6px 0; padding-left: 20px; }

    body.light .ai-message pre { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.1); }
    body.light .ai-message code { color: #1f2937; }
    .ai-message strong { font-weight: 700; }
    .ai-message em { font-style: italic; opacity: .9; }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZLoJZVVCVAWafhd4Oh8bhEGV4waN1B5g",
      authDomain: "studypedia-app.firebaseapp.com",
      projectId: "studypedia-app",
      storageBucket: "studypedia-app.firebasestorage.app",
      messagingSenderId: "793261754970",
      appId: "1:793261754970:web:49bbd2bea1ab4d46486663",
      measurementId: "G-6CTGP0MF8Y"
    };

    const BACKEND_URL = 'https://joes-ai-server.onrender.com';

    let app, auth, db, googleProvider;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      googleProvider = new GoogleAuthProvider();
    } catch (error) { console.error('Firebase error:', error); }

    let currentUser = null;
    let chatHistory = [];
    let selectedAttachment = null;
    let voiceRecognition = null;
    let isRecordingVoice = false;
    const CHAT_HISTORY_KEY = 'joes-ai-chat-history';

    let settings = { saveHistory: true, showTyping: true, creativity: 0.7, maxTokens: 1000, darkMode: true, chatMode: 'chat' };

    const MAX_FILE_SIZES = { image: 25, audio: 50, document: 15, data: 10 };

    const AI_MODES = {
      chat: "You are joes ai, a friendly and helpful AI assistant.",
      code: "You are joes ai in Code Mode. Expert programmer.",
      explain: "You are joes ai. Explain code in simple terms.",
      review: "You are joes ai. Perform a code review.",
      debug: "You are joes ai. Debugging expert."
    };

    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    const guestButtons = document.getElementById('guest-buttons');
    const userMenu = document.getElementById('user-menu');
    const userAvatar = document.getElementById('user-avatar');
    const userName = document.getElementById('user-name');

    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadChatHistory();
      setupEventListeners();
      checkAuthState();
      if (chatHistory.length) { renderChatHistory(); showWelcome(false); } else { showWelcome(true); }
      setTimeout(() => document.getElementById('page-loader')?.classList.add('loaded'), 350);
    });

    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });

      document.getElementById('login-btn')?.addEventListener('click', openLoginModal);
      document.getElementById('register-btn')?.addEventListener('click', openRegisterModal);
      document.getElementById('logout-btn')?.addEventListener('click', logout);
      document.getElementById('google-login-btn')?.addEventListener('click', signInWithGoogle);
      document.getElementById('email-login-form')?.addEventListener('submit', handleEmailLogin);
      document.getElementById('email-register-form')?.addEventListener('submit', handleEmailRegister);
      document.getElementById('settings-btn')?.addEventListener('click', openSettingsModal);
      document.getElementById('clear-chat-btn')?.addEventListener('click', clearChat);
      document.getElementById('mic-btn')?.addEventListener('click', toggleVoiceInput);
      document.getElementById('run-ocr-btn')?.addEventListener('click', runOCR);
      document.getElementById('start-audio-transcription-btn')?.addEventListener('click', transcribeAudio);
      document.getElementById('insert-attachment-text-btn')?.addEventListener('click', insertAttachmentText);
      document.getElementById('attachment-btn')?.addEventListener('click', (e) => {
        const hint = document.getElementById('size-hint');
        if (hint) { hint.classList.toggle('hidden'); if (!hint.classList.contains('hidden')) setTimeout(() => hint.classList.add('hidden'), 3000); }
        setTimeout(() => document.getElementById('file-input')?.click(), 50);
      });
      document.getElementById('file-input')?.addEventListener('change', handleFileSelect);
    }

    function checkAuthState() {
      onAuthStateChanged(auth, async (user) => {
        if (user) { currentUser = user; await updateUIForLoggedInUser(user); }
        else { currentUser = null; updateUIForGuest(); }
      });
    }

    async function updateUIForLoggedInUser(user) {
      guestButtons.classList.add('hidden');
      userMenu.classList.remove('hidden');
      const displayName = user.displayName || user.email.split('@')[0];
      userAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=7c3aed&color=fff`;
      userName.textContent = displayName;
      userName.classList.remove('hidden');

      const upgradeBtn = document.getElementById('upgrade-btn');
      const adminBtn = document.getElementById('admin-dashboard-btn');
      try {
        const response = await fetch(`${BACKEND_URL}/api/check-admin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: user.email })
        });
        const data = await response.json();
        if (data.isAdmin) {
          adminBtn.classList.remove('hidden');
          if (upgradeBtn) upgradeBtn.classList.add('hidden');
        } else {
          if (adminBtn) adminBtn.classList.add('hidden');
          if (upgradeBtn) upgradeBtn.classList.remove('hidden');
        }
      } catch (err) { console.error("Admin check failed", err); }
    }

    function updateUIForGuest() {
      guestButtons.classList.remove('hidden');
      userMenu.classList.add('hidden');
    }

    async function signInWithGoogle() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const check = await fetch(`${BACKEND_URL}/api/check-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: result.user.email }) });
        const adminData = await check.json();
        await setDoc(doc(db, 'users', result.user.uid), { email: result.user.email, isAdmin: adminData.isAdmin, lastLogin: new Date() }, { merge: true });
        closeLoginModal();
      } catch (err) { alert(err.message); }
    }

    async function handleEmailLogin(e) {
      e.preventDefault();
      try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value); closeLoginModal(); }
      catch (err) { alert(err.message); }
    }

    async function handleEmailRegister(e) {
      e.preventDefault();
      const email = document.getElementById('register-email').value;
      try {
        const result = await createUserWithEmailAndPassword(auth, email, document.getElementById('register-password').value);
        const check = await fetch(`${BACKEND_URL}/api/check-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
        const adminData = await check.json();
        await setDoc(doc(db, 'users', result.user.uid), { email, isAdmin: adminData.isAdmin, createdAt: new Date() });
        closeRegisterModal();
      } catch (err) { alert(err.message); }
    }

    async function logout() { await signOut(auth); }

    async function handleSend() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessageToUI('user', message);
      chatHistory.push({ role: 'user', content: message });
      messageInput.value = '';
      messageInput.style.height = 'auto';
      showWelcome(false);
      showProcessingIndicator();

      try {
        const response = await fetch(`${BACKEND_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [ { role: 'system', content: AI_MODES[settings.chatMode] }, ...chatHistory.slice(-10) ],
            model: 'llama-3.1-8b-instant',
            temperature: settings.creativity,
            max_tokens: settings.maxTokens,
            stream: true
          })
        });

        removeProcessingIndicator();
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let aiFullContent = '';

        const streamWrapper = document.createElement('div');
        streamWrapper.className = 'flex justify-start message-enter';
        streamWrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl rounded-bl-md chat-gradient text-white ai-message shadow-lg streaming-cursor"><span class="stream-text"></span></div>`;
        chatMessages.appendChild(streamWrapper);
        const streamSpan = streamWrapper.querySelector('.stream-text');
        chatMessages.scrollTop = chatMessages.scrollHeight;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === 'data: [DONE]') continue;
            if (trimmed.startsWith('data: ')) {
              try {
                const data = JSON.parse(trimmed.slice(6));
                const delta = data.choices?.[0]?.delta?.content || '';
                if (delta) { aiFullContent += delta; streamSpan.innerHTML = formatMarkdown(aiFullContent); chatMessages.scrollTop = chatMessages.scrollHeight; }
              } catch (e) { continue; }
            }
          }
        }

        streamWrapper.classList.remove('streaming-cursor');
        streamSpan.innerHTML = formatMarkdown(aiFullContent);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        const msgDiv = streamWrapper.firstElementChild;
        msgDiv.style.transition = 'box-shadow 0.5s ease';
        msgDiv.style.boxShadow = '0 0 30px rgba(124,58,237,0.3)';
        setTimeout(() => { msgDiv.style.boxShadow = ''; }, 800);

        if (aiFullContent) { chatHistory.push({ role: 'assistant', content: aiFullContent }); saveChatHistory(); }
      } catch (err) {
        removeProcessingIndicator();
        addMessageToUI('assistant', "Connection error. Check if backend is awake.");
      }
    }

    function addMessageToUI(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp`;
      if (role === 'user') {
        wrapper.innerHTML = `<div class="max-w-[80%] px-4 py-3 rounded-2xl rounded-br-md bg-gradient-to-br from-purple-600 to-indigo-600 text-white shadow-lg shadow-purple-900/30">${escapeHtml(content)}</div>`;
      } else {
        wrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl rounded-bl-md chat-gradient text-white ai-message shadow-lg">${formatMarkdown(escapeHtml(content))}</div>`;
      }
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showProcessingIndicator() {
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start message-enter';
      div.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span class="ml-3 text-purple-300 text-sm self-center processing-pulse">AI is thinking</span>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeProcessingIndicator() {
      const el = document.getElementById('processing-indicator');
      if (el) { el.style.transition = 'opacity 0.3s ease'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }
    }

    function formatMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
      html = html.replace(/`([^`]+)`/g, '<code class="bg-white/10 px-1.5 py-0.5 rounded text-purple-200 font-mono text-sm">$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/(?<!<\/pre>)\n(?!<pre>)/g, '<br>');
      html = html.replace(/^- (.+)/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      return html;
    }

    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function showWelcome(show) {
      let welcome = document.getElementById('welcome-screen');
      if (show && !welcome) {
        welcome = document.createElement('div');
        welcome.id = 'welcome-screen';
        welcome.className = 'flex justify-center py-8 fade-in-up';
        welcome.innerHTML = `<div class="text-center"><div class="w-16 h-16 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div><h3 class="text-white text-xl font-bold mb-2">Welcome to joes ai!</h3><p class="text-purple-300">Your intelligent AI assistant</p><p class="text-white/60 text-sm mt-4">Start a conversation or try different modes below</p></div>`;
        chatMessages.appendChild(welcome);
      } else if (!show && welcome) { welcome.remove(); }
    }

    function loadSettings() { try { const saved = localStorage.getItem('joes-ai-settings'); if (saved) settings = { ...settings, ...JSON.parse(saved) }; } catch (e) {} }
    function saveSettings() { try { localStorage.setItem('joes-ai-settings', JSON.stringify(settings)); } catch (e) {} }
    function saveChatHistory() { try { localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistory)); } catch (e) { console.error('Could not save chat history', e); } }
    function loadChatHistory() { try { const saved = localStorage.getItem(CHAT_HISTORY_KEY); if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) chatHistory = parsed; } } catch (e) { console.error('Could not load chat history', e); } }
    function renderChatHistory() { chatMessages.innerHTML = ''; chatHistory.forEach((item) => addMessageToUI(item.role, item.content)); }

    window.openLoginModal = () => document.getElementById('login-modal')?.classList.remove('hidden');
    window.closeLoginModal = () => document.getElementById('login-modal')?.classList.add('hidden');
    window.switchToRegister = () => { window.closeLoginModal(); document.getElementById('register-modal')?.classList.remove('hidden'); };
    window.closeRegisterModal = () => document.getElementById('register-modal')?.classList.add('hidden');
    window.openSettingsModal = () => document.getElementById('settings-modal')?.classList.remove('hidden');
    window.closeSettingsModal = () => document.getElementById('settings-modal')?.classList.add('hidden');

    function clearChat() { chatMessages.innerHTML = ''; chatHistory = []; localStorage.removeItem(CHAT_HISTORY_KEY); showWelcome(true); }
    function toggleVoiceInput() { isRecordingVoice ? stopVoiceInput() : startVoiceInput(); }

    function handleFileSelect(event) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      const file = files[0];
      const ext = file.name.split('.').pop()?.toLowerCase() || '';
      const isImage = ['png','jpg','jpeg','gif'].includes(ext);
      const isAudio = ['mp3','wav','m4a','ogg'].includes(ext);
      const isDoc = ['pdf','doc','docx','txt','md'].includes(ext) || file.type.startsWith('application/pdf');
      const isData = ['json','csv','xlsx'].includes(ext);
      let maxSizeMB = 10;
      if (isImage) maxSizeMB = MAX_FILE_SIZES.image;
      else if (isAudio) maxSizeMB = MAX_FILE_SIZES.audio;
      else if (isDoc) maxSizeMB = MAX_FILE_SIZES.document;
      else if (isData) maxSizeMB = MAX_FILE_SIZES.data;
      const maxSizeBytes = maxSizeMB * 1024 * 1024;
      if (file.size > maxSizeBytes) {
        const preview = document.getElementById('attachment-preview');
        preview.innerHTML = `<div class="text-red-400 text-sm">File too large: ${file.name} is ${(file.size / 1024 / 1024).toFixed(1)}MB. Max allowed: ${maxSizeMB}MB.</div>`;
        event.target.value = '';
        return;
      }
      selectedAttachment = file;
      openAttachmentModal();
      renderAttachmentPreview(selectedAttachment);
      event.target.value = '';
    }

    function openAttachmentModal() { document.getElementById('attachment-modal')?.classList.remove('hidden'); }
    function closeAttachmentModal() { document.getElementById('attachment-modal')?.classList.add('hidden'); }

    function renderAttachmentPreview(file) {
      const preview = document.getElementById('attachment-preview');
      const output = document.getElementById('attachment-output');
      preview.innerHTML = '';
      output.value = '';
      if (!file) { preview.textContent = 'No attachment selected.'; return; }
      const meta = document.createElement('div');
      meta.className = 'mb-4 text-sm text-white/70';
      meta.textContent = `${file.name} · ${Math.round(file.size / 1024)} KB · ${file.type || 'unknown type'}`;
      preview.appendChild(meta);
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.className = 'w-full rounded-2xl border border-white/10 object-contain';
        img.onload = () => URL.revokeObjectURL(img.src);
        preview.appendChild(img);
      } else if (file.type.startsWith('audio/')) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = URL.createObjectURL(file);
        audio.className = 'w-full rounded-2xl';
        audio.onloadeddata = () => URL.revokeObjectURL(audio.src);
        preview.appendChild(audio);
      } else {
        const hint = document.createElement('p');
        hint.className = 'text-sm text-white/70';
        hint.textContent = 'Press Run OCR for image attachments or Transcribe Audio for supported audio files.';
        preview.appendChild(hint);
      }
    }

    async function runOCR() {
      if (!selectedAttachment || !selectedAttachment.type.startsWith('image/')) { showAttachmentMessage('OCR works only on images. Please attach a PNG, JPG, or JPEG file.'); return; }
      const output = document.getElementById('attachment-output');
      output.value = 'Processing image with OCR...';
      try {
        const { data: { text } } = await Tesseract.recognize(selectedAttachment, 'eng', { logger: (m) => { if (m.status === 'recognizing text') output.value = `Recognizing... ${Math.round(m.progress * 100)}%`; } });
        output.value = text;
      } catch (err) { output.value = 'OCR failed: ' + err.message; }
    }

    async function transcribeAudio() {
      const output = document.getElementById('attachment-output');
      if (!selectedAttachment) { output.value = 'No audio file selected.'; return; }
      if (!isRecordingVoice) {
        output.value = 'Preparing transcription...';
        try {
          if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) throw new Error('Not supported');
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          voiceRecognition = new SpeechRecognition();
          voiceRecognition.lang = 'en-US';
          voiceRecognition.interimResults = false;
          voiceRecognition.maxAlternatives = 1;
          voiceRecognition.onresult = (event) => { output.value = event.results[0][0].transcript; };
          voiceRecognition.onerror = (event) => { output.value = `Transcription error: ${event.error}`; };
          voiceRecognition.onend = () => { if (!output.value || output.value.startsWith('Preparing')) output.value = 'Transcription ended without result. Please try again or use a supported browser.'; };
          showAttachmentMessage('Allow microphone access and play the audio through your speakers for transcription.');
          voiceRecognition.start();
        } catch (err) { output.value = 'Audio transcription could not be started. Try a supported browser or a server-side API.'; console.error('SpeechRecognition error', err); }
      }
    }

    function startVoiceInput() {
      try {
        const output = document.getElementById('attachment-output');
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { alert('Speech recognition is not supported in this browser.'); return; }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        voiceRecognition = new SpeechRecognition();
        voiceRecognition.lang = 'en-US';
        voiceRecognition.interimResults = false;
        voiceRecognition.maxAlternatives = 1;
        voiceRecognition.onresult = (event) => { output.value = event.results[0][0].transcript; };
        voiceRecognition.onerror = (event) => { output.value = `Transcription error: ${event.error}`; };
        voiceRecognition.onend = () => { if (!output.value || output.value.startsWith('Preparing')) output.value = 'Transcription ended without result. Please try again or use a supported browser.'; };
        showAttachmentMessage('Allow microphone access and play the audio through your speakers for transcription.');
        voiceRecognition.start();
      } catch (err) { output.value = 'Audio transcription could not be started. Try a supported browser or a server-side API.'; console.error('SpeechRecognition error', err); }
    }

    function stopVoiceInput() {
      if (voiceRecognition) { voiceRecognition.stop(); voiceRecognition = null; isRecordingVoice = false; updateMicButton(false); }
      const output = document.getElementById('attachment-output');
      if (output && (!output.value || output.value.startsWith('Preparing'))) output.value = 'Voice input stopped.';
    }

    function updateMicButton(active) {
      const button = document.getElementById('mic-btn');
      if (!button) return;
      if (active) { button.classList.add('bg-emerald-500', 'hover:bg-emerald-400'); button.classList.remove('bg-white/10', 'hover:bg-white/20'); }
      else { button.classList.remove('bg-emerald-500', 'hover:bg-emerald-400'); button.classList.add('bg-white/10', 'hover:bg-white/20'); }
    }

    function insertAttachmentText() {
      const output = document.getElementById('attachment-output');
      const text = output.value.trim();
      if (!text) return;
      messageInput.value = text;
      closeAttachmentModal();
      messageInput.focus();
    }

    function showAttachmentMessage(message) {
      const preview = document.getElementById('attachment-preview');
      if (preview) {
        const msg = document.createElement('div');
        msg.className = 'text-sm text-white/70 mb-2';
        msg.textContent = message;
        preview.appendChild(msg);
      }
    }

    window.openLoginModal = () => document.getElementById('login-modal')?.classList.remove('hidden');
    window.closeLoginModal = () => document.getElementById('login-modal')?.classList.add('hidden');
    window.openRegisterModal = () => document.getElementById('register-modal')?.classList.remove('hidden');
    window.closeRegisterModal = () => document.getElementById('register-modal')?.classList.add('hidden');
    window.switchToRegister = () => window.openRegisterModal();
    window.openSettingsModal = () => document.getElementById('settings-modal')?.classList.remove('hidden');
    window.closeSettingsModal = () => document.getElementById('settings-modal')?.classList.add('hidden');
  </script>
</body>
</html>
