<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Joes AI - Intelligent AI Chat Assistant</title>
  <!-- [Previous Meta Tags remain the same for SEO] -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* [Existing Styles Kept for consistency] */
    body { font-family: 'Inter', sans-serif; margin: 0; }
    .gradient-bg { background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1543); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    body.light .gradient-bg { background: linear-gradient(-45deg, #eef2ff, #e0e7ff, #c7d2fe, #f8fafc); background-size: 400% 400%; animation: liveFade 15s ease infinite; }
    @keyframes liveFade { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .chat-gradient { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
    .ai-message pre { background: rgba(0,0,0,.3); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 8px 0; border: 1px solid rgba(255,255,255,.08); }
    .processing-pulse { animation: processPulse 2s ease-in-out infinite; }
    @keyframes processPulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }
  </style>
</head>
<body class="gradient-bg min-h-screen">
  <div id="page-loader"><div class="loader"></div></div>
  
  <div id="app" class="relative min-h-screen z-10">
    <header class="bg-white/10 backdrop-blur-md shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
              <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-xl flex items-center justify-center"></div>
              <span class="text-2xl font-bold text-white">joes ai</span>
            </div>
            <!-- Auth sections simplified for focus on function -->
            <div id="user-menu" class="flex items-center space-x-3 text-white">
                <span id="user-name" class="hidden sm:inline">Guest</span>
                <button id="settings-btn" class="p-2 hover:bg-white/10 rounded-lg">⚙️</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
      <div class="max-w-4xl mx-auto">
        <div class="chat-gradient rounded-2xl shadow-2xl overflow-hidden min-h-[70vh] flex flex-col">
          <!-- Chat Header -->
          <div class="p-4 border-b border-white/10 flex items-center justify-between text-white">
            <div class="flex items-center space-x-3">
              <h2 class="font-bold">Multimodal AI Chat</h2>
              <span class="text-xs bg-purple-600 px-2 py-0.5 rounded-full">Gemini 1.5 Enabled</span>
            </div>
            <select id="chat-mode-select" class="bg-gray-800 border border-white/20 rounded px-2 py-1 text-sm">
                <option value="chat">Standard Mode</option>
                <option value="code">Code Assistant</option>
                <option value="debug">Bug Fixer</option>
            </select>
          </div>

          <!-- Message Area -->
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

          <!-- Input Area -->
          <div class="p-4 border-t border-white/10 bg-black/20">
            <div id="attachment-chip-container" class="hidden flex-wrap gap-2 mb-3"></div>
            
            <div class="flex items-end space-x-2">
              <button id="attachment-btn" class="p-3 bg-white/10 hover:bg-white/20 text-white rounded-xl transition-all">
                📎
              </button>
              
              <div class="flex-1 relative">
                <textarea id="message-input" placeholder="Type a message or ask about your file..." rows="1" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-purple-500 outline-none resize-none"></textarea>
              </div>

              <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-xl shadow-lg transition-transform active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
              </button>
            </div>
            <!-- UPDATED: Support for Video & Audio -->
            <input type="file" id="file-input" class="hidden" accept=".pdf,.txt,.doc,.docx,.png,.jpg,.jpeg,.mp3,.wav,.m4a,.mp4,.mov,.avi">
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    // --- FIREBASE & CONFIG ---
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    let chatHistory = [];
    let selectedAttachment = null;
    
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        showWelcome(true);
        setupEventListeners();
        setTimeout(() => document.getElementById('page-loader')?.remove(), 350);
    });

    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
      
      document.getElementById('attachment-btn').addEventListener('click', () => document.getElementById('file-input').click());
      document.getElementById('file-input').addEventListener('change', handleFileSelect);
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Visual limit check
        const sizeInMB = file.size / 1024 / 1024;
        if (sizeInMB > 50) {
            alert("File is too large! Please keep it under 50MB.");
            return;
        }

        selectedAttachment = file;
        showAttachmentChip(file.name);
    }

    function showAttachmentChip(name) {
        const container = document.getElementById('attachment-chip-container');
        container.innerHTML = `<div class="bg-purple-600 text-white px-3 py-1 rounded-full text-xs flex items-center space-x-2">
            <span>📎 ${name}</span>
            <button onclick="window.removeAttachment()" class="hover:text-black">✕</button>
        </div>`;
        container.classList.remove('hidden');
    }

    window.removeAttachment = () => {
        selectedAttachment = null;
        document.getElementById('attachment-chip-container').classList.add('hidden');
    };

    async function handleSend() {
      const message = messageInput.value.trim();
      const hasAttachment = !!selectedAttachment;
      
      if (!message && !hasAttachment) return;

      // Add user message to UI
      addMessageToUI('user', message || `Sent an attachment: ${selectedAttachment.name}`);
      
      // Cleanup inputs
      const currentAttachment = selectedAttachment; 
      messageInput.value = '';
      window.removeAttachment();
      showWelcome(false);
      
      // Show Loader
      showProcessingIndicator(hasAttachment ? 'Gemini (Multimodal)' : 'Groq');

      try {
        let aiText = '';
        
        if (hasAttachment) {
            // --- FILE PROCESSING PATH ---
            const base64Data = await readFileAsBase64(currentAttachment);
            const mimeType = currentAttachment.type || 'application/octet-stream';

            const response = await fetch(`${BACKEND_URL}/api/gemini`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, fileData: base64Data, mimeType })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error);
            aiText = data.text;
            
            removeProcessingIndicator();
            await streamTextToUI(aiText);
        } else {
            // --- TEXT ONLY PATH (GROQ) ---
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [...chatHistory.slice(-5), { role: 'user', content: message }],
                    stream: false // Using false for simple reliability, can be set to true for stream logic
                })
            });

            const data = await response.json();
            aiText = data.choices?.[0]?.message?.content || data.text;
            
            removeProcessingIndicator();
            await streamTextToUI(aiText);
        }

        chatHistory.push({ role: 'user', content: message });
        chatHistory.push({ role: 'assistant', content: aiText });

      } catch (err) {
        removeProcessingIndicator();
        addMessageToUI('assistant', `❌ Error: ${err.message}`);
        console.error(err);
      }
    }

    // Helper: Base64
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Helper: UI Messages
    function addMessageToUI(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp`;
      const bg = role === 'user' ? 'bg-purple-600' : 'chat-gradient';
      
      wrapper.innerHTML = `<div class="max-w-[85%] px-4 py-3 rounded-2xl text-white shadow-lg ${bg}">${content}</div>`;
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function streamTextToUI(text) {
        addMessageToUI('assistant', formatMarkdown(text));
    }

    function showProcessingIndicator(modelName) {
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start text-purple-300 text-sm italic processing-pulse';
      div.innerHTML = `Joes AI (${modelName}) is thinking...`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeProcessingIndicator() {
      document.getElementById('processing-indicator')?.remove();
    }

    function formatMarkdown(text) {
        // Very basic formatter
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                   .replace(/\n/g, '<br>');
    }

    function showWelcome(show) {
        if(show) {
            chatMessages.innerHTML = `<div id="welcome-msg" class="text-center py-20 text-white/50">
                <h1 class="text-2xl font-bold text-white">Hello! How can I help you?</h1>
                <p>Upload images, documents, audio or video to start.</p>
            </div>`;
        } else {
            document.getElementById('welcome-msg')?.remove();
        }
    }
  </script>
</body>
</html>
