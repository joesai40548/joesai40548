  <style>
    /* Reset margins and force full-height canvas safely */
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; color: #0f172a; }
    
    /* Default soft off-white cream background gradient */
    .gradient-bg { background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 26%), radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.14), transparent 24%), #f8fafc; }
    body.cream { background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.11), transparent 24%), radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.09), transparent 22%), #ffffff; }
    
    /* Hardware Accelerated Glassmorphism saturated panels */
    .chat-gradient { 
      background: rgba(255, 255, 255, 0.78) !important; 
      backdrop-filter: blur(24px) saturate(180%); 
      border: 1px solid rgba(148, 163, 184, 0.18); 
      color: #0f172a; 
    }
    body.cream .chat-gradient { 
      background: rgba(255, 255, 255, 0.92) !important; 
      backdrop-filter: blur(24px); 
      border: 1px solid rgba(148, 163, 184, 0.14); 
      color: #1e293b !important; 
    }
    body.cream .bg-black\/20 { background-color: rgba(15, 23, 42, 0.06) !important; }
    body.cream .bg-black\/40 { background-color: rgba(15, 23, 42, 0.10) !important; }
    body.cream .border-white\/10 { border-color: rgba(15, 23, 42, 0.08) !important; }
    body.cream .border-white\/5 { border-color: rgba(15, 23, 42, 0.04) !important; }
    body.cream .border-white\/20 { border-color: rgba(15, 23, 42, 0.12) !important; }
    body.cream .bg-white\/5 { background-color: rgba(255, 255, 255, 0.65) !important; }
    body.cream .bg-white\/10 { background-color: rgba(255, 255, 255, 0.8) !important; }

    .glowing-input {
      position: relative;
      background: white !important;
      padding: 2px;
      border-radius: 1rem;
      background-clip: padding-box;
      border: 2px solid transparent;
    }
    .glowing-input::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 1rem;
      background: conic-gradient(
        from 0deg,
        #ff006e,
        #ff0099,
        #8338ec,
        #3a86ff,
        #06ffa5,
        #ffbe0b,
        #fb5607,
        #ff006e
      );
      background-size: 100% 100%;
      animation: rotateGradient 8s linear infinite;
      z-index: -1;
    }
    .glowing-input > * {
      position: relative;
      z-index: 1;
    }
    @keyframes rotateGradient {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .sidebar-collapsed {
      width: 68px !important;
    }
    .sidebar-collapsed .sidebar-top-brand {
      justify-content: center;
    }
    .sidebar-collapsed .sidebar-brand-icon {
      margin-right: 0;
    }
    .sidebar-collapsed .sidebar-label,
    .sidebar-collapsed .sidebar-button-text,
    .sidebar-collapsed .sidebar-section-title,
    .sidebar-collapsed .sidebar-descriptor,
    .sidebar-collapsed .sidebar-form-control,
    .sidebar-collapsed .sidebar-bottom,
    .sidebar-collapsed .sidebar-list,
    .sidebar-collapsed .sidebar-brand-label,
    .sidebar-collapsed .sidebar-section-label,
    .sidebar-collapsed #chat-mode-select,
    .sidebar-collapsed p {
      opacity: 0;
      width: 0;
      max-width: 0;
      min-width: 0;
      overflow: hidden;
      pointer-events: none;
      display: none !important;
    }

    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
    body.cream #chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); }

    /* Custom Snake Motion Wave Animation */
    @keyframes snakeWave {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
    }
    .snake-dot {
        animation: snakeWave 1.2s ease-in-out infinite;
        width: 6px;
        height: 6px;
        background-color: #a78bfa;
        border-radius: 50%;
        display: inline-block;
    }
    .snake-dot:nth-child(2) { animation-delay: 0.15s; }
    .snake-dot:nth-child(3) { animation-delay: 0.3s; }
    .snake-dot:nth-child(4) { animation-delay: 0.45s; }

    /* Custom dynamic color shifting background orbs */
    @keyframes colorShift1 {
        0% { background-color: rgba(139, 92, 246, 0.12); transform: translate(0px, 0px) scale(1); }
        50% { background-color: rgba(236, 72, 153, 0.12); transform: translate(40px, -40px) scale(1.15); }
        100% { background-color: rgba(139, 92, 246, 0.12); transform: translate(0px, 0px) scale(1); }
    }
    @keyframes colorShift2 {
        0% { background-color: rgba(99, 102, 241, 0.12); transform: translate(0px, 0px) scale(1); }
        50% { background-color: rgba(59, 130, 246, 0.12); transform: translate(-40px, 40px) scale(0.9); }
        100% { background-color: rgba(99, 102, 241, 0.12); transform: translate(0px, 0px) scale(1); }
    }
    .glowing-blob-1 { animation: colorShift1 10s ease-in-out infinite; }
    .glowing-blob-2 { animation: colorShift2 14s ease-in-out infinite; }

    /* Color Changing Glowing Textarea Border Animation */
    @keyframes borderGlow {
        0%, 100% { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.3); }
        33% { border-color: #ec4899; box-shadow: 0 0 12px rgba(236, 72, 153, 0.3); }
        66% { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }
    }
    .glowing-input { animation: borderGlow 6s ease-in-out infinite; }

    /* Markdown tables layout styling */
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th { background-color: rgba(0, 0, 0, 0.05); color: #4f46e5 !important; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; tracking-wider; padding: 12px 16px; border-bottom: 1px solid rgba(0, 0, 0, 0.08); text-align: left; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(0, 0, 0, 0.08); text-align: left; }
    tr:hover { background-color: rgba(0, 0, 0, 0.02); }

    /* Theme typography adjustments */
    body .text-white { color: #1e293b !important; }
    body .text-white\/30 { color: rgba(30, 41, 59, 0.5) !important; }
    body .text-white\/40 { color: rgba(30, 41, 59, 0.6) !important; }
    body .text-white\/50 { color: rgba(30, 41, 59, 0.7) !important; }
    body textarea { color: #1e293b !important; background: transparent; border-color: transparent; }
    body select { color: #1e293b !important; background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
    body aside { background: rgba(241, 245, 249, 0.95); border-color: rgba(0,0,0,0.1); }
    body header { background: rgba(255, 255, 255, 0.6); border-color: rgba(0,0,0,0.05); }
    body #welcome-msg h1 { color: #1e293b !important; }
    body .chat-gradient p, body .chat-gradient li { color: #334155 !important; }
    body .chat-gradient strong { color: #4338ca !important; }

    /* Unified mobile-responsive container protecting Safe Areas on phones */
    .app-container {
        height: 100dvh;
        max-height: 100dvh;
        width: 100vw;
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: 1fr;
        overflow: hidden;
        position: relative;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
    }
    @media (max-width: 768px) {
        .app-container {
            grid-template-columns: 1fr;
        }
    }

    /* Modern sidebar with smooth grid transitions */
    #sidebar {
        grid-column: 1;
        grid-row: 1;
        width: 260px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.92) 100%);
        border-right: 1px solid rgba(148, 163, 184, 0.2);
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(12px) saturate(180%);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 40;
        overflow: hidden;
        position: relative;
    }
    #sidebar.sidebar-collapsed {
        width: 68px;
    }
    @media (max-width: 768px) {
        #sidebar {
            position: fixed;
            inset: 0;
            left: 0;
            z-index: 50;
            transform: translateX(-100%);
            border-right: none;
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.12);
        }
        #sidebar:not(.sidebar-mobile-hidden) {
            transform: translateX(0);
        }
    }

    /* Sidebar header with toggle */
    .sidebar-header {
        padding: 1rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-header.collapsed {
        justify-content: center;
    }
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        min-width: 0;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-brand-icon {
        width: 2rem;
        height: 2rem;
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }
    .sidebar-brand-label {
        font-size: 1.125rem;
        font-weight: 600;
        color: #1e293b;
        white-space: nowrap;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Sidebar toggle button */
    #sidebar-toggle-btn {
        width: 2rem;
        height: 2rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
        background: transparent;
        border: 1px solid rgba(148, 163, 184, 0.2);
        color: #64748b;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 1.25rem;
    }
    #sidebar-toggle-btn:hover {
        background: rgba(100, 116, 139, 0.08);
        border-color: rgba(148, 163, 184, 0.3);
        color: #475569;
    }
    #sidebar-toggle-btn:active {
        transform: scale(0.95);
    }

    /* Sidebar sections */
    .sidebar-section {
        padding: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-section.new-chat {
        flex-shrink: 0;
    }
    .sidebar-section.chats {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
    }
    .sidebar-section.settings {
        flex-shrink: 0;
        border-top: 1px solid rgba(148, 163, 184, 0.15);
    }

    /* Scrollbar styling */
    .sidebar-section.chats::-webkit-scrollbar {
        width: 6px;
    }
    .sidebar-section.chats::-webkit-scrollbar-track {
        background: transparent;
    }
    .sidebar-section.chats::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.3);
        border-radius: 3px;
        transition: background 0.2s ease;
    }
    .sidebar-section.chats::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.5);
    }

    /* New chat button */
    #new-chat-btn {
        width: 100%;
        padding: 0.75rem 1rem;
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }
    #new-chat-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(251, 191, 36, 0.3);
    }
    #new-chat-btn:active {
        transform: translateY(0);
    }
    #sidebar.sidebar-collapsed #new-chat-btn {
        width: auto;
        height: 2.5rem;
        padding: 0;
        min-width: 2.5rem;
    }

    /* Session list */
    #session-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .session-item {
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: transparent;
        border: 1px solid transparent;
        color: #64748b;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.875rem;
    }
    .session-item:hover {
        background: rgba(100, 116, 139, 0.06);
        border-color: rgba(148, 163, 184, 0.2);
        color: #475569;
    }
    .session-item.active {
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.3);
        color: #1e293b;
        font-weight: 500;
    }

    /* Sidebar labels */
    .sidebar-section-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.75rem;
        padding: 0 0.5rem;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Mode selector */
    #chat-mode-select {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: rgba(100, 116, 139, 0.05);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 0.5rem;
        color: #1e293b;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    #chat-mode-select:hover {
        border-color: rgba(148, 163, 184, 0.4);
    }
    #chat-mode-select:focus {
        outline: none;
        border-color: #fbbf24;
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }
  
    /* Live disappearing glowing dots */
    @keyframes disappearingDot {
        0% { opacity: 1; transform: scale(1); filter: blur(0); }
        55% { opacity: 0.65; transform: scale(1.35); filter: blur(1px); }
        100% { opacity: 0; transform: scale(1.8); filter: blur(4px); }
    }
    .disappearing-dot {
        animation: disappearingDot 1.8s ease-in-out infinite;
        width: 8px;
        height: 8px;
        background: radial-gradient(circle, #fbbf24 0%, #f59e0b 45%, transparent 70%);
        border-radius: 50%;
        box-shadow: 0 0 16px rgba(251, 191, 36, 0.55);
        display: inline-block;
    }
    .disappearing-dot:nth-child(2) { animation-delay: 0.2s; }
    .disappearing-dot:nth-child(3) { animation-delay: 0.4s; }
    .disappearing-dot:nth-child(4) { animation-delay: 0.6s; }
</style>
</head>

    // Binary file reader helper
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    window.speakText = (btn, text) => {
        window.speechSynthesis.cancel();
        
        if (btn.dataset.speaking === "true") {
            btn.textContent = '🔊 Read';
            btn.classList.remove('text-red-400');
            btn.dataset.speaking = "false";
            return;
        }

        document.querySelectorAll('.tts-trigger').forEach(b => {
            b.textContent = '🔊 Read';
            b.classList.remove('text-red-400');
            b.dataset.speaking = "false";
        });

        const decoded = decodeURIComponent(text);
        let cleanTextString = decoded.replace(/<\/?[^>]+(>|$)/g, "")
            .replace(/```[\s\S]*?```/g, "[Code Block]")
            .replace(/`([^`]+)`/g, "$1")
            .replace(/\*\*([^*]+)\*\*/g, "$1")
            .replace(/_([^_]+)_/g, "$1")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "$1")
            .trim();

        if (!cleanTextString) {
            alert("No readable content.");
            return;
        }

        const utterance = new SpeechSynthesisUtterance(cleanTextString);
        const loadedVoices = window.speechSynthesis.getVoices();
        if (loadedVoices.length > 0) {
            const preferedVoice = loadedVoices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || 
                                  loadedVoices.find(v => v.lang.startsWith('en')) || 
                                  loadedVoices[0];
            utterance.voice = preferedVoice;
        }

        utterance.onend = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
            btn.dataset.speaking = "false";
        };
        utterance.onerror = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
            btn.dataset.speaking = "false";
        };

        btn.textContent = '🛑 Stop';
        btn.classList.add('text-red-400');
        btn.dataset.speaking = "true";
        
        setTimeout(() => {
            window.speechSynthesis.speak(utterance);
        }, 100);
    };

    window.runCodeSandbox = (encodedCode) => {
        const decoded = decodeURIComponent(encodedCode);
        if (sandboxModal && sandboxIframe) {
            sandboxModal.classList.remove('hidden');
            const iframeDoc = sandboxIframe.contentDocument || sandboxIframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(decoded);
            iframeDoc.close();
        }
    };

    if (sandboxCloseBtn) {
        sandboxCloseBtn.addEventListener('click', () => {
            if (sandboxModal) sandboxModal.classList.add('hidden');
        });
    }

function setupSidebarHandlers() {
    if (sidebarOpenBtn && sidebar) {
        sidebarOpenBtn.addEventListener('click', () => {
            sidebar.classList.remove('sidebar-mobile-hidden');
        });
    }
    if (sidebarCloseBtn && sidebar) {
        sidebarCloseBtn.addEventListener('click', () => {
            sidebar.classList.add('sidebar-mobile-hidden');
        });
    }
    if (sidebarToggleBtn && sidebar) {
        sidebarToggleBtn.addEventListener('click', () => {
            const isCollapsed = sidebar.classList.toggle('sidebar-collapsed');
            sidebarToggleBtn.textContent = isCollapsed ? '⟩' : '⟨';
            localStorage.setItem('joes_ai_sidebar_collapsed', isCollapsed ? 'true' : 'false');

    // Restore collapsed preference on load
    if (localStorage.getItem('joes_ai_sidebar_collapsed') === 'true' && sidebar) {
        sidebar.classList.add('sidebar-collapsed');
        if (sidebarToggleBtn) sidebarToggleBtn.textContent = '⟩';
    }
}

function setupThemeHandler() {
    if (themeBtn) {
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const lightActive = document.body.classList.contains('light');
            themeBtn.innerHTML = lightActive ? '☀️' : '🌙';
            localStorage.setItem('joes_ai_theme', lightActive ? 'light' : 'cream');
        });

        if (localStorage.getItem('joes_ai_theme') === 'cream') {
            document.body.classList.add('cream');
            themeBtn.innerHTML = '🌙';
        } else {
            document.body.classList.remove('cream');
            themeBtn.innerHTML = '🌙';
        }
    }
}

    // Dynamic copy handler fallback
    window.copyToClipboard = (btn, encodedText) => {
        const text = decodeURIComponent(encodedText);
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = originalText; }, 2000);
        }).catch(err => {
            console.error('Could not copy text: ', err);
        });
    };

    function setupExportHandler() {
        if (exportBtn) {
            exportBtn.addEventListener('click', () => {
                if (chatHistory.length === 0) {
                    alert("No chat history to export yet!");
                    return;
                }

                let mdString = `# Joes AI Conversation History
*Date: ${new Date().toLocaleDateString()}*

---

`;
                chatHistory.forEach(msg => {
                    const author = msg.role === 'user' ? 'User' : 'Joes AI';
                    mdString += `### **${author}**:
${msg.content}

---

`;
                });

                const blob = new Blob([mdString], { type: 'text/markdown;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.setAttribute('download', `JoesAI_ChatExport_${Date.now()}.md`);
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
            });
        }
    }

    function setupEventListeners() {
      if (sendBtn) sendBtn.addEventListener('click', handleSend);
      if (messageInput) {
          messageInput.addEventListener('keydown', (e) => { 
              if (e.key === 'Enter' && !e.shiftKey) { 
                  e.preventDefault(); 
                  handleSend(); 
              } 
          });
      }
      
      const attachBtn = document.getElementById('attachment-btn');
      const fileInput = document.getElementById('file-input');
      if (attachBtn && fileInput) {
          attachBtn.addEventListener('click', () => fileInput.click());
          fileInput.addEventListener('change', handleFileSelect);
      }
      
      const clearBtn = document.getElementById('clear-btn');
      if (clearBtn) {
          clearBtn.addEventListener('click', () => {
              startNewChat();
          });
      }
      
      if (newChatBtn) {
          newChatBtn.addEventListener('click', startNewChat);
      }
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition && micBtn) {
          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';

          recognition.onstart = () => {
              micBtn.innerHTML = '🔴';
              micBtn.classList.add('animate-pulse', 'bg-red-500/30');
          };

          recognition.onresult = (event) => {
              const transcript = event.results[0][0].transcript;
              if (messageInput) {
                  messageInput.value = (messageInput.value + ' ' + transcript).trim();
                  messageInput.focus();
                  messageInput.dispatchEvent(new Event('input'));
              }
          };

          recognition.onerror = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          recognition.onend = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          micBtn.addEventListener('click', () => {
              recognition.start();
          });
      } else if (micBtn) {
          micBtn.style.display = 'none';
      }
    }

    async function fetchSessions() {
        if (!sessionList) return;
        sessionList.innerHTML = `<p class="text-xs text-slate-500 italic px-2">Syncing with Koofr...</p>`;
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Failed to load sessions.");
            sessions = await response.json();
            renderSessions();
        } catch (err) {
            console.error(err);
            sessionList.innerHTML = `<p class="text-xs text-red-400 italic px-2">Koofr offline</p>`;
        }
    }

    function startNewChat() {
        currentSessionId = null;
        activeFilename = null;
        chatHistory = [];
        if (chatMessages) chatMessages.innerHTML = '';
        renderSessions();
        showWelcome(true);
        hideSidebarOnMobile(); // Ensures sidebar retreats after selecting + New Chat
    }

    window.loadSession = async (filename) => {
        showLoadingIndicator(true);
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Could not retrieve file.");
            const data = await response.json();
            
            currentSessionId = data.sessionId;
            activeFilename = filename;
            chatHistory = data.history || [];
            if (chatMessages) chatMessages.innerHTML = '';
            
            if (chatHistory.length === 0) {
                showWelcome(true);
            } else {
                showWelcome(false);
                chatHistory.forEach(msg => {
                    addMessageToUI(msg.role, msg.content, msg.attachment);
                });
            }
            renderSessions();
            hideSidebarOnMobile(); // Dismisses overlay sidebar upon loading active chat
        } catch (err) {
            alert(`Error loading chat: ${err.message}`);
        } finally {
            showLoadingIndicator(false);
        }
    };

    window.deleteSession = async (filename) => {
        if (!confirm('Are you sure you want to permanently delete this chat from your Koofr cloud?')) return;
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                method: 'DELETE',
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Cloud rejected deletion.");
            
            if (activeFilename === filename) {
                startNewChat();
            }
            fetchSessions();
        } catch (err) {
            alert(`Deletion failed: ${err.message}`);
        }
    };

    window.renameSession = async (filename, id, oldTitle) => {
        const renamedInput = prompt('Enter new conversation title:', oldTitle);
        if (!renamedInput || renamedInput.trim() === '' || renamedInput === oldTitle) return;

        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/rename`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    oldFilename: filename,
                    sessionId: id,
                    newTitle: renamedInput.trim()
                })
            });

            if (!response.ok) throw new Error("Koofr failed to rename file.");
            const data = await response.json();

            if (activeFilename === filename) {
                activeFilename = data.filename;
            }
            await fetchSessions();
        } catch (err) {
            alert(`Rename Failed: ${err.message}`);
        }
    };

    function renderSessions() {
        if (!sessionList) return;
        sessionList.innerHTML = '';
        if (sessions.length === 0) {
            sessionList.innerHTML = `<p class="text-xs text-slate-500 italic px-2">No recent chats</p>`;
            return;
        }

        sessions.forEach(sess => {
            const isActive = sess.filename === activeFilename;
            const item = document.createElement('div');
            item.className = `group flex items-center justify-between p-2.5 rounded-xl text-xs cursor-pointer transition-all ${isActive ? 'bg-slate-100 text-slate-900 border-l-2 border-amber-500' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`;
            item.innerHTML = `
                <span class="truncate flex-1 pr-2">💬 ${sess.title}</span>
                <div class="flex items-center space-x-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="text-slate-500 hover:text-amber-400 p-0.5 rename-btn" title="Rename thread">✏️</button>
                    <button class="text-slate-500 hover:text-red-500 p-0.5 delete-btn" title="Delete thread">✕</button>
                </div>
            `;
            
            item.addEventListener('click', (e) => {
                const renameTarget = e.target.closest('.rename-btn');
                const deleteTarget = e.target.closest('.delete-btn');
                
                if (renameTarget) {
                    window.renameSession(sess.filename, sess.id, sess.title);
                } else if (deleteTarget) {
                    window.deleteSession(sess.filename);
                } else {
                    window.loadSession(sess.filename);
                }
            });
            sessionList.appendChild(item);
        });
    }

    async function saveCurrentChatToCloud(title) {
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    sessionId: currentSessionId,
                    title: title,
                    history: chatHistory
                })
            });
            if (response.ok) {
                const data = await response.json();
                activeFilename = data.filename;
            }
        } catch (err) {
            console.warn("Koofr autocommit issue:", err.message);
        }
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.size > 50 * 1024 * 1024) {
            alert("File size exceeds 50MB limit.");
            return;
        }

        selectedAttachment = file;
        showAttachmentChip(file);
    }

    function showAttachmentChip(file) {
        const container = document.getElementById('attachment-chip-container');
        if (!container) return;
        let previewHtml = '';

        if (file.type.startsWith('image/')) {
            const imgUrl = URL.createObjectURL(file);
            previewHtml = `<img src="${imgUrl}" class="w-8 h-8 rounded-lg object-cover border border-white/20 shadow-md">`;
        }

        container.innerHTML = `
            <div class="bg-amber-500/80 backdrop-blur-md border border-amber-300 text-slate-900 pl-2 pr-4 py-1.5 rounded-2xl text-xs flex items-center space-x-2 animate__animated animate__fadeInUp">
                ${previewHtml}
                <span class="font-medium truncate max-w-[200px] text-slate-900">📎 ${file.name}</span>
                <button onclick="window.removeAttachment()" class="hover:text-amber-700 transition-colors font-bold ml-2">✕</button>
            </div>
        `;
        container.classList.remove('hidden');
    }

    window.removeAttachment = () => {
        selectedAttachment = null;
        const fileInput = document.getElementById('file-input');
        if (fileInput) fileInput.value = "";
        const container = document.getElementById('attachment-chip-container');
        if (container) container.classList.add('hidden');
    };

    window.useQuickPrompt = (promptText, preferredMode) => {
        if (messageInput && chatModeSelect) {
            messageInput.value = promptText;
            if (preferredMode) {
                chatModeSelect.value = preferredMode;
            }
            messageInput.focus();
            messageInput.dispatchEvent(new Event('input'));
        }
    };

    function toggleInputState(disabled) {
        if (!messageInput || !sendBtn) return;
        messageInput.disabled = disabled;
        sendBtn.disabled = disabled;
        
        const attachBtn = document.getElementById('attachment-btn');
        if (attachBtn) attachBtn.disabled = disabled;
        if (micBtn) micBtn.disabled = disabled;

        if (disabled) {
            messageInput.classList.add('opacity-50');
            sendIcon.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
        } else {
            messageInput.classList.remove('opacity-50');
            sendIcon.innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            `;
        }
    }

    async function handleSend() {
      if (!messageInput || !chatModeSelect) return;
      const message = messageInput.value.trim();
      const hasAttachment = !!selectedAttachment;
      const currentMode = chatModeSelect.value;
      
      if (!message && !hasAttachment) return;

      messageInput.value = '';
      messageInput.style.height = 'auto';
      messageInput.blur();
      toggleInputState(true);

      let activeTitle = '';
      if (!currentSessionId) {
          currentSessionId = 'session_' + Date.now();
          const firstTopic = message || (selectedAttachment ? `Attached: ${selectedAttachment.name}` : 'New Conversation');
          activeTitle = firstTopic.length > 22 ? firstTopic.substring(0, 22) + '...' : firstTopic;
      } else {
          const activeSess = sessions.find(s => s.filename === activeFilename);
          activeTitle = activeSess ? activeSess.title : 'Saved Chat';
      }

      let attachmentPayload = null;
      let base64AttachmentData = null;
      let currentMimeType = null;

      if (hasAttachment) {
          base64AttachmentData = await readFileAsBase64(selectedAttachment);
          currentMimeType = selectedAttachment.type || 'application/octet-stream';
          
          attachmentPayload = {
              name: selectedAttachment.name,
              type: currentMimeType,
              base64: selectedAttachment.type.startsWith('image/') ? `data:${currentMimeType};base64,${base64AttachmentData}` : null
          };
      }

      const cloudAttachmentPayload = hasAttachment ? { name: selectedAttachment.name, type: currentMimeType } : null;

      addMessageToUI('user', message, attachmentPayload);
      chatHistory.push({ 
          role: 'user', 
          content: message, 
          attachment: cloudAttachmentPayload
      });
      
      await saveCurrentChatToCloud(activeTitle);

      window.removeAttachment();
      showWelcome(false);
      showProcessingIndicator();

      try {
        let aiText = '';
        
        if (hasAttachment) {
            const response = await fetch(`${BACKEND_URL}/api/gemini`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({ 
                    message, 
                    fileData: base64AttachmentData, 
                    mimeType: currentMimeType, 
                    mode: currentMode,
                    chatHistory: chatHistory.slice(0, -1).map(h => ({ role: h.role, content: h.content }))
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Server error');
            aiText = data.text;
        } else {
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    messages: [...chatHistory.slice(-6).map(m => ({ role: m.role, content: m.content })), { role: 'user', content: message }],
                    mode: currentMode
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error('Model Request Failed');
            aiText = data.text;
        }

        removeProcessingIndicator();
        addMessageToUI('assistant', aiText);
        chatHistory.push({ role: 'assistant', content: aiText });

        await saveCurrentChatToCloud(activeTitle);
        await fetchSessions();

      } catch (err) {
        removeProcessingIndicator();
        addMessageToUI('assistant', `⚠️ **Error:** ${err.message}`);
      } finally {
        toggleInputState(false);
      }
    }

    function addMessageToUI(role, content, attachmentData = null) {
      if (!chatMessages) return;
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster z-10 relative`;
      
      const innerClass = role === 'user' 
        ? 'bg-gradient-to-br from-amber-500 to-yellow-400 text-white rounded-2xl rounded-tr-none border border-amber-500/30 shadow-lg' 
        : 'chat-gradient text-slate-900 rounded-2xl rounded-tl-none border border-slate-200 shadow-lg';

      let attachmentHtml = '';
      if (attachmentData) {
          if (attachmentData.base64) {
              attachmentHtml = `<img src="${attachmentData.base64}" referrerpolicy="no-referrer" class="rounded-xl max-w-full my-2 max-h-48 object-cover border border-white/10 shadow-md">`;
          } else {
              attachmentHtml = `
                  <div class="flex items-center space-x-3 p-3 my-2 bg-slate-100/80 border border-slate-200 rounded-xl max-w-sm text-xs">
                      <span class="text-xl">📄</span>
                      <div class="truncate flex-1">
                          <p class="font-medium truncate text-slate-900">${attachmentData.name}</p>
                          <p class="text-slate-500 text-[10px] uppercase tracking-wide">${attachmentData.type.split('/')[1] || 'File'}</p>
                      </div>
                  </div>
              `;
          }
      }

      const encodedString = encodeURIComponent(content || '');
      const speakerBadge = role === 'assistant' 
        ? `<div class="flex justify-end pt-1"><button class="text-slate-500 hover:text-amber-500 text-xs p-1 tracking-wide tts-trigger" data-content="${encodedString}">🔊 Read</button></div>` 
        : '';

      wrapper.innerHTML = `<div class="max-w-[85%] px-5 py-3.5 shadow-xl ${innerClass} overflow-x-auto">${attachmentHtml}${formatMarkdown(content)}${speakerBadge}</div>`;
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (window.mermaid) {
          setTimeout(() => {
              window.mermaid.run({
                  querySelector: '.mermaid'
              }).catch(err => {});
          }, 50);
      }
    }

    function showProcessingIndicator() {
      if (!chatMessages) return;
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start items-center space-x-2 animate__animated animate__fadeInUp animate__faster mb-4';
      div.innerHTML = `
        <div class="chat-gradient text-slate-900 rounded-2xl rounded-tl-none border border-slate-200 px-5 py-3.5 shadow-xl flex items-center space-x-3">
          <span id="processing-text" class="text-xs text-amber-400 italic">Joes AI is thinking</span>
          <div class="flex space-x-1.5 items-center h-4">
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
          </div>
        </div>
      `;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const thinkingStages = [
          "Joes AI is thinking",
          "Joes AI is processing",
          "Joes AI is finalizing",
          "Joes AI is wrapping up"
      ];
      let stageCounter = 0;
      const targetTextSpan = div.querySelector('#processing-text');

      const textStageInterval = setInterval(() => {
          stageCounter++;
          if (stageCounter < thinkingStages.length) {
              if (targetTextSpan) targetTextSpan.textContent = thinkingStages[stageCounter];
              chatMessages.scrollTop = chatMessages.scrollHeight;
          } else {
              clearInterval(textStageInterval);
          }
      }, 1800);

      div.dataset.intervalId = textStageInterval;
    }

    function removeProcessingIndicator() {
      const indicatorEl = document.getElementById('processing-indicator');
      if (indicatorEl) {
          if (indicatorEl.dataset.intervalId) {
              clearInterval(parseInt(indicatorEl.dataset.intervalId));
          }
          indicatorEl.remove();
      }
    }

    function showLoadingIndicator(show) {
        if (show && chatMessages) {
            chatMessages.innerHTML = `
              <div class="flex flex-col items-center justify-center h-full py-20 text-slate-500 space-y-3">
                <div class="w-6 h-6 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-xs text-slate-500">Loading conversation from Koofr...</span>
              </div>
            `;
        }
    }

    function formatMarkdown(text) {
        if (!text) return '';
        
        const temporaryCodeVault = [];
        
        // Collapse 3 or more consecutive newlines to maximum 2 to avoid huge empty scattered gaps
        let escaped = text
            .replace(/\n{3,}/g, '\n\n')
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Extract code blocks first to protect them from parsing
        escaped = escaped.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${temporaryCodeVault.length}__`;
            temporaryCodeVault.push({ lang, code });
            return token;
        });

        // Robust matching for markdown images
        escaped = escaped.replace(/!\[([^\]]*)\]\(([^)]+?)(?:\s+"[^"]*")?\)/g, (match, alt, src) => {
            return `___IMG_START___${src.trim()}___ALT___${alt || 'Image'}___IMG_END___`;
        });

        escaped = escaped.replace(/___IMG_START___(.*?)___ALT___(.*?)___IMG_END___/g, (match, src, alt) => {
            const wrapperClass = "bg-white/60 border-slate-200/80 shadow-md";
            const captionClass = "bg-slate-50/90 text-slate-500 border-slate-200";
            // Strip newlines inside image template to prevent hoisted <br>
            const html = `
                <div class="image-card my-4 overflow-hidden rounded-xl border shadow-xl max-w-full ${wrapperClass}">
                    <img src="${src}" alt="${alt}" referrerpolicy="no-referrer" loading="lazy" class="w-full h-auto object-contain max-h-[380px]" onerror="this.onerror=null; this.closest('.image-card').remove();">
                    <p class="p-2 text-center text-xs border-t ${captionClass}">${alt}</p>
                </div>
            `;
            return html.replace(/\n/g, ' ');
        });

        // Refined line-by-line GFM table construction with clean, cream-safe styling
        const lines = escaped.split('\n');
        let insideTable = false;
        let generatedTableBuffer = '';
        const compiledLines = [];

        for (let i = 0; i < lines.length; i++) {
            const rawLine = lines[i].trim();
            if (rawLine.startsWith('|') && rawLine.endsWith('|')) {
                // If the line consists strictly of table separation indicators (GFM compliant)
                if (/^[|:\-\s]+$/.test(rawLine)) {
                    insideTable = true;
                    continue;
                }
                const columnValues = rawLine.split('|').slice(1, -1).map(v => v.trim());
                if (!insideTable) {
                    insideTable = true;
                    const wrapperClass = "bg-white/60 border-slate-200/80 shadow-md";
                    const headClass = "bg-slate-100/90 text-amber-600";
                    
                    generatedTableBuffer = `
                        <div class="overflow-x-auto my-4 border rounded-xl max-w-full ${wrapperClass}">
                            <table class="min-w-full divide-y divide-slate-200 text-sm text-left">
                                <thead class="${headClass} text-xs font-semibold uppercase tracking-wider">
                                    <tr>
                    `;
                    columnValues.forEach(columnTitle => {
                        generatedTableBuffer += `<th class="px-4 py-3">${columnTitle}</th>`;
                    });
                    generatedTableBuffer += `
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-200">
                    `;
                } else {
                    const textClass = "text-slate-800";
                    generatedTableBuffer += `<tr class="hover:bg-slate-100/50 transition-colors">`;
                    columnValues.forEach(cellValue => {
                        generatedTableBuffer += `<td class="px-4 py-3 ${textClass}">${cellValue}</td>`;
                    });
                    generatedTableBuffer += `</tr>`;
                }
            } else {
                if (insideTable) {
                    generatedTableBuffer += `</tbody></table></div>`;
                    // Strip all newlines inside table markup to prevent hoisted <br> tags above it
                    compiledLines.push(generatedTableBuffer.replace(/\n/g, ' '));
                    generatedTableBuffer = '';
                    insideTable = false;
                }
                compiledLines.push(lines[i]);
            }
        }
        if (insideTable) {
            generatedTableBuffer += `</tbody></table></div>`;
            compiledLines.push(generatedTableBuffer.replace(/\n/g, ' '));
        }

        escaped = compiledLines.join('\n');

        escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, linkText, url) => {
            return `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="text-amber-500 hover:text-amber-400 font-semibold underline decoration-amber-300/40 hover:decoration-amber-300 transition-all inline-flex items-center gap-1">
                    ${linkText}
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                </a>
            `.replace(/\n/g, ' '); // Clean inline link
        });

        escaped = escaped.replace(/`([^`]+)`/g, '<code class="bg-white/10 text-amber-600 px-1.5 py-0.5 rounded text-xs font-mono">$1</code>')
            .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-amber-700">$1</strong>')
            .replace(/^\s*[-*+]\s+(.*)$/gm, '<li class="list-disc ml-4 my-1 text-slate-700">$1</li>');

        // Convert actual remaining text newlines into <br> tags
        escaped = escaped.replace(/\n/g, '<br>');

        // Restore protected code blocks at the very end to keep formatting exact
        temporaryCodeVault.forEach((block, idx) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${idx}__`;
            const displayLang = block.lang ? block.lang.toUpperCase() : 'CODE';
            const encoded = encodeURIComponent(block.code.trim());
            
            let finalOutput = '';
            if (block.lang && block.lang.toLowerCase() === 'mermaid') {
                finalOutput = `<div class="mermaid my-4 p-4 bg-slate-100/80 border border-slate-200 rounded-xl text-center overflow-x-auto">${block.code.trim()}</div>`;
            } else {
                if (['HTML', 'XML', 'JS', 'JAVASCRIPT', 'CSS'].includes(displayLang)) {
                    finalOutput = `
                        <div class="relative group my-3 border border-slate-200 rounded-xl overflow-hidden bg-slate-100/80 text-left">
                            <div class="flex justify-between items-center px-4 py-1.5 bg-slate-100 border-b border-slate-200 text-[10px] text-slate-500 tracking-wider">
                                <span>${displayLang}</span>
                                <div class="flex items-center">
                                    <button class="text-slate-600 hover:text-amber-500 transition-colors copy-trigger" data-code="${encoded}">Copy</button>
                                    <button class="text-slate-600 hover:text-amber-500 transition-colors ml-2 run-trigger" data-code="${encoded}">Run</button>
                                </div>
                            </div>
                            <pre class="p-4 overflow-x-auto text-sm font-mono text-amber-500">${block.code.trim()}</pre>
                        </div>
                    `;
                } else {
                    finalOutput = `
                        <div class="relative group my-3 border border-slate-200 rounded-xl overflow-hidden bg-slate-100/80 text-left">
                            <div class="flex justify-between items-center px-4 py-1.5 bg-slate-100 border-b border-slate-200 text-[10px] text-slate-500 tracking-wider">
                                <span>${displayLang}</span>
                                <button class="text-slate-600 hover:text-amber-500 transition-colors copy-trigger" data-code="${encoded}">Copy</button>
                            </div>
                            <pre class="p-4 overflow-x-auto text-sm font-mono text-amber-500">${block.code.trim()}</pre>
                        </div>
                    `;
                }
            }
            escaped = escaped.replace(token, finalOutput);
        });

        return escaped;
    }

    function initializeApp() {
        setupEventListeners();
        setupSidebarHandlers();
        setupThemeHandler();
        setupExportHandler();
        setupSpeechRecognition();
        
        setupToolHandlers();

        showWelcome(true);
        fetchSessions();
    }

    function setupToolHandlers() {
        const driveModal = document.getElementById('drive-modal');
        const driveCloseBtn = document.getElementById('drive-close-btn');
        const driveFilesList = document.getElementById('drive-files-list');
        const youtubeModal = document.getElementById('youtube-modal');
        const youtubeCloseBtn = document.getElementById('youtube-close-btn');
        const youtubeSearchInput = document.getElementById('youtube-search-input');
        const youtubeSearchSubmit = document.getElementById('youtube-search-submit');
        const youtubeResultsList = document.getElementById('youtube-results-list');

        driveCloseBtn.addEventListener('click', () => {
            driveModal.classList.add('hidden');
        });

        youtubeCloseBtn.addEventListener('click', () => {
            youtubeModal.classList.add('hidden');
            youtubeResultsList.innerHTML = '<p class="text-center text-slate-500 py-8">Search results will appear here.</p>';
        });

        // Render YouTube results as robust visual card items
        function renderYouTubeResults(videos) {
            if (!videos.length) {
                return '<p class="text-center text-slate-500">No videos found.</p>';
            }
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${videos.map(v => `
                        <div class="bg-white/95 rounded-xl border border-slate-200/70 overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col">
                            <div class="relative aspect-video bg-slate-100 overflow-hidden">
                                <img src="${v.thumbnail}" referrerpolicy="no-referrer" loading="lazy" alt="${v.title}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://placehold.co/320x180?text=No+Thumbnail';">
                                <span class="absolute bottom-2 right-2 bg-black/70 text-white text-[10px] px-1.5 py-0.5 rounded">Video</span>
                            </div>
                            <div class="p-3 flex-grow flex flex-col justify-between">
                                <div>
                                    <h4 class="font-semibold text-slate-800 text-sm line-clamp-2" title="${v.title}">${v.title}</h4>
                                    <p class="text-slate-500 text-xs mt-1 font-medium">${v.channelTitle}</p>
                                    <p class="text-slate-400 text-[11px] mt-1 line-clamp-2">${v.description || ''}</p>
                                </div>
                                <div class="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between">
                                    <a href="${v.url}" target="_blank" rel="noopener noreferrer" class="text-xs font-semibold text-amber-500 hover:text-amber-400 inline-flex items-center gap-1">
                                        ▶ Play Video
                                    </a>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Update YouTube results rendering
        function updateYouTubeResults(videos) {
            youtubeResultsList.innerHTML = renderYouTubeResults(videos);
        }

        // YouTube search handler with table rendering
        youtubeSearchSubmit.addEventListener('click', async () => {
            const query = youtubeSearchInput.value.trim();
            if (!query) {
                youtubeResultsList.innerHTML = '<p class="text-center text-red-500">Please enter a search query.</p>';
                return;
            }
            youtubeResultsList.innerHTML = '<p class="text-center text-amber-500 animate-pulse">Searching...</p>';
            try {
                const response = await fetch(`${BACKEND_URL}/api/youtube/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, maxResults: 6 })
                });
                if (!response.ok) throw new Error('Search failed');
                const data = await response.json();
                const results = data.videos;
                if (!results || !results.length) {
                    updateYouTubeResults([]);
                } else {
                    updateYouTubeResults(results);
                }
            } catch (err) {
                console.error(err);
                youtubeResultsList.innerHTML = `<p class="text-center text-red-500">Search failed: ${err.message}</p>`;
            }
        });

        const driveFilesBtn = document.getElementById('drive-files-btn');
        const youtubeSearchBtn = document.getElementById('youtube-search-btn');

        driveFilesBtn.addEventListener('click', async () => {
            driveModal.classList.remove('hidden');
            driveFilesList.innerHTML = '<p class="text-center text-slate-500 py-8">Loading files...</p>';
            try {
                const response = await fetch(`${BACKEND_URL}/api/drive/files`);
                if (!response.ok) throw new Error('Failed to fetch files');
                const data = await response.json();
                const files = data.files;
                if (!files.length) {
                    driveFilesList.innerHTML = '<p class="text-center text-slate-500">No files found.</p>';
                } else {
                    const html = files.map(f => `
                        <div class="flex items-center gap-2 p-2 rounded hover:bg-slate-100 cursor-pointer transition-colors">
                            <span class="w-6 h-6 flex items-center justify-center bg-slate-200 rounded-md text-slate-600">
                                📄
                            </span>
                            <div class="flex-1 truncate">
                                <p class="font-medium text-slate-900">${f.name}</p>
                                <p class="text-slate-500 text-[10px]">${f.mimeType}</p>
                            </div>
                        </div>`).join('');
                    driveFilesList.innerHTML = html;
                }
            } catch (err) {
                console.error(err);
                driveFilesList.innerHTML = `<p class="text-center text-red-500">Failed to load files: ${err.message}</p>`;
            }
        });

        youtubeSearchBtn.addEventListener('click', () => {
            youtubeModal.classList.remove('hidden');
            youtubeSearchInput.value = '';
            youtubeResultsList.innerHTML = '<p class="text-center text-slate-500 py-8">Enter query to search videos.</p>';
        });
    }
    
    initializeApp();
  </script>
</body>
</html>
