<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Joes AI - Intelligent AI Assistant & Coding Workspace</title>
  
  <!-- UI Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; background: #fdfdfd; overflow: hidden; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    
    .prose img { border-radius: 1rem; margin: 1.5rem 0; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border: 5px solid white; max-width: 100%; height: auto; transition: transform 0.3s; }
    .prose img:hover { transform: scale(1.02); }
    .prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; border: 1px solid #eee; font-size: 0.9rem; border-radius: 12px; overflow: hidden; }
    .prose th { background: #f8fafc; padding: 12px; font-weight: 700; color: #4f46e5; border-bottom: 2px solid #e2e8f0; }
    .prose td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

    .shimmer-loader { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .sidebar-collapsed { width: 80px !important; }
    .sidebar-collapsed .sidebar-txt { display: none; }
  </style>
</head>
<body class="text-slate-900">

  <!-- Full-screen Page Loader -->
  <div id="loader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase">Akram Joes Technologies</p>
  </div>

  <!-- AUTHENTICATION SCREEN -->
  <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-50 p-4 hidden">
    <div class="bg-white rounded-[3rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] border border-slate-200/50 w-full max-w-md p-8 md:p-10 space-y-6">
      <div class="text-center">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-2xl mb-4">
          <i data-lucide="zap" class="w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Joes AI</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Intelligence Redefined</p>
      </div>

      <!-- Auth Switch -->
      <div class="flex p-1 bg-slate-100 rounded-2xl">
        <button id="login-tab" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-white shadow text-indigo-600">SIGN IN</button>
        <button id="signup-tab" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all text-slate-400">SIGN UP</button>
      </div>

      <div class="space-y-4">
        <input id="email-field" type="email" placeholder="Email" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-6 outline-none focus:ring-2 focus:ring-indigo-500/20">
        <input id="pass-field" type="password" placeholder="Password" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl px-6 outline-none focus:ring-2 focus:ring-indigo-500/20">
        
        <div id="phone-zone" class="hidden space-y-3 pt-2 border-t border-slate-100">
           <div class="flex gap-2">
              <input id="phone-field" type="tel" placeholder="+256..." class="flex-1 h-14 bg-white border border-slate-200 rounded-2xl px-4 text-sm font-bold">
              <button id="send-otp" class="px-4 h-14 bg-indigo-50 text-indigo-600 rounded-2xl text-[10px] font-bold uppercase shrink-0 hover:bg-indigo-100 transition-colors">Send OTP</button>
           </div>
           <div id="recaptcha-box"></div>
           <input id="otp-field" type="text" placeholder="6-digit SMS code" class="hidden w-full h-14 bg-indigo-50/50 border-2 border-indigo-200 border-dashed rounded-2xl px-4 text-center tracking-[0.5em] font-black text-indigo-600">
        </div>
      </div>

      <button id="submit-auth" class="w-full h-14 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:scale-[1.01] active:scale-95 transition-all">Continue to Workspace</button>
      
      <div class="flex items-center gap-4 text-slate-300">
        <hr class="flex-1"> <span class="text-[9px] font-black uppercase tracking-tighter">Secure Connections</span> <hr class="flex-1">
      </div>

      <!-- AUTH PROVIDERS WITH ORIGINAL LOGOS -->
      <div class="grid grid-cols-2 gap-3">
        <button id="google-auth" class="h-12 border border-slate-200 rounded-2xl flex items-center justify-center gap-3 text-xs font-bold hover:bg-slate-50 transition-all active:scale-95">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.20455c0-.63819-.05727-1.25182-.16364-1.84091H9V10.8341h4.84364c-.20864 1.125-.84273 2.07818-1.79591 2.71636v2.25818h2.90864c1.70182-1.56681 2.68364-3.87409 2.68364-6.60363z" fill="#4285F4"/><path d="M9 18c2.43 0 4.46727-.80591 5.95636-2.19136l-2.90864-2.25818c-.80591.53977-1.83682.85909-3.04773.85909-2.34409 0-4.32818-1.58318-5.03591-3.71045H.95727v2.33182C2.43818 15.9832 5.48182 18 9 18z" fill="#34A853"/><path d="M3.96409 10.70455c-.18-.53977-.28227-1.11273-.28227-1.70455s.10227-1.16477.28227-1.70455V4.96364H.95727C.34773 6.17318 0 7.54773 0 9c0 1.45227.34773 2.82682.95727 4.03636l3.00682-2.33181z" fill="#FBBC05"/><path d="M9 3.57955c1.32136 0 2.50773.45409 3.44045 1.35409l2.58136-2.58136C13.46318.89182 11.42591 0 9 0 5.48182 0 2.43818 2.01682.95727 4.96364l3.00682 2.33182C4.67182 5.16273 6.65591 3.57955 9 3.57955z" fill="#EA4335"/></svg>
          Google
        </button>
        <button id="github-auth" class="h-12 bg-[#24292e] text-white rounded-2xl flex items-center justify-center gap-3 text-xs font-bold hover:bg-black transition-all active:scale-95">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </button>
      </div>

      <button id="toggle-phone-btn" class="w-full text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center hover:text-indigo-600 transition-colors">Access via Phone Number</button>
    </div>
  </div>

  <!-- WORKSPACE DASHBOARD -->
  <div id="workspace" class="flex h-screen hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white border-r border-slate-100 flex flex-col shrink-0 transition-all duration-400">
      <div class="h-20 px-6 flex items-center justify-between border-b border-slate-50 shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i data-lucide="zap" class="w-4 h-4"></i></div>
          <span class="sidebar-txt font-black text-lg tracking-tight text-slate-900">Joes AI</span>
        </div>
      </div>

      <div class="p-4 flex flex-col flex-1 overflow-hidden">
        <button id="reset-workspace" class="w-full h-12 bg-slate-900 hover:bg-indigo-600 text-white rounded-2xl flex items-center justify-center gap-2 mb-6 font-bold shadow-lg transition-all active:scale-95">
          <i data-lucide="plus" class="w-4 h-4"></i> <span class="sidebar-txt">New Workspace</span>
        </button>
        <div id="session-history" class="flex-1 overflow-y-auto space-y-1"></div>
      </div>

      <div class="p-6 border-t bg-slate-50/50 space-y-4">
        <div class="flex items-center gap-3 bg-white p-3 border rounded-2xl shadow-sm sidebar-txt">
          <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-indigo-600"><i data-lucide="user" class="w-4 h-4"></i></div>
          <div class="overflow-hidden">
             <p id="user-display-email" class="text-xs font-bold truncate">...</p>
             <button id="sign-out" class="text-[9px] font-black text-red-400 uppercase tracking-widest">Logout</button>
          </div>
        </div>
        <select id="mode-trigger" class="w-full p-3 bg-white border rounded-2xl text-[10px] font-black uppercase tracking-widest outline-none shadow-sm cursor-pointer sidebar-txt">
          <option value="chat">Intelligent Chat</option>
          <option value="code">Code Engineering</option>
          <option value="study">Academic Lab</option>
        </select>
      </div>
    </aside>

    <!-- Content Engine -->
    <main class="flex-1 flex flex-col overflow-hidden bg-white relative">
      <header class="h-20 flex items-center justify-between px-6 md:px-10 bg-white/80 backdrop-blur-xl border-b border-slate-100 z-10 shrink-0">
         <div class="flex items-center gap-4">
            <button id="sidebar-fold" class="p-2 -ml-2 text-slate-400 hover:text-indigo-600 transition-colors"><i data-lucide="menu" class="w-5 h-5"></i></button>
            <div>
               <h2 class="text-slate-900 font-extrabold text-lg">Joes AI Hub</h2>
               <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em]">Connected / Neural-02</p>
            </div>
         </div>
         <div class="flex gap-2">
            <button id="export-btn" class="p-2.5 text-slate-400 hover:text-indigo-600 transition-colors rounded-xl"><i data-lucide="download" class="w-5 h-5"></i></button>
            <button id="clear-view" class="p-2.5 text-slate-400 hover:text-red-500 transition-colors rounded-xl"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
         </div>
      </header>

      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-10 relative">
        <!-- WELCOME STATE / SPLASH AREA -->
        <div id="welcome-area" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center animate__animated animate__fadeIn">
          <div class="w-24 h-24 md:w-32 md:h-32 bg-indigo-600 rounded-[2.5rem] flex items-center justify-center text-white shadow-2xl mb-8 animate__animated animate__zoomIn">
            <i data-lucide="zap" class="w-12 h-12 md:w-16 md:h-16"></i>
          </div>
          <h3 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter mb-4">Joes AI</h3>
          <p class="text-lg md:text-xl font-bold text-slate-400 italic mb-8 max-w-xl">"Your Intelligent AI Assistant & Coding Workspace"</p>
          <div class="flex flex-wrap justify-center gap-3">
             <span class="px-5 py-2.5 bg-slate-50 border border-slate-100 rounded-full text-[10px] font-black text-indigo-600 uppercase tracking-widest shadow-sm">Real-time Visuals</span>
             <span class="px-5 py-2.5 bg-slate-50 border border-slate-100 rounded-full text-[10px] font-black text-indigo-600 uppercase tracking-widest shadow-sm">Enterprise Coding</span>
             <span class="px-5 py-2.5 bg-slate-50 border border-slate-100 rounded-full text-[10px] font-black text-indigo-600 uppercase tracking-widest shadow-sm">Live Search</span>
          </div>
        </div>
      </div>

      <div class="p-6 md:p-10 pt-0 shrink-0">
        <div class="max-w-4xl mx-auto">
          <div class="relative bg-slate-50 border border-slate-200 p-2 rounded-[2.5rem] flex items-end gap-2 focus-within:bg-white focus-within:shadow-2xl focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
             <button id="clip-trigger" class="p-3 text-slate-400 hover:text-indigo-600 transition-all shrink-0"><i data-lucide="paperclip" class="w-6 h-6"></i></button>
             <textarea id="user-input" rows="1" placeholder="Type a message or task..." class="flex-1 bg-transparent border-none focus:ring-0 p-3 text-lg font-medium text-slate-800 outline-none resize-none overflow-hidden" style="min-height: 54px;"></textarea>
             <button id="send-trigger" class="w-14 h-14 bg-indigo-600 text-white rounded-[1.4rem] shadow-xl shadow-indigo-100 flex items-center justify-center shrink-0 hover:bg-slate-900 transition-all active:scale-90">
                <i data-lucide="send" class="w-6 h-6"></i>
             </button>
          </div>
          <div class="flex justify-center mt-5">
             <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.4em]">Engineered By Akram Joes Technologies</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    const ENDPOINT = 'https://joes-ai-server.onrender.com';
    let auth, verifier, confirmRef, mode = 'chat', chat_history = [];

    async function bootstrap() {
      try {
        const configRes = await fetch(`${ENDPOINT}/api/config`);
        const firebaseConfig = await configRes.json();
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        setupEvents();
        monitorAuth();
      } catch(e) { console.error("Bootstrap Failure", e); }
    }

    function monitorAuth() {
       auth.onAuthStateChanged(user => {
         document.getElementById('loader').classList.add('opacity-0');
         setTimeout(() => document.getElementById('loader').remove(), 500);

         if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            document.getElementById('user-display-email').textContent = user.email || user.phoneNumber;
         } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('workspace').classList.add('hidden');
         }
         if(window.lucide) lucide.createIcons();
       });
    }

    function setupEvents() {
       // Tab Switches
       document.getElementById('login-tab').onclick = () => switchAuth(true);
       document.getElementById('signup-tab').onclick = () => switchAuth(false);
       
       // Real-time TextArea
       const area = document.getElementById('user-input');
       area.oninput = () => { 
          area.style.height = '54px'; 
          area.style.height = Math.min(area.scrollHeight, 200) + 'px'; 
       };
       area.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processPrompt(); } };
       document.getElementById('send-trigger').onclick = processPrompt;

       // Social Logins
       document.getElementById('google-auth').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
       document.getElementById('github-auth').onclick = () => auth.signInWithPopup(new firebase.auth.GithubAuthProvider());

       // Phone Flow
       document.getElementById('toggle-phone-btn').onclick = () => document.getElementById('phone-zone').classList.toggle('hidden');
       document.getElementById('send-otp').onclick = async () => {
          verifier = new firebase.auth.RecaptchaVerifier('recaptcha-box', { size: 'invisible' });
          confirmRef = await auth.signInWithPhoneNumber(document.getElementById('phone-field').value, verifier);
          document.getElementById('otp-field').classList.remove('hidden');
       };

       document.getElementById('submit-auth').onclick = async () => {
          const email = document.getElementById('email-field').value;
          const pass = document.getElementById('pass-field').value;
          const otp = document.getElementById('otp-field').value;

          try {
             if(otp) { await confirmRef.confirm(otp); }
             else { 
                const isLogin = document.getElementById('login-tab').classList.contains('text-indigo-600');
                if(isLogin) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
             }
          } catch(e) { alert(e.message); }
       };

       document.getElementById('sign-out').onclick = () => auth.signOut();
       document.getElementById('sidebar-fold').onclick = () => document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
    }

    async function processPrompt() {
       const box = document.getElementById('user-input');
       const msg = box.value.trim();
       if(!msg) return;

       document.getElementById('welcome-area').style.display = 'none';
       appendBubble('user', msg);
       box.value = ''; 
       box.style.height = '54px';

       const loaderId = showSkeleton();

       try {
         const r = await fetch(`${ENDPOINT}/api/gemini`, {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ message: msg, mode: document.getElementById('mode-trigger').value, history: chat_history })
         });
         const data = await r.json();
         hideSkeleton(loaderId);
         appendBubble('model', data.text);
       } catch(e) { hideSkeleton(loaderId); appendBubble('model', "Search connection failed. Please check environment variables."); }
    }

    function appendBubble(role, txt) {
       const wrap = document.getElementById('chat-messages');
       const bubble = document.createElement('div');
       bubble.className = `flex ${role==='user'?'justify-end':'justify-start'} animate__animated animate__fadeInUp`;
       
       const content = document.createElement('div');
       content.className = `${role==='user'?'bg-indigo-600 text-white rounded-tr-none shadow-indigo-100':'bg-white border rounded-tl-none shadow-sm prose max-w-full overflow-hidden'} p-5 rounded-[1.8rem] shadow-xl text-lg font-medium transition-all hover:scale-[1.01]`;
       
       if(role === 'model') {
         content.innerHTML = marked.parse(txt);
         chat_history.push({ role, content: txt });
         content.querySelectorAll('pre code').forEach(el => Prism.highlightElement(el));
       } else {
         content.textContent = txt;
       }

       bubble.appendChild(content);
       wrap.appendChild(bubble);
       wrap.scrollTop = wrap.scrollHeight;
    }

    function showSkeleton() {
       const id = 'ske-' + Date.now();
       const wrap = document.getElementById('chat-messages');
       const skel = document.createElement('div');
       skel.id = id;
       skel.innerHTML = `
        <div class="flex justify-start gap-4 animate-pulse">
          <div class="w-12 h-12 bg-slate-100 rounded-2xl"></div>
          <div class="flex-1 space-y-3 pt-2">
            <div class="h-3 bg-slate-100 rounded-full w-2/3 shimmer-loader"></div>
            <div class="h-3 bg-slate-100 rounded-full w-1/2 shimmer-loader"></div>
          </div>
        </div>`;
       wrap.appendChild(skel);
       wrap.scrollTop = wrap.scrollHeight;
       return id;
    }

    function hideSkeleton(id) { const el = document.getElementById(id); if(el) el.remove(); }
    function switchAuth(isLogin) {
       document.getElementById('login-tab').className = isLogin ? "flex-1 py-2 text-xs font-bold rounded-xl bg-white shadow text-indigo-600" : "flex-1 py-2 text-xs font-bold rounded-xl text-slate-400";
       document.getElementById('signup-tab').className = !isLogin ? "flex-1 py-2 text-xs font-bold rounded-xl bg-white shadow text-indigo-600" : "flex-1 py-2 text-xs font-bold rounded-xl text-slate-400";
    }

    bootstrap();
  </script>
</body>
</html>
