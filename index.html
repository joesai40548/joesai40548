<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Joes AI - Intelligent AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Reset margins and lock viewport height to prevent browser rubber-banding scroll bugs */
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
    
    .gradient-bg { background: #070514; background-size: 400% 400%; }
    body.light .gradient-bg { background: #f1f5f9; }
    
    /* Hardware Accelerated Glassmorphism saturated panels */
    .chat-gradient { 
      background: rgba(12, 10, 31, 0.45) !important; 
      backdrop-filter: blur(24px) saturate(180%); 
      border: 1px solid rgba(255, 255, 255, 0.06); 
    }
    body.light .chat-gradient { 
      background: rgba(255, 255, 255, 0.65) !important; 
      backdrop-filter: blur(24px); 
      border: 1px solid rgba(0, 0, 0, 0.06); 
      color: #1e293b !important; 
    }

    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }
    body.light #chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); }

    /* Custom Snake Motion Wave Animation */
    @keyframes snakeWave {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
    }
    .snake-dot {
        animation: snakeWave 1.2s ease-in-out infinite;
        width: 6px;
        height: 6px;
        background-color: #a78bfa;
        border-radius: 50%;
        display: inline-block;
    }
    .snake-dot:nth-child(2) { animation-delay: 0.15s; }
    .snake-dot:nth-child(3) { animation-delay: 0.3s; }
    .snake-dot:nth-child(4) { animation-delay: 0.45s; }

    /* Dynamic mouse tracking ambient radial fallback gradient */
    body:not(.light) {
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(139, 92, 246, 0.08) 0%, #0c0822 60%);
    }
    body.light {
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(79, 70, 229, 0.05) 0%, #f1f5f9 60%);
    }

    /* Glowing Input Border keyframes */
    @keyframes borderGlow {
        0%, 100% { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.3); }
        33% { border-color: #ec4899; box-shadow: 0 0 12px rgba(236, 72, 153, 0.3); }
        66% { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }
    }
    .glowing-input { animation: borderGlow 6s ease-in-out infinite; }

    /* Markdown tables layout styling */
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th { background-color: rgba(255, 255, 255, 0.08); color: #a78bfa !important; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; tracking-wider; padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
    body.light th { background-color: rgba(0, 0, 0, 0.05); color: #4f46e5 !important; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
    body.light td { border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
    tr:hover { background-color: rgba(255, 255, 255, 0.03); }
    body.light tr:hover { background-color: rgba(0, 0, 0, 0.02); }

    /* Light Theme typography adjustments */
    body.light .text-white { color: #1e293b !important; }
    body.light .text-white\/30 { color: rgba(30, 41, 59, 0.5) !important; }
    body.light .text-white\/40 { color: rgba(30, 41, 59, 0.6) !important; }
    body.light .text-white\/50 { color: rgba(30, 41, 59, 0.7) !important; }
    body.light textarea { color: #1e293b !important; background: transparent; border-color: transparent; }
    body.light select { color: #1e293b !important; background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
    body.light aside { background: rgba(241, 245, 249, 0.95); border-color: rgba(0,0,0,0.1); }
    body.light header { background: rgba(255, 255, 255, 0.6); border-color: rgba(0,0,0,0.05); }
    body.light #welcome-msg h1 { color: #1e293b !important; }
    body.light .chat-gradient p, body.light .chat-gradient li { color: #334155 !important; }
    body.light .chat-gradient strong { color: #4338ca !important; }

    /* Unified mobile-responsive container protecting Safe Areas on phones (Notches/Bottom bars) */
    .app-container {
        height: 100dvh;
        max-height: 100dvh;
        width: 100vw;
        display: flex;
        overflow: hidden;
        position: relative;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white relative">
  <!-- Enhanced Glowing Hardware-Accelerated SaaS Background Stack Layer -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-br from-purple-600/15 via-indigo-500/5 to-transparent blur-[120px] animate-[pulse_8s_ease-in-out_infinite] will-change-transform"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-tr from-pink-600/10 via-purple-500/5 to-transparent blur-[140px] animate-[pulse_12s_ease-in-out_infinite] will-change-transform"></div>
    
    <!-- Fine SaaS-grade Micro-Grid Overlay -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff03_1px,transparent_1px),linear-gradient(to_bottom,#ffffff03_1px,transparent_1px)] bg-[size:32px_32px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>
  </div>

  <div id="page-loader" class="fixed inset-0 z-[100] bg-[#0b0a1a] flex items-center justify-center transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Main Grid Layout Container -->
  <div id="app" class="app-container">

    <!-- ChatGPT/Gemini Style Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0c0a1f]/95 border-r border-white/10 flex flex-col transform -translate-x-full md:translate-x-0 md:static transition-transform duration-300 backdrop-blur-xl shrink-0 h-full">
        <div class="p-4 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-sm">⚡</div>
                <span class="text-lg font-semibold text-white tracking-wide">joes ai</span>
            </div>
            <button id="sidebar-close-btn" class="md:hidden text-white/60 hover:text-white">✕</button>
        </div>

        <div class="p-4">
            <button id="new-chat-btn" class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-medium rounded-xl flex items-center justify-center gap-2 shadow-lg hover:scale-[1.01] transition-all text-sm">
                <span>+</span> New Chat
            </button>
        </div>

        <!-- Recent Chat Sessions loaded from Koofr Cloud -->
        <div class="flex-1 overflow-y-auto px-4 py-2 space-y-1">
            <p class="text-[10px] font-semibold text-white/30 uppercase tracking-wider mb-2 px-2">Recent Chats</p>
            <div id="session-list" class="space-y-1"></div>
        </div>

        <div class="p-4 border-t border-white/5 bg-black/20 space-y-3">
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-semibold text-white/30 uppercase tracking-wider">Active Mode</label>
                <select id="chat-mode-select" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500 transition-all">
                    <option value="chat" class="text-black">💬 Chat Mode</option>
                    <option value="code" class="text-black">💻 Code Mode</option>
                    <option value="study" class="text-black">📚 Study Mode</option>
                    <option value="learn" class="text-black">🧠 Learn Mode</option>
                </select>
            </div>
            <div class="text-[9px] text-white/20 text-center pt-2 border-t border-white/5">
                Created by AKRAM JOES TECHNOLOGIES
            </div>
        </div>
    </aside>

    <!-- Main Chat Window Area (Full Width Edge-to-Edge on Mobile) -->
    <div class="flex-grow flex flex-col h-full overflow-hidden relative">
      <header class="bg-white/10 backdrop-blur-md shadow-lg md:p-4 p-3.5 pt-[calc(env(safe-area-inset-top)+0.875rem)] flex items-center justify-between border-b border-white/5 z-20 shrink-0">
          <div class="flex items-center space-x-3">
              <button id="sidebar-open-btn" class="md:hidden text-white hover:text-purple-400 p-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
              </button>
              <div class="flex items-center space-x-2 md:hidden">
                <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-sm">⚡</div>
                <span class="text-lg font-semibold text-white tracking-wide">joes ai</span>
              </div>
          </div>
          
          <!-- Modern Control Dashboard Menu -->
          <div class="flex items-center space-x-1">
              <button id="theme-btn" class="text-white hover:text-amber-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="Toggle Theme">🌙</button>
              <button id="export-btn" class="text-white hover:text-green-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="Export to Markdown">📥</button>
              <button id="clear-btn" class="text-white hover:text-red-400 transition-colors p-1.5 hover:bg-white/10 rounded-xl" title="New Conversation Screen">🗑️</button>
          </div>
      </header>

      <!-- Grid view: full screen padding overrides on mobile phones -->
      <main class="flex-1 overflow-hidden md:p-4 p-0">
        <div class="max-w-5xl mx-auto h-full flex flex-col">
          <!-- Translucent core element removes border radii on mobile edge layouts -->
          <div class="chat-gradient md:rounded-3xl rounded-none shadow-2xl overflow-hidden flex-1 flex flex-col relative border border-white/5 h-full">
            <!-- Messages stream (Protects flex structure from squishing on mobile) -->
            <div id="chat-messages" class="flex-grow flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-6 flex flex-col scroll-smooth"></div>

            <!-- Input Dashboard Container (Firmly locked shrink-0 wrapper) -->
            <div class="flex flex-col w-full bg-black/40 border-t border-white/10 p-3 md:p-4 rounded-b-none md:rounded-b-3xl shrink-0">
              <div id="attachment-chip-container" class="hidden flex-wrap gap-2 mb-3 transition-all duration-300 ease-out"></div>
              
              <div class="flex items-center space-x-2 md:space-x-3 w-full">
                <!-- Minimalist Plus Button for Media Upload -->
                <button id="attachment-btn" class="flex-shrink-0 w-11 h-11 md:w-12 md:h-12 bg-white/10 hover:bg-white/20 active:scale-95 text-white rounded-2xl flex items-center justify-center text-2xl transition-all border border-white/10" title="Upload Media">
                  ＋
                </button>
                
                <!-- Pill Input Box (Wrapper with active color-changing glow) -->
                <div class="flex-grow flex items-center relative bg-white/5 border border-white/20 rounded-2xl px-3 md:px-4 py-0.5 glowing-input transition-all min-h-[48px] md:min-h-[52px]">
                  <!-- Enlarged, Elastic Text Area (Gemini Style) -->
                  <textarea id="message-input" enterkeyhint="send" placeholder="Type a message or trigger voice..." rows="1" class="w-full bg-transparent border-none text-white placeholder-white/40 focus:outline-none text-sm md:text-base py-2.5 md:py-3 pr-10 resize-none h-[40px] max-h-[150px] leading-relaxed"></textarea>
                  
                  <!-- Google Style Mic Button inside input bar wrapper -->
                  <button id="mic-btn" class="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-purple-400 p-2 rounded-xl transition-all" title="Voice Input">
                    🎤
                  </button>
                </div>

                <!-- Send Action Button -->
                <button id="send-btn" class="flex-shrink-0 bg-gradient-to-r from-purple-600 to-indigo-600 hover:scale-105 text-white w-11 h-11 md:w-12 md:h-12 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center shrink-0">
                  <span id="send-icon" class="flex items-center justify-center w-full h-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                  </span>
                </button>
              </div>
              <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*,.pdf,.txt,.doc,.docx">
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="sandbox-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex flex-col animate__animated animate__fadeIn animate__faster">
      <div class="flex justify-between items-center p-4 border-b border-white/10 bg-[#0c0a1f]/95 text-white">
          <span class="text-sm font-semibold flex items-center gap-2">💻 Sandbox Live Code Preview</span>
          <button id="sandbox-close-btn" class="text-white hover:text-red-400 font-bold transition-colors">✕ Close</button>
      </div>
      <div class="flex-1 bg-white">
          <iframe id="sandbox-iframe" class="w-full h-full border-none"></iframe>
      </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'dark',
        look: 'handDrawn',
        flowchart: { curve: 'cardinal' }
    });
    window.mermaid = mermaid;
  </script>

  <script type="module">
    const BACKEND_URL = 'https://joes-ai-server.onrender.com';
    
    // Safety Window Loader dismiss handler (guarantees loader is removed once parsed)
    window.addEventListener('load', () => {
        const loader = document.getElementById('page-loader');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
        }, 500);
    });

    // Hardware-accelerated cursor mouse glow tracker
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.body.style.setProperty('--mouse-x', `${x}%`);
        document.body.style.setProperty('--mouse-y', `${y}%`);
    });

    const userId = localStorage.getItem('joes_ai_user_id') || 'user_' + Math.random().toString(36).substring(2, 11);
    localStorage.setItem('joes_ai_user_id', userId);

    let sessions = [];
    let currentSessionId = null;
    let activeFilename = null;
    let chatHistory = [];
    let selectedAttachment = null;
    
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const sendIcon = document.getElementById('send-icon');
    const chatMessages = document.getElementById('chat-messages');
    const chatModeSelect = document.getElementById('chat-mode-select');
    const micBtn = document.getElementById('mic-btn');
    const sessionList = document.getElementById('session-list');
    const newChatBtn = document.getElementById('new-chat-btn');

    const sidebar = document.getElementById('sidebar');
    const sidebarOpenBtn = document.getElementById('sidebar-open-btn');
    const sidebarCloseBtn = document.getElementById('sidebar-close-btn');

    const themeBtn = document.getElementById('theme-btn');
    const exportBtn = document.getElementById('export-btn');

    const sandboxModal = document.getElementById('sandbox-modal');
    const sandboxIframe = document.getElementById('sandbox-iframe');
    const sandboxCloseBtn = document.getElementById('sandbox-close-btn');

    // Secure Event Delegation for UI actions
    chatMessages.addEventListener('click', (e) => {
        const ttsBtn = e.target.closest('.tts-trigger');
        const copyBtn = e.target.closest('.copy-trigger');
        const runBtn = e.target.closest('.run-trigger');

        if (ttsBtn) {
            const rawContent = ttsBtn.getAttribute('data-content');
            window.speakText(ttsBtn, rawContent);
        }
        if (copyBtn) {
            const code = copyBtn.getAttribute('data-code');
            window.copyToClipboard(copyBtn, code);
        }
        if (runBtn) {
            const code = runBtn.getAttribute('data-code');
            window.runCodeSandbox(code);
        }
    });

    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = (messageInput.scrollHeight) + 'px';
    });

    window.speakText = (btn, text) => {
        window.speechSynthesis.cancel();
        
        if (btn.dataset.speaking === "true") {
            btn.textContent = '🔊 Read';
            btn.classList.remove('text-red-400');
            btn.dataset.speaking = "false";
            return;
        }

        document.querySelectorAll('.tts-trigger').forEach(b => {
            b.textContent = '🔊 Read';
            b.classList.remove('text-red-400');
            b.dataset.speaking = "false";
        });

        const decoded = decodeURIComponent(text);
        let cleanTextString = decoded.replace(/<\/?[^>]+(>|$)/g, "")
            .replace(/```[\s\S]*?```/g, "[Code Block]")
            .replace(/`([^`]+)`/g, "$1")
            .replace(/\*\*([^*]+)\*\*/g, "$1")
            .replace(/_([^_]+)_/g, "$1")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "$1")
            .trim();

        if (!cleanTextString) {
            alert("No readable content.");
            return;
        }

        const utterance = new SpeechSynthesisUtterance(cleanTextString);
        const loadedVoices = window.speechSynthesis.getVoices();
        if (loadedVoices.length > 0) {
            const preferedVoice = loadedVoices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || 
                                  loadedVoices.find(v => v.lang.startsWith('en')) || 
                                  loadedVoices[0];
            utterance.voice = preferedVoice;
        }

        utterance.onend = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
            btn.dataset.speaking = "false";
        };
        utterance.onerror = () => { 
            btn.textContent = '🔊 Read'; 
            btn.classList.remove('text-red-400'); 
            btn.dataset.speaking = "false";
        };

        btn.textContent = '🛑 Stop';
        btn.classList.add('text-red-400');
        btn.dataset.speaking = "true";
        
        setTimeout(() => {
            window.speechSynthesis.speak(utterance);
        }, 100);
    };

    window.runCodeSandbox = (encodedCode) => {
        const decoded = decodeURIComponent(encodedCode);
        sandboxModal.classList.remove('hidden');
        const iframeDoc = sandboxIframe.contentDocument || sandboxIframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(decoded);
        iframeDoc.close();
    };

    sandboxCloseBtn.addEventListener('click', () => {
        sandboxModal.classList.add('hidden');
    });

    function setupSidebarHandlers() {
        sidebarOpenBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });
        sidebarCloseBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });
        newChatBtn.addEventListener('click', startNewChat);
    }

    function setupThemeHandler() {
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const lightActive = document.body.classList.contains('light');
            themeBtn.innerHTML = lightActive ? '☀️' : '🌙';
            localStorage.setItem('joes_ai_theme', lightActive ? 'light' : 'dark');
        });

        if (localStorage.getItem('joes_ai_theme') === 'light') {
            document.body.classList.add('light');
            themeBtn.innerHTML = '☀️';
        }
    }

    function setupExportHandler() {
        exportBtn.addEventListener('click', () => {
            if (chatHistory.length === 0) {
                alert("No chat history to export yet!");
                return;
            }

            let mdString = `# Joes AI Conversation History\n*Date: ${new Date().toLocaleDateString()}*\n\n---\n\n`;
            chatHistory.forEach(msg => {
                const author = msg.role === 'user' ? 'User' : 'Joes AI';
                mdString += `### **${author}**:\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([mdString], { type: 'text/markdown;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.setAttribute('download', `JoesAI_ChatExport_${Date.now()}.md`);
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        });
    }

    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keydown', (e) => { 
          if (e.key === 'Enter' && !e.shiftKey) { 
              e.preventDefault(); 
              handleSend(); 
          } 
      });
      
      document.getElementById('attachment-btn').addEventListener('click', () => document.getElementById('file-input').click());
      document.getElementById('file-input').addEventListener('change', handleFileSelect);
      
      document.getElementById('clear-btn').addEventListener('click', () => {
          startNewChat();
      });
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';

          recognition.onstart = () => {
              micBtn.innerHTML = '🔴';
              micBtn.classList.add('animate-pulse', 'bg-red-500/30');
          };

          recognition.onresult = (event) => {
              const transcript = event.results[0][0].transcript;
              messageInput.value = (messageInput.value + ' ' + transcript).trim();
              messageInput.focus();
              messageInput.dispatchEvent(new Event('input'));
          };

          recognition.onerror = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          recognition.onend = () => {
              micBtn.innerHTML = '🎤';
              micBtn.classList.remove('animate-pulse', 'bg-red-500/30');
          };

          micBtn.addEventListener('click', () => {
              recognition.start();
          });
      } else {
          micBtn.style.display = 'none';
      }
    }

    async function fetchSessions() {
        sessionList.innerHTML = `<p class="text-xs text-white/40 italic px-2">Syncing with Koofr...</p>`;
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Failed to load sessions.");
            sessions = await response.json();
            renderSessions();
        } catch (err) {
            console.error(err);
            sessionList.innerHTML = `<p class="text-xs text-red-400 italic px-2">Koofr offline</p>`;
        }
    }

    function startNewChat() {
        currentSessionId = null;
        activeFilename = null;
        chatHistory = [];
        chatMessages.innerHTML = '';
        renderSessions();
        showWelcome(true);
        sidebar.classList.add('-translate-x-full');
    }

    window.loadSession = async (filename) => {
        showLoadingIndicator(true);
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Could not retrieve file.");
            const data = await response.json();
            
            currentSessionId = data.sessionId;
            activeFilename = filename;
            chatHistory = data.history || [];
            chatMessages.innerHTML = '';
            
            if (chatHistory.length === 0) {
                showWelcome(true);
            } else {
                showWelcome(false);
                chatHistory.forEach(msg => {
                    addMessageToUI(msg.role, msg.content, msg.attachment);
                });
            }
            renderSessions();
        } catch (err) {
            alert(`Error loading chat: ${err.message}`);
        } finally {
            showLoadingIndicator(false);
            sidebar.classList.add('-translate-x-full');
        }
    };

    window.deleteSession = async (filename) => {
        if (!confirm('Are you sure you want to permanently delete this chat from your Koofr cloud?')) return;
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/${filename}`, {
                method: 'DELETE',
                headers: { 'x-user-id': userId }
            });
            if (!response.ok) throw new Error("Cloud rejected deletion.");
            
            if (activeFilename === filename) {
                startNewChat();
            }
            fetchSessions();
        } catch (err) {
            alert(`Deletion failed: ${err.message}`);
        }
    };

    window.renameSession = async (filename, id, oldTitle) => {
        const renamedInput = prompt('Enter new conversation title:', oldTitle);
        if (!renamedInput || renamedInput.trim() === '' || renamedInput === oldTitle) return;

        try {
            const response = await fetch(`${BACKEND_URL}/api/chats/rename`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    oldFilename: filename,
                    sessionId: id,
                    newTitle: renamedInput.trim()
                })
            });

            if (!response.ok) throw new Error("Koofr failed to rename file.");
            const data = await response.json();

            if (activeFilename === filename) {
                activeFilename = data.filename;
            }
            await fetchSessions();
        } catch (err) {
            alert(`Rename Failed: ${err.message}`);
        }
    };

    function renderSessions() {
        sessionList.innerHTML = '';
        if (sessions.length === 0) {
            sessionList.innerHTML = `<p class="text-xs text-white/20 italic px-2">No recent chats</p>`;
            return;
        }

        sessions.forEach(sess => {
            const isActive = sess.filename === activeFilename;
            const item = document.createElement('div');
            item.className = `group flex items-center justify-between p-2.5 rounded-xl text-xs cursor-pointer transition-all ${isActive ? 'bg-white/10 text-white border-l-2 border-purple-500' : 'text-white/60 hover:bg-white/5 hover:text-white'}`;
            item.innerHTML = `
                <span class="truncate flex-1 pr-2">💬 ${sess.title}</span>
                <div class="flex items-center space-x-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="text-white/40 hover:text-amber-400 p-0.5 rename-btn" title="Rename thread">✏️</button>
                    <button class="text-white/40 hover:text-red-400 p-0.5 delete-btn" title="Delete thread">✕</button>
                </div>
            `;
            
            item.addEventListener('click', (e) => {
                const renameTarget = e.target.closest('.rename-btn');
                const deleteTarget = e.target.closest('.delete-btn');
                
                if (renameTarget) {
                    window.renameSession(sess.filename, sess.id, sess.title);
                } else if (deleteTarget) {
                    window.deleteSession(sess.filename);
                } else {
                    window.loadSession(sess.filename);
                }
            });
            sessionList.appendChild(item);
        });
    }

    async function saveCurrentChatToCloud(title) {
        try {
            const response = await fetch(`${BACKEND_URL}/api/chats`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    sessionId: currentSessionId,
                    title: title,
                    history: chatHistory
                })
            });
            if (response.ok) {
                const data = await response.json();
                activeFilename = data.filename;
            }
        } catch (err) {
            console.warn("Koofr autocommit issue:", err.message);
        }
    }

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.size > 50 * 1024 * 1024) {
            alert("File size exceeds 50MB limit.");
            return;
        }

        selectedAttachment = file;
        showAttachmentChip(file);
    }

    function showAttachmentChip(file) {
        const container = document.getElementById('attachment-chip-container');
        let previewHtml = '';

        if (file.type.startsWith('image/')) {
            const imgUrl = URL.createObjectURL(file);
            previewHtml = `<img src="${imgUrl}" class="w-8 h-8 rounded-lg object-cover border border-white/20 shadow-md">`;
        }

        container.innerHTML = `
            <div class="bg-purple-600/80 backdrop-blur-md border border-purple-400 text-white pl-2 pr-4 py-1.5 rounded-2xl text-xs flex items-center space-x-2 animate__animated animate__fadeInUp">
                ${previewHtml}
                <span class="font-medium truncate max-w-[200px]">📎 ${file.name}</span>
                <button onclick="window.removeAttachment()" class="hover:text-pink-300 transition-colors font-bold ml-2">✕</button>
            </div>
        `;
        container.classList.remove('hidden');
    }

    window.removeAttachment = () => {
        selectedAttachment = null;
        document.getElementById('file-input').value = "";
        document.getElementById('attachment-chip-container').classList.add('hidden');
    };

    window.useQuickPrompt = (promptText, preferredMode) => {
        messageInput.value = promptText;
        if (preferredMode) {
            chatModeSelect.value = preferredMode;
        }
        messageInput.focus();
        messageInput.dispatchEvent(new Event('input'));
    };

    function toggleInputState(disabled) {
        messageInput.disabled = disabled;
        sendBtn.disabled = disabled;
        document.getElementById('attachment-btn').disabled = disabled;
        micBtn.disabled = disabled;

        if (disabled) {
            messageInput.classList.add('opacity-50');
            sendIcon.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
        } else {
            messageInput.classList.remove('opacity-50');
            sendIcon.innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            `;
        }
    }

    async function handleSend() {
      const message = messageInput.value.trim();
      const hasAttachment = !!selectedAttachment;
      const currentMode = chatModeSelect.value;
      
      if (!message && !hasAttachment) return;

      messageInput.value = '';
      messageInput.style.height = 'auto';
      messageInput.blur();
      toggleInputState(true);

      let activeTitle = '';
      if (!currentSessionId) {
          currentSessionId = 'session_' + Date.now();
          const firstTopic = message || (selectedAttachment ? `Attached: ${selectedAttachment.name}` : 'New Conversation');
          activeTitle = firstTopic.length > 22 ? firstTopic.substring(0, 22) + '...' : firstTopic;
      } else {
          const activeSess = sessions.find(s => s.filename === activeFilename);
          activeTitle = activeSess ? activeSess.title : 'Saved Chat';
      }

      let attachmentPayload = null;
      let base64AttachmentData = null;
      let currentMimeType = null;

      if (hasAttachment) {
          base64AttachmentData = await readFileAsBase64(selectedAttachment);
          currentMimeType = selectedAttachment.type || 'application/octet-stream';
          
          attachmentPayload = {
              name: selectedAttachment.name,
              type: currentMimeType,
              base64: selectedAttachment.type.startsWith('image/') ? `data:${currentMimeType};base64,${base64AttachmentData}` : null
          };
      }

      const cloudAttachmentPayload = hasAttachment ? { name: selectedAttachment.name, type: currentMimeType } : null;

      addMessageToUI('user', message, attachmentPayload);
      chatHistory.push({ 
          role: 'user', 
          content: message, 
          attachment: cloudAttachmentPayload
      });
      
      await saveCurrentChatToCloud(activeTitle);

      window.removeAttachment();
      showWelcome(false);
      showProcessingIndicator();

      try {
        let aiText = '';
        
        if (hasAttachment) {
            const response = await fetch(`${BACKEND_URL}/api/gemini`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({ 
                    message, 
                    fileData: base64AttachmentData, 
                    mimeType: currentMimeType, 
                    mode: currentMode,
                    chatHistory: chatHistory.slice(0, -1).map(h => ({ role: h.role, content: h.content }))
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Server error');
            aiText = data.text;
        } else {
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-user-id': userId
                },
                body: JSON.stringify({
                    messages: [...chatHistory.slice(-6).map(m => ({ role: m.role, content: m.content })), { role: 'user', content: message }],
                    mode: currentMode
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error('Groq Offline');
            aiText = data.choices?.[0]?.message?.content || data.text;
        }

        removeProcessingIndicator();
        addMessageToUI('assistant', aiText);
        chatHistory.push({ role: 'assistant', content: aiText });

        await saveCurrentChatToCloud(activeTitle);
        await fetchSessions();

      } catch (err) {
        removeProcessingIndicator();
        addMessageToUI('assistant', `⚠️ **Error:** ${err.message}`);
      } finally {
        toggleInputState(false);
      }
    }

    function addMessageToUI(role, content, attachmentData = null) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster z-10 relative`;
      
      const innerClass = role === 'user' 
        ? 'bg-gradient-to-br from-purple-600 to-indigo-600 text-white rounded-2xl rounded-tr-none border border-purple-500/30 shadow-lg' 
        : 'chat-gradient text-white rounded-2xl rounded-tl-none border border-white/5 shadow-lg';

      let attachmentHtml = '';
      if (attachmentData) {
          if (attachmentData.base64) {
              attachmentHtml = `<img src="${attachmentData.base64}" class="rounded-xl max-w-full my-2 max-h-48 object-cover border border-white/10 shadow-md">`;
          } else {
              attachmentHtml = `
                  <div class="flex items-center space-x-3 p-3 my-2 bg-black/20 border border-white/5 rounded-xl max-w-sm text-xs">
                      <span class="text-xl">📄</span>
                      <div class="truncate flex-1">
                          <p class="font-medium truncate text-white/90">${attachmentData.name}</p>
                          <p class="text-white/40 text-[10px] uppercase tracking-wide">${attachmentData.type.split('/')[1] || 'File'}</p>
                      </div>
                  </div>
              `;
          }
      }

      const encodedString = encodeURIComponent(content || '');
      const speakerBadge = role === 'assistant' 
        ? `<div class="flex justify-end pt-1"><button class="text-white/40 hover:text-purple-300 text-xs p-1 tracking-wide tts-trigger" data-content="${encodedString}">🔊 Read</button></div>` 
        : '';

      wrapper.innerHTML = `<div class="max-w-[85%] px-5 py-3.5 shadow-xl ${innerClass} overflow-x-auto">${attachmentHtml}${formatMarkdown(content)}${speakerBadge}</div>`;
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (window.mermaid) {
          setTimeout(() => {
              window.mermaid.run({
                  querySelector: '.mermaid'
              }).catch(err => {});
          }, 50);
      }
    }

    function showProcessingIndicator() {
      const div = document.createElement('div');
      div.id = 'processing-indicator';
      div.className = 'flex justify-start items-center space-x-2 animate__animated animate__fadeInUp animate__faster mb-4';
      div.innerHTML = `
        <div class="chat-gradient text-white rounded-2xl rounded-tl-none border border-white/5 px-5 py-3.5 shadow-xl flex items-center space-x-3">
          <span id="processing-text" class="text-xs text-purple-300 italic">Joes AI is thinking</span>
          <div class="flex space-x-1.5 items-center h-4">
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
              <span class="snake-dot"></span>
          </div>
        </div>
      `;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const thinkingStages = [
          "Joes AI is thinking",
          "Joes AI is processing",
          "Joes AI is finalizing",
          "Joes AI is wrapping up"
      ];
      let stageCounter = 0;
      const targetTextSpan = div.querySelector('#processing-text');

      const textStageInterval = setInterval(() => {
          stageCounter++;
          if (stageCounter < thinkingStages.length) {
              targetTextSpan.textContent = thinkingStages[stageCounter];
              chatMessages.scrollTop = chatMessages.scrollHeight;
          } else {
              clearInterval(textStageInterval);
          }
      }, 1800);

      div.dataset.intervalId = textStageInterval;
    }

    // Loader safely finishes and unlocks screen UI
    function removeProcessingIndicator() {
      const indicatorEl = document.getElementById('processing-indicator');
      if (indicatorEl) {
          if (indicatorEl.dataset.intervalId) {
              clearInterval(parseInt(indicatorEl.dataset.intervalId));
          }
          indicatorEl.remove();
      }
    }

    function showLoadingIndicator(show) {
        if (show) {
            chatMessages.innerHTML = `
              <div class="flex flex-col items-center justify-center h-full py-20 text-white/50 space-y-3">
                <div class="w-6 h-6 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-xs">Loading conversation from Koofr...</span>
              </div>
            `;
        }
    }

    // Markdown Parser
    function formatMarkdown(text) {
        if (!text) return '';
        
        const temporaryCodeVault = [];
        let escaped = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${temporaryCodeVault.length}__`;
            temporaryCodeVault.push({ lang, code });
            return token;
        });

        // Parse Images before escaping HTML tags
        escaped = escaped.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
            return `___IMG_START___${src}___ALT___${alt || 'Image'}___IMG_END___`;
        });

        // Safely escape brackets to avoid DOM break crashes
        escaped = escaped
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Convert safe image tokens back to native fluid HTML image tags with fallbacks
        escaped = escaped.replace(/___IMG_START___(.*?)___ALT___(.*?)___IMG_END___/g, (match, src, alt) => {
            return `
                <div class="my-4 overflow-hidden rounded-xl border border-white/10 shadow-xl max-w-full bg-black/20">
                    <img src="${src}" alt="${alt}" class="w-full h-auto object-cover max-h-[350px]" onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=Image+Unavailable';">
                    <p class="p-2 text-center text-xs text-white/40 bg-black/20">${alt}</p>
                </div>
            `;
        });

        const lines = escaped.split('\n');
        let insideTable = false;
        let generatedTableBuffer = '';
        const compiledLines = [];

        for (let i = 0; i < lines.length; i++) {
            const rawLine = lines[i].trim();
            if (rawLine.startsWith('|') && rawLine.endsWith('|')) {
                if (/^[|:\-\s]+$/.test(rawLine)) {
                    insideTable = true;
                    continue;
                }
                const columnValues = rawLine.split('|').slice(1, -1).map(v => v.trim());
                if (!insideTable) {
                    insideTable = true;
                    generatedTableBuffer = `
                        <div class="overflow-x-auto my-4 border border-white/10 rounded-xl bg-white/5 shadow-lg max-w-full">
                            <table class="min-w-full divide-y divide-white/10 text-sm text-left">
                                <thead class="bg-white/10 text-xs font-semibold text-purple-300 uppercase tracking-wider">
                                    <tr>
                    `;
                    columnValues.forEach(columnTitle => {
                        generatedTableBuffer += `<th class="px-4 py-3">${columnTitle}</th>`;
                    });
                    generatedTableBuffer += `
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">
                    `;
                } else {
                    generatedTableBuffer += `<tr class="hover:bg-white/5 transition-colors">`;
                    columnValues.forEach(cellValue => {
                        generatedTableBuffer += `<td class="px-4 py-3 text-white/90">${cellValue}</td>`;
                    });
                    generatedTableBuffer += `</tr>`;
                }
            } else {
                if (insideTable) {
                    generatedTableBuffer += `</tbody></table></div>`;
                    compiledLines.push(generatedTableBuffer);
                    generatedTableBuffer = '';
                    insideTable = false;
                }
                compiledLines.push(lines[i]);
            }
        }
        if (insideTable) {
            generatedTableBuffer += `</tbody></table></div>`;
            compiledLines.push(generatedTableBuffer);
        }

        escaped = compiledLines.join('\n');

        escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, linkText, url) => {
            return `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="text-indigo-400 hover:text-indigo-300 font-semibold underline decoration-indigo-400/40 hover:decoration-indigo-300 transition-all inline-flex items-center gap-1">
                    ${linkText}
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                </a>
            `;
        });

        escaped = escaped.replace(/`([^`]+)`/g, '<code class="bg-white/10 text-pink-300 px-1.5 py-0.5 rounded text-xs font-mono">$1</code>')
            .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-purple-200">$1</strong>')
            .replace(/^\s*[-*+]\s+(.*)$/gm, '<li class="list-disc ml-4 my-1 text-white/90">$1</li>');

        temporaryCodeVault.forEach((block, idx) => {
            const token = `__CODE_TOKEN_REPLACEMENT_${idx}__`;
            const displayLang = block.lang ? block.lang.toUpperCase() : 'CODE';
            const encoded = encodeURIComponent(block.code.trim());
            
            let finalOutput = '';
            if (block.lang && block.lang.toLowerCase() === 'mermaid') {
                finalOutput = `<div class="mermaid my-4 p-4 bg-black/20 border border-white/5 rounded-xl text-center overflow-x-auto">${block.code.trim()}</div>`;
            } else {
                let runBtn = '';
                if (['HTML', 'XML', 'JS', 'JAVASCRIPT', 'CSS'].includes(displayLang)) {
                    finalOutput = `
                        <div class="relative group my-3 border border-white/10 rounded-xl overflow-hidden bg-black/40 text-left">
                            <div class="flex justify-between items-center px-4 py-1.5 bg-white/5 border-b border-white/10 text-[10px] text-white/40 tracking-wider">
                                <span>${displayLang}</span>
                                <div class="flex items-center">
                                    <button class="hover:text-white transition-colors copy-trigger" data-code="${encoded}">Copy</button>
                                    <button class="hover:text-white transition-colors ml-2 run-trigger" data-code="${encoded}">Run</button>
                                </div>
                            </div>
                            <pre class="p-4 overflow-x-auto text-sm font-mono text-purple-300">${block.code.trim()}</pre>
                        </div>
                    `;
                } else {
                    finalOutput = `
                        <div class="relative group my-3 border border-white/10 rounded-xl overflow-hidden bg-black/40 text-left">
                            <div class="flex justify-between items-center px-4 py-1.5 bg-white/5 border-b border-white/10 text-[10px] text-white/40 tracking-wider">
                                <span>${displayLang}</span>
                                <button class="hover:text-white transition-colors copy-trigger" data-code="${encoded}">Copy</button>
                            </div>
                            <pre class="p-4 overflow-x-auto text-sm font-mono text-purple-300">${block.code.trim()}</pre>
                        </div>
                    `;
                }
            }
            escaped = escaped.replace(token, finalOutput);
        });

        return escaped.replace(/\n/g, '<br>');
    }

    // Trigger primary boot-up sequence instantly
    function initializeApp() {
        setupEventListeners();
        setupSidebarHandlers();
        setupThemeHandler();
        setupExportHandler();
        setupSpeechRecognition();
        
        showWelcome(true);
        fetchSessions();
    }

    initializeApp();
  </script>
</body>
